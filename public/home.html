<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/assets/moon-man-logo.ico">
    <title>EPOS Home</title>
    <link rel="stylesheet" href="/assistant/assistant.css" />
    <link rel="stylesheet" href="/css/widgets/salestoday.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/widgets/salesThisMonth.css">
    <link rel="stylesheet" href="/css/widgets/salesforecast.css">
    <script src="/js/storage.js"></script>
    <script src="/js/menu.js"></script>
    <script src="/js/widgets/visibility.js"></script>
    <script src="/js/nsItemFeedCache.js" defer></script>
    <script src="/js/itemOptionsCache.js" defer></script>
    <script src="/js/widgets/homeItemLine.js" defer></script>

    <!-- Virtual Sales Assistant -->
<script src="/assistant/assistant.js"></script>
<script type="module" src="/assistant/assistantHooks.js"></script>
<script type="module" src="/assistant/stockSearch.js"></script>
<script type="module" src="/assistant/dailyDigest.js"></script>
<script type="module" src="/assistant/reportError.js"></script>








</head>

<body>
    <!-- Menu will be injected here -->
    <div id="menu"></div>

    <!-- Main content -->
   <main class="content">
  <h1>Welcome to the EPOS System</h1>

  <div id="dashboardWrapper">
    <div id="dashboardGrid">
      <section id="homeItemLineWidget" class="widget-card wide">
        <div id="homeItemLineLoading" class="home-item-loading">
          <div class="home-item-spinner" aria-hidden="true"></div>
          <p>Loading item options...</p>
        </div>
        <div class="home-item-widget-header">
          <h2>Item Options Check</h2>
          <div class="home-item-price-strip">
            <span>Price <strong id="homeItemPriceTotal">£0.00</strong></span>
            <span>Sale <strong id="homeItemSaleTotal">£0.00</strong></span>
          </div>
        </div>

        <div class="home-item-filter-row">
          <select id="homeItemSizeFilter" aria-label="Size filter">
            <option value="">All Sizes</option>
          </select>
          <select id="homeItemBaseOptionFilter" aria-label="Storage option filter">
            <option value="">All Storage Options</option>
          </select>
          <select id="homeItemTypeFilter" aria-label="Type filter">
            <option value="">All</option>
            <option value="services">Services</option>
            <option value="items">Items</option>
          </select>
        </div>

        <div class="home-item-table-wrap">
          <table class="home-item-line-table">
            <thead>
              <tr>
                <th>Item</th>
                <th>Options</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Discount %</th>
                <th>Sale Price</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr id="homeItemLine" class="home-item-line">
                <td>
                  <div class="home-item-autocomplete">
                    <input
                      id="homeItemSearch"
                      class="home-item-search"
                      type="text"
                      placeholder="Product name"
                      autocomplete="off"
                      aria-autocomplete="list"
                    />
                    <input type="hidden" class="home-item-internal-id" />
                  </div>
                </td>
                <td class="home-item-options-cell">
                  <span class="home-item-muted">Select an item</span>
                </td>
                <td><input type="number" class="home-item-qty" value="1" min="1" step="1" /></td>
                <td><input type="number" class="home-item-amount" placeholder="£" step="0.01" readonly /></td>
                <td><input type="number" class="home-item-discount" value="0" min="0" max="100" step="0.1" /></td>
                <td><input type="number" class="home-item-saleprice" placeholder="£" step="0.01" /></td>
                <td><button type="button" id="homeItemResetBtn" class="home-item-icon-btn" title="Clear item">×</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
      <section id="salesTodayWidget" class="widget-card wide"></section>
      <section id="salesThisMonthWidget" class="widget-card wide"></section>
      <section id="salesByStoreWidget" class="widget-card half"></section>
      <section id="topThreeWidget" class="widget-card half"></section>
    </div>
      <section id="salesForecastWidget" class="widget-card wide"></section>

    <!-- 🔔 Announcement Column -->
    <section id="announcementContainer" class="announcement-area" style="display:none;"></section>
    <!-- 📋 Surveys Column -->
<section id="surveyContainer" class="survey-area" style="display:none;"></section>

  </div>



  <!-- scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/js/widgets/salesByStore.js"></script>
  <script src="/js/widgets/salestoday.js"></script>
  <script src="/js/widgets/topThree.js"></script>
  <script src="/js/widgets/salesThisMonth.js"></script>
  <script src="/js/widgets/salesForcast.js"></script>
  <script src="/js/homeAnnouncements.js"></script>
</main>


</body>

</html>
