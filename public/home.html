<!DOCTYPE html>
<html lang="en">

<head>
    <script src="/js/browserLogFilter.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/assets/moon-man-logo.ico">
    <title>Welcome to Epos</title>
    <link rel="stylesheet" href="/assistant/assistant.css" />
    <link rel="stylesheet" href="/css/widgets/salestoday.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/widgets/salesforecast.css">
    <script src="/js/storage.js"></script>
    <script src="/js/menu.js"></script>
    <script src="/js/widgets/visibility.js"></script>
    <script src="/js/widgets/homeRota.js" defer></script>

    <!-- Virtual Sales Assistant -->
<script src="/assistant/assistant.js"></script>
<script type="module" src="/assistant/assistantHooks.js"></script>
<script type="module" src="/assistant/stockSearch.js"></script>
<script type="module" src="/assistant/dailyDigest.js"></script>
<script type="module" src="/assistant/reportError.js"></script>








</head>

<body>
    <!-- Menu will be injected here -->
    <div id="menu"></div>

    <!-- Main content -->
   <main class="content">
  <section class="home-welcome" aria-label="Welcome">
    <div>
      <span class="home-welcome-kicker">Dashboard</span>
      <h1 id="homeWelcomeTitle">Welcome to Epos</h1>
    </div>
    <p id="homeWelcomeSubtitle">Here is your live view for today.</p>
  </section>

  <section id="dashboardFilterBar" class="dashboard-filter-bar" aria-label="Dashboard filters">
    <div>
      <label for="dashboardDateRange">Date range</label>
      <select id="dashboardDateRange">
        <option value="today" selected>Today</option>
        <option value="yesterday">Yesterday</option>
        <option value="thisWeek">This week</option>
        <option value="lastWeek">Last week</option>
        <option value="thisMonth">This Month</option>
        <option value="lastMonth">Last Month</option>
        <option value="custom">Custom</option>
      </select>
      <button id="dashboardCustomDatesToggle" class="dashboard-custom-dates-toggle" type="button" aria-expanded="false" aria-controls="dashboardCustomDates">
        Specific dates
      </button>
      <div id="dashboardCustomDates" class="dashboard-custom-dates">
        <label for="dashboardDateFrom">From</label>
        <input id="dashboardDateFrom" type="date">
        <label for="dashboardDateTo">To</label>
        <input id="dashboardDateTo" type="date">
      </div>
    </div>
    <span id="dashboardDateRangeLabel" class="dashboard-filter-range">Today</span>
  </section>

  <div id="dashboardWrapper">
    <div id="dashboardGrid">
      <section id="homeRotaWidget" class="widget-card wide" style="display:none;" hidden>
        <div class="home-rota-header">
          <div>
            <h2>My Rota</h2>
            <p id="homeRotaRange">This week</p>
          </div>
          <a href="/rota" class="home-rota-link" aria-label="Open rota page">Open Rota</a>
        </div>
        <div id="homeRotaLoading" class="home-rota-state">
          <span class="home-rota-spinner" aria-hidden="true"></span>
          <span>Loading rota...</span>
        </div>
        <div id="homeRotaEmpty" class="home-rota-state hidden">No shifts found for you this week.</div>
        <div id="homeRotaError" class="home-rota-state home-rota-error hidden">Could not load your rota.</div>
        <div id="homeRotaList" class="home-rota-list" aria-live="polite"></div>
      </section>
      <section id="salesTodayWidget" class="widget-card wide"></section>
      <section id="salesByStoreWidget" class="widget-card half"></section>
      <section id="topThreeWidget" class="widget-card half"></section>
      <section id="outstandingActionsWidget" class="widget-card wide"></section>
    </div>
    <section id="kpiMeterWidget" class="widget-card wide"></section>
    <section id="salesForecastWidget" class="widget-card wide"></section>

    <!-- 🔔 Announcement Column -->
    <section id="announcementContainer" class="announcement-area" style="display:none;"></section>
    <!-- 📋 Surveys Column -->
<section id="surveyContainer" class="survey-area" style="display:none;"></section>

  </div>



  <!-- scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/js/widgets/dashboardDateFilter.js"></script>
  <script src="/js/widgets/salesByStore.js"></script>
  <script src="/js/widgets/salestoday.js"></script>
  <script src="/js/widgets/topThree.js"></script>
  <script src="/js/widgets/outstandingActions.js"></script>
  <script src="/js/widgets/kpiMeter.js"></script>
  <script src="/js/widgets/salesForcast.js"></script>
  <script src="/js/homeAnnouncements.js"></script>
  <script src="/js/homeGreeting.js"></script>
</main>


</body>

</html>
