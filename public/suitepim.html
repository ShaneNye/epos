<!DOCTYPE html>
<html lang="en">

<head>
    <script src="/js/browserLogFilter.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/assets/moon-man-logo.ico" />
  <title>SuitePim</title>

  <link rel="stylesheet" href="/assistant/assistant.css" />
  <link rel="stylesheet" href="/css/home.css" />
  <link rel="stylesheet" href="/css/suitepim.css" />

  <script src="/js/storage.js"></script>
  <script src="/js/menu.js"></script>
  <script src="/js/suitepimPreload.js" defer></script>
  <script src="/assistant/assistant.js"></script>
  <script type="module" src="/assistant/assistantHooks.js"></script>
  <script src="/js/suitepimDashboard.js" defer></script>
  <script src="/js/suitepimFloorPlans.js" defer></script>
  <script src="/js/widgets/goodsValue.js" defer></script>
</head>

<body>
  <div id="menu"></div>

  <main class="content suitepim-page">
    <header class="suitepim-header">
      <div>
        <p class="suitepim-kicker">Item record management</p>
        <h1>SuitePim</h1>
      </div>
    </header>

    <nav class="suitepim-subnav" aria-label="SuitePim sections">
      <a class="suitepim-subnav-link active" href="/suitepim">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 19V5"></path>
          <path d="M8 19v-6"></path>
          <path d="M13 19v-9"></path>
          <path d="M18 19V8"></path>
        </svg>
        Dashboard
      </a>
      <a class="suitepim-subnav-link" href="/suitepim/web-management">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 6h16"></path>
          <path d="M4 12h10"></path>
          <path d="M4 18h13"></path>
          <path d="M18 11h2a2 2 0 0 1 2 2v3"></path>
          <path d="M16 14l2-3 2 3"></path>
        </svg>
        Item Management
      </a>
      <a class="suitepim-subnav-link" href="/suitepim/campaigns">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 7h16"></path>
          <path d="M7 4v6"></path>
          <path d="M17 4v6"></path>
          <path d="M6 15h5"></path>
          <path d="M13 15h5"></path>
          <path d="M8 19h8"></path>
        </svg>
        Campaigns
      </a>
      <a class="suitepim-subnav-link" href="/suitepim/product-validation">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M9 12l2 2 4-5"></path>
          <path d="M4 4h16v16H4z"></path>
        </svg>
        Product Validation
      </a>
      <a class="suitepim-subnav-link" href="/suitepim/reasons-to-buy">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M12 3l2.7 5.5 6.1.9-4.4 4.3 1 6.1L12 16.9 6.6 19.8l1-6.1-4.4-4.3 6.1-.9L12 3z"></path>
        </svg>
        Reasons To Buy
      </a>
      <a class="suitepim-subnav-link" href="/suitepim/item-faqs">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h10"></path></svg>
        Item Faq's
      </a>
      <a class="suitepim-subnav-link" href="/suitepim/settings">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"></path><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2 2 0 1 1-2.83 2.83l-.04-.04A1.8 1.8 0 0 0 15 19.4a1.8 1.8 0 0 0-1 .58V20a2 2 0 1 1-4 0v-.02a1.8 1.8 0 0 0-1-.58 1.8 1.8 0 0 0-1.98.36l-.04.04a2 2 0 1 1-2.83-2.83l.04-.04A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-.58-1H4a2 2 0 1 1 0-4h.02a1.8 1.8 0 0 0 .58-1 1.8 1.8 0 0 0-.36-1.98l-.04-.04a2 2 0 1 1 2.83-2.83l.04.04A1.8 1.8 0 0 0 9 4.6a1.8 1.8 0 0 0 1-.58V4a2 2 0 1 1 4 0v.02a1.8 1.8 0 0 0 1 .58 1.8 1.8 0 0 0 1.98-.36l.04-.04a2 2 0 1 1 2.83 2.83l-.04.04A1.8 1.8 0 0 0 19.4 9c.22.36.39.73.58 1H20a2 2 0 1 1 0 4h-.02c-.19.27-.36.64-.58 1z"></path></svg>
        Settings
      </a>
    </nav>

    <section class="suitepim-dashboard-tabs" role="tablist" aria-label="SuitePim dashboard views">
      <button
        id="suitepimStockManagementTab"
        class="active"
        type="button"
        role="tab"
        aria-selected="true"
        aria-controls="suitepimStockManagementPanel"
        data-suitepim-dashboard-tab="stock-management">
        Stock Management
      </button>
      <button
        id="suitepimFloorPlansTab"
        type="button"
        role="tab"
        aria-selected="false"
        aria-controls="suitepimFloorPlansPanel"
        data-suitepim-dashboard-tab="floor-plans">
        Floor Plans
      </button>
    </section>

    <section
      id="suitepimStockManagementPanel"
      class="suitepim-dashboard-panel"
      role="tabpanel"
      aria-labelledby="suitepimStockManagementTab"
      data-suitepim-dashboard-panel="stock-management">
      <section id="goodsValueWidget" class="widget-card wide inventory-widget-card goods-value-widget suitepim-stock-management-widget"></section>
    </section>

    <section
      id="suitepimFloorPlansPanel"
      class="suitepim-dashboard-panel suitepim-floorplan-panel"
      role="tabpanel"
      aria-labelledby="suitepimFloorPlansTab"
      data-suitepim-dashboard-panel="floor-plans"
      hidden>
      <div class="suitepim-floorplan-shell" id="suitepimFloorPlanApp">
        <div class="suitepim-floorplan-topbar" aria-label="Floor plan controls">
          <div class="suitepim-floorplan-footfall" aria-live="polite">
            <span>Footfall</span>
            <strong id="suitepimFloorPlanFootfallTotal">-</strong>
          </div>
          <div class="suitepim-floorplan-filter-grid">
            <label for="suitepimFloorPlanLocation">
              <span>Location</span>
              <select id="suitepimFloorPlanLocation"></select>
            </label>
            <label for="suitepimFloorPlanDateRange">
              <span>Date range</span>
              <select id="suitepimFloorPlanDateRange">
                <option value="today">Today</option>
                <option value="yesterday">Yesterday</option>
                <option value="thisMonth" selected>This Month</option>
                <option value="lastMonth">Last Month</option>
                <option value="thisYear">This Year</option>
                <option value="lastYear">Last Year</option>
                <option value="custom">Custom</option>
              </select>
            </label>
            <label for="suitepimFloorPlanHeatmap">
              <span>Heat map</span>
              <select id="suitepimFloorPlanHeatmap">
                <option value="none" selected>- None -</option>
                <option value="inventory">Inventory Count</option>
                <option value="sold">Items Sold</option>
                <option value="revenue">Revenue</option>
                <option value="movement">Inventory Movement</option>
              </select>
            </label>
            <label id="suitepimFloorPlanHeatmapScopeLabel" for="suitepimFloorPlanHeatmapScope">
              <span>Heat map type</span>
              <select id="suitepimFloorPlanHeatmapScope">
                <option value="bin">By Bin</option>
                <option value="squareFootage" selected>By Square Footage</option>
              </select>
            </label>
            <label for="suitepimFloorPlanStartDate">
              <span>Start date</span>
              <input id="suitepimFloorPlanStartDate" type="date">
            </label>
            <label for="suitepimFloorPlanEndDate">
              <span>End date</span>
              <input id="suitepimFloorPlanEndDate" type="date">
            </label>
          </div>
          <div class="suitepim-floorplan-actions">
            <span id="suitepimFloorPlanStatus" class="suitepim-floorplan-status" aria-live="polite"></span>
            <label class="suitepim-floorplan-theme-toggle" title="Toggle dark mode">
              <span>Dark</span>
              <input id="suitepimFloorPlanDarkMode" class="suitepim-floorplan-dark-mode-toggle" type="checkbox" aria-label="Toggle dark mode">
              <span class="suitepim-floorplan-theme-toggle-track" aria-hidden="true"></span>
            </label>
            <button id="suitepimFloorPlanEdit" class="suitepim-floorplan-action" type="button">Edit</button>
            <button id="suitepimFloorPlanSave" class="suitepim-floorplan-action is-primary" type="button" hidden>Save</button>
          </div>
        </div>

        <div class="suitepim-floorplan-workspace">
          <aside class="suitepim-floorplan-sidebar" id="suitepimFloorPlanSidebar">
            <button class="suitepim-floorplan-sidebar-toggle" id="suitepimFloorPlanSidebarToggle" type="button" aria-expanded="true" aria-controls="suitepimFloorPlanSidebarBody">
              Floor plan files
            </button>
            <div id="suitepimFloorPlanSidebarBody" class="suitepim-floorplan-sidebar-body">
              <div class="suitepim-floorplan-sidebar-tabs" role="tablist" aria-label="Floor plan sidebar">
                <button class="active" type="button" role="tab" aria-selected="true" aria-controls="suitepimFloorPlanFilesTab" data-floorplan-sidebar-tab="files" data-floorplan-tab-mode="all">Floor Plans</button>
                <button type="button" role="tab" aria-selected="false" aria-controls="suitepimFloorPlanAnalyticsTab" data-floorplan-sidebar-tab="analytics" data-floorplan-tab-mode="view">Analytics</button>
                <button type="button" role="tab" aria-selected="false" aria-controls="suitepimFloorPlanAssetsTab" data-floorplan-sidebar-tab="assets" data-floorplan-tab-mode="edit">Assets</button>
                <button type="button" role="tab" aria-selected="false" aria-controls="suitepimFloorPlanBinsTab" data-floorplan-sidebar-tab="bins" data-floorplan-tab-mode="edit">Bins</button>
              </div>
              <section id="suitepimFloorPlanFilesTab" data-floorplan-sidebar-panel="files">
                <button id="suitepimFloorPlanNew" class="suitepim-floorplan-new" type="button">Create new floorplan</button>
                <div id="suitepimFloorPlanList" class="suitepim-floorplan-list"></div>
              </section>
              <section id="suitepimFloorPlanAssetsTab" data-floorplan-sidebar-panel="assets" hidden>
                <div id="suitepimFloorPlanAssets" class="suitepim-floorplan-assets"></div>
              </section>
              <section id="suitepimFloorPlanBinsTab" data-floorplan-sidebar-panel="bins" hidden>
                <input id="suitepimFloorPlanBinSearch" class="suitepim-floorplan-bin-search" type="search" placeholder="Search bins..." aria-label="Search bins">
                <div id="suitepimFloorPlanBins" class="suitepim-floorplan-bins"></div>
              </section>
              <section id="suitepimFloorPlanAnalyticsTab" data-floorplan-sidebar-panel="analytics" hidden>
                <div id="suitepimFloorPlanAnalytics" class="suitepim-floorplan-analytics"></div>
              </section>
            </div>
          </aside>

          <section class="suitepim-floorplan-editor">
            <div class="suitepim-floorplan-editor-toolbar">
              <input id="suitepimFloorPlanName" type="text" value="Untitled floor plan" aria-label="Floor plan name" disabled>
              <div class="suitepim-floorplan-tools" role="toolbar" aria-label="Floor plan drawing tools">
                <button type="button" data-floorplan-tool="select" title="Select, resize, or delete walls, doors and windows" aria-label="Select structural elements">Grab</button>
                <button type="button" data-floorplan-tool="line" class="active" title="Wall" aria-label="Wall">Wall</button>
                <button type="button" data-floorplan-tool="door" title="Door" aria-label="Door">Door</button>
                <button type="button" data-floorplan-tool="window" title="Window" aria-label="Window">Window</button>
                <div class="suitepim-floorplan-zoom-controls" aria-label="Floor plan zoom controls">
                  <button id="suitepimFloorPlanZoomOut" type="button" aria-label="Zoom out">-</button>
                  <span id="suitepimFloorPlanZoomLabel">100%</span>
                  <button id="suitepimFloorPlanZoomIn" type="button" aria-label="Zoom in">+</button>
                </div>
                <label>
                  <input id="suitepimFloorPlanLockGrid" type="checkbox" checked>
                  Lock to grid
                </label>
                <label>
                  <input id="suitepimFloorPlanCurrent" type="checkbox">
                  Current
                </label>
              </div>
              <div id="suitepimFloorPlanRotationControls" class="suitepim-floorplan-rotation-controls" hidden aria-label="Asset rotation controls">
                <button id="suitepimFloorPlanRotateLeft" type="button" aria-label="Rotate left 45 degrees">↺ Left</button>
                <span id="suitepimFloorPlanRotationLabel">0°</span>
                <button id="suitepimFloorPlanAssetEdit" type="button" aria-label="Edit selected asset">Edit</button>
                <button id="suitepimFloorPlanRotateRight" type="button" aria-label="Rotate right 45 degrees">Right ↻</button>
              </div>
            </div>
            <div id="suitepimFloorPlanCanvasWrap" class="suitepim-floorplan-canvas-wrap">
              <svg id="suitepimFloorPlanCanvas" class="suitepim-floorplan-canvas" role="img" aria-label="Measured floor plan drawing area"></svg>
            </div>
          </section>
          <aside id="suitepimFloorPlanDataPanel" class="suitepim-floorplan-data-panel is-collapsed" hidden>
            <button id="suitepimFloorPlanDataPanelToggle" class="suitepim-floorplan-data-panel-toggle" type="button" aria-expanded="false">
              <span>Data</span>
            </button>
            <div class="suitepim-floorplan-data-panel-body">
              <header>
                <h2 id="suitepimFloorPlanDataPanelTitle">Heat map data</h2>
                <p id="suitepimFloorPlanDataPanelSummary"></p>
              </header>
              <div id="suitepimFloorPlanDataPanelContent"></div>
            </div>
          </aside>
        </div>
      </div>
    </section>

  </main>
</body>

</html>
