<!DOCTYPE html>
<html lang="en">

<head>
    <script src="/js/browserLogFilter.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/assets/moon-man-logo.ico">
    <title>Manage My Profile</title>

    <link rel="stylesheet" href="/css/app-theme.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/admin.css">

    <!-- MUST be absolute for popup -->
    <script src="/js/storage.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>

    <style>
        body {
            min-height: 100vh;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0) 240px),
                var(--bg);
            font-family: "Segoe UI", "Inter", sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text);
        }

        .popup-wrapper {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
        }

        .popup-card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .popup-header {
            background: var(--sidebar-bg);
            color: #fff;
            padding: 18px 22px;
        }

        .popup-body {
            padding: 18px 22px 22px;
        }

        .popup-title {
            margin: 0;
            font-size: 1.14rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .popup-subtitle {
            margin: 4px 0 0;
            color: rgba(255, 255, 255, 0.78);
            font-size: 0.86rem;
            font-weight: 600;
        }

        .settings-intro {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.45;
        }

        .settings-section {
            margin: 0 0 14px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
        }

        .settings-section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 12px;
            color: var(--ink);
            font-size: 0.95rem;
            font-weight: 800;
        }

        .settings-section-title::before {
            content: "";
            width: 4px;
            height: 18px;
            border-radius: 999px;
            background: var(--accent);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .form-field {
            margin-bottom: 0;
        }

        .form-field label {
            display: block;
            color: var(--ink);
            font-size: 0.84rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .form-field input,
        .form-field select {
            width: 100%;
            min-height: 40px;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: 6px;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .form-field small {
            color: var(--muted);
        }

        .status-grid {
            display: grid;
            grid-template-columns: 48px 1fr;
            gap: 8px;
        }

        .emoji-field {
            position: relative;
        }

        .emoji-trigger {
            width: 48px;
            height: 40px;
            padding: 0;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
        }

        .emoji-trigger:hover,
        .emoji-trigger:focus-visible {
            border-color: var(--brand);
            box-shadow: var(--focus-ring);
            outline: none;
        }

        .emoji-picker-popover {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            z-index: 30;
            width: min(360px, calc(100vw - 32px));
            overflow: hidden;
            border: 1px solid #d1d8e0;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.18);
        }

        .emoji-clear {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 34px;
            border: 0;
            border-bottom: 1px solid #e3e7ec;
            background: #fafbfc;
            color: #536170;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .emoji-clear:hover,
        .emoji-clear:focus-visible {
            background: #edf8fb;
            color: var(--brand);
            outline: none;
        }

        .emoji-picker-popover[hidden] {
            display: none;
        }

        .emoji-picker-popover emoji-picker {
            width: 100%;
            height: 360px;
            --border-radius: 8px;
        }

        /* Make the color picker show as a real color picker even if global styles are aggressive */
        .form-field input[type="color"] {
            appearance: auto !important;
            -webkit-appearance: auto !important;
            width: 60px !important;
            height: 38px !important;
            padding: 0 !important;
            border: 1px solid #d1d8e0;
            border-radius: 6px;
            cursor: pointer;
            background: #fff;
        }

        .theme-editor {
            display: grid;
            gap: 14px;
        }

        .theme-picker-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .theme-colour-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-colour-row input[type="text"] {
            flex: 1;
            min-width: 0;
            text-transform: uppercase;
        }

        .theme-preview {
            display: grid;
            grid-template-columns: 76px 1fr;
            min-height: 74px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .theme-preview-sidebar {
            background: linear-gradient(180deg, #085b73 0%, #006f93 58%, #084a61 100%);
        }

        .theme-preview-content {
            padding: 12px;
        }

        .theme-preview-title {
            width: 60%;
            height: 10px;
            margin-bottom: 10px;
            border-radius: 999px;
            background: #17212b;
        }

        .theme-preview-line {
            width: 82%;
            height: 8px;
            margin-bottom: 10px;
            border-radius: 999px;
            background: #dce4eb;
        }

        .theme-preview-button {
            display: inline-block;
            min-width: 68px;
            height: 22px;
            border-radius: 6px;
            background: #006f93;
        }

        .theme-preview-accent {
            display: inline-block;
            width: 38px;
            height: 4px;
            margin-left: 8px;
            border-radius: 999px;
            vertical-align: middle;
            background: #f4c430;
        }

        .theme-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .theme-swatch {
            width: 32px;
            height: 32px;
            padding: 0;
            border: 2px solid #fff;
            border-radius: 999px;
            box-shadow: 0 0 0 1px #cfd8e3;
            cursor: pointer;
        }

        .theme-swatch:focus-visible {
            outline: 3px solid rgba(var(--brand-rgb), 0.18);
            outline-offset: 2px;
        }

        .theme-swatch.is-selected {
            box-shadow: 0 0 0 2px var(--brand), 0 0 0 5px rgba(var(--brand-rgb), 0.14);
        }

        .actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 14px 22px;
            border-top: 1px solid var(--line);
            background: var(--panel-soft);
            gap: 10px;
        }

        .save-status {
            flex: 1;
            min-width: 0;
            color: var(--muted);
            font-size: 0.84rem;
            font-weight: 700;
        }

        @media (max-width: 560px) {
            body {
                padding: 0;
            }

            .popup-wrapper {
                max-width: none;
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            .popup-card {
                min-height: 100vh;
                border: 0;
                border-radius: 0;
            }

            .popup-body {
                padding: 16px;
            }

            .actions {
                flex-direction: column;
                align-items: stretch;
            }

            .actions button {
                width: 100%;
                min-height: 40px;
            }

            .theme-picker-grid {
                grid-template-columns: 1fr;
            }

            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="popup-wrapper">
        <div class="popup-card">
            <div class="popup-header">
                <div>
                    <h1 class="popup-title">Manage My Profile</h1>
                    <p class="popup-subtitle">Update your availability, profile details, and theme.</p>
                </div>
            </div>

            <div class="popup-body">
                <p class="settings-intro">Only fields enabled for your active role are shown here.</p>

                <form id="manageForm"></form>
            </div>

            <div class="actions">
                <span id="saveStatus" class="save-status" aria-live="polite"></span>
                <button type="button" class="btn-secondary" onclick="window.close()">Close</button>
                <button type="button" id="saveBtn" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script>
        const manageForm = document.getElementById("manageForm");
        const saveBtn = document.getElementById("saveBtn");
        const saveStatus = document.getElementById("saveStatus");

        /* ---------------------------------------------------------
           Load session & active role
        --------------------------------------------------------- */
        const session = storageGet();
        const token = session?.token;
        function getActiveRoleName(session) {
            if (typeof session?.activeRole === "string") return session.activeRole;
            if (session?.activeRole?.name) return session.activeRole.name;
            return "";
        }

        const activeRoleName = getActiveRoleName(session);

        if (!token || !activeRoleName) {
            alert("Missing session. Please log in again.");
            window.close();
        }

        const authHeaders = { Authorization: `Bearer ${token}` };

        /* ---------------------------------------------------------
           Fetch user from /api/me
        --------------------------------------------------------- */
        async function loadUser() {
            const res = await fetch("/api/me", { headers: authHeaders });
            const data = await res.json();
            if (!data.ok) {
                alert("Could not load your profile.");
                window.close();
            }
            return data.user;
        }

        /* ---------------------------------------------------------
           Fetch allowed fields for role
        --------------------------------------------------------- */
        async function loadAllowedFields() {
            const res = await fetch(`/api/meta/management-rules/${encodeURIComponent(activeRoleName)}`, {
                headers: authHeaders
            });
            const data = await res.json();
            if (!data.ok) return [];
            return data.fields;
        }

        /* ---------------------------------------------------------
           Fetch locations (for dropdown)
        --------------------------------------------------------- */
        async function loadLocations() {
            const res = await fetch("/api/meta/locations", { headers: authHeaders });
            const data = await res.json();
            return data.ok ? data.locations : [];
        }

        /* ---------------------------------------------------------
           Fields user must NEVER edit
        --------------------------------------------------------- */
        const DISALLOWED_FIELDS = [
            "role_ids",
            "roles",
            "sb_netsuite_token_id",
            "sb_netsuite_token_secret",
            "prod_netsuite_token_id",
            "prod_netsuite_token_secret"
        ];

        const STATUS_FIELDS = [
            "epos_status",
            "eposStatus",
            "epos_status_emoji",
            "eposStatusEmoji",
            "epos_status_text",
            "eposStatusText",
            "epos_status_expires_at",
            "eposStatusExpiresAt"
        ];

        /* ---------------------------------------------------------
           Location fields (DB-driven)
        --------------------------------------------------------- */
        const LOCATION_FIELDS = [
            "location_id",
            "locationid",
            "locationId",
            "primary_store",
            "primarystore",
            "store_id",
            "storeId",
            "primaryStore"
        ];

        const STATUS_OPTIONS = [
            { value: "available", label: "Available", colour: "#168461" },
            { value: "busy", label: "Busy", colour: "#d97706" },
            { value: "unavailable", label: "Unavailable", colour: "#c2413a" }
        ];

        function escapeAttr(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/"/g, "&quot;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        const DEFAULT_PRIMARY = "#006F93";
        const DEFAULT_ACCENT = "#F4C430";
        const HEX_RE = /^#(?:[0-9a-f]{3}|[0-9a-f]{6})$/i;
        const USER_THEME_CACHE_KEY = "eposUserTheme";

        function normalizeHexColor(value) {
            if (typeof value !== "string" || !HEX_RE.test(value.trim())) return "";
            let hex = value.trim();
            if (hex.length === 4) {
                hex = `#${hex[1]}${hex[1]}${hex[2]}${hex[2]}${hex[3]}${hex[3]}`;
            }
            return hex.toUpperCase();
        }

        function hexToRgb(hex) {
            const normalized = normalizeHexColor(hex);
            if (!normalized) return null;
            const int = parseInt(normalized.slice(1), 16);
            return {
                r: (int >> 16) & 255,
                g: (int >> 8) & 255,
                b: int & 255
            };
        }

        function rgbToHex({ r, g, b }) {
            return `#${[r, g, b].map(v =>
                Math.max(0, Math.min(255, Math.round(v)))
                    .toString(16)
                    .padStart(2, "0")
            ).join("")}`.toUpperCase();
        }

        function rgbToHsl({ r, g, b }) {
            r /= 255;
            g /= 255;
            b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h = 0;
            let s = 0;
            const l = (max + min) / 2;

            if (max !== min) {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    default: h = (r - g) / d + 4;
                }
                h *= 60;
            }

            return { h, s, l };
        }

        function hslToRgb({ h, s, l }) {
            const hue = ((h % 360) + 360) % 360;
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
            const m = l - c / 2;
            let r = 0;
            let g = 0;
            let b = 0;

            if (hue < 60) [r, g, b] = [c, x, 0];
            else if (hue < 120) [r, g, b] = [x, c, 0];
            else if (hue < 180) [r, g, b] = [0, c, x];
            else if (hue < 240) [r, g, b] = [0, x, c];
            else if (hue < 300) [r, g, b] = [x, 0, c];
            else [r, g, b] = [c, 0, x];

            return {
                r: (r + m) * 255,
                g: (g + m) * 255,
                b: (b + m) * 255
            };
        }

        function relativeLuminance(hex) {
            const rgb = hexToRgb(hex);
            if (!rgb) return 0;
            const channels = [rgb.r, rgb.g, rgb.b].map(v => {
                const c = v / 255;
                return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
            });
            return 0.2126 * channels[0] + 0.7152 * channels[1] + 0.0722 * channels[2];
        }

        function contrastRatio(a, b) {
            const l1 = relativeLuminance(a);
            const l2 = relativeLuminance(b);
            return (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
        }

        function suggestAccentColours(primaryHex) {
            const primary = normalizeHexColor(primaryHex) || DEFAULT_PRIMARY;
            const baseRgb = hexToRgb(primary);
            if (!baseRgb) return [DEFAULT_ACCENT];

            const base = rgbToHsl(baseRgb);
            const candidates = [
                { h: base.h + 180, s: 0.72, l: 0.52 },
                { h: base.h + 150, s: 0.68, l: 0.50 },
                { h: base.h + 210, s: 0.70, l: 0.54 },
                { h: base.h + 120, s: 0.64, l: 0.48 },
                { h: base.h + 300, s: 0.66, l: 0.55 },
                { h: base.h + 45, s: 0.78, l: 0.54 },
            ]
                .map(hsl => rgbToHex(hslToRgb(hsl)))
                .filter(hex => contrastRatio(primary, hex) >= 1.45);

            const unique = [];
            for (const hex of candidates.concat([DEFAULT_ACCENT])) {
                if (!unique.includes(hex)) unique.push(hex);
                if (unique.length >= 6) break;
            }
            return unique;
        }

        function mixColors(a, b, weight) {
            const colorA = hexToRgb(a);
            const colorB = hexToRgb(b);
            if (!colorA || !colorB) return normalizeHexColor(a);
            const w = Math.max(0, Math.min(1, weight));
            return rgbToHex({
                r: colorA.r * (1 - w) + colorB.r * w,
                g: colorA.g * (1 - w) + colorB.g * w,
                b: colorA.b * (1 - w) + colorB.b * w
            });
        }

        function cacheSavedTheme(user) {
            const primary = normalizeHexColor(user?.themeHex || user?.themehex);
            const accent = normalizeHexColor(user?.themeAccentHex || user?.themeaccenthex);
            const saved = typeof storageGet === "function" ? storageGet() : null;
            const userKey = String(saved?.username || saved?.email || user?.email || "").trim().toLowerCase();
            const cacheKey = userKey ? `${USER_THEME_CACHE_KEY}:${userKey}` : USER_THEME_CACHE_KEY;

            if (!primary && !accent) {
                localStorage.removeItem(cacheKey);
                localStorage.removeItem(USER_THEME_CACHE_KEY);
                return;
            }

            localStorage.setItem(cacheKey, JSON.stringify({ primary, accent }));
            localStorage.removeItem(USER_THEME_CACHE_KEY);
        }

        /* ---------------------------------------------------------
           Get user value (handles snake_case vs camelCase)
        --------------------------------------------------------- */
        function getUserValue(user, field) {
            if (!user || !field) return "";

            if (user[field] !== undefined && user[field] !== null) return user[field];

            const map = {
                firstname: "firstName",
                lastname: "lastName",
                profileimage: "profileImage",
                primarystore: "primaryStore",
                netsuiteid: "netsuiteId",
                invoicelocationid: "invoiceLocationId",
                themehex: "themeHex",
                themeaccenthex: "themeAccentHex",
                location_id: "primaryStore" // /api/me returns primaryStore
            };

            const alt = map[field.toLowerCase()];
            if (alt && user[alt] !== undefined && user[alt] !== null) return user[alt];

            const camel = field
                .toLowerCase()
                .replace(/_([a-z])/g, (_, c) => c.toUpperCase());

            if (user[camel] !== undefined && user[camel] !== null) return user[camel];

            return "";
        }

        function createStatusField(value) {
            const current = STATUS_OPTIONS.some(option => option.value === value) ? value : "available";
            const wrapper = document.createElement("div");
            wrapper.className = "form-field";
            wrapper.innerHTML = `
                <label>Status</label>
                <select name="epos_status">
                    ${STATUS_OPTIONS.map(option => `
                        <option value="${option.value}" ${option.value === current ? "selected" : ""}>
                            ${option.label}
                        </option>
                    `).join("")}
                </select>
                <small style="display:block; margin-top:6px; opacity:.75;">
                    This controls your call availability on the rota.
                </small>
            `;
            return wrapper;
        }

        function createCustomStatusField(user) {
            const wrapper = document.createElement("div");
            wrapper.className = "form-field";
            const currentEmoji = user.eposStatusEmoji || "";
            const currentText = escapeAttr(user.eposStatusText || "");
            wrapper.innerHTML = `
                <label>One-Time Status</label>
                <div class="status-grid">
                    <div class="emoji-field">
                        <button
                            type="button"
                            class="emoji-trigger"
                            aria-label="Choose status emoji"
                            aria-expanded="false"
                        >${escapeAttr(currentEmoji) || "☺"}</button>
                        <input
                            type="hidden"
                            name="epos_status_emoji"
                            value="${escapeAttr(currentEmoji)}"
                            data-emoji-input
                        >
                        <div class="emoji-picker-popover" hidden>
                            <button type="button" class="emoji-clear" aria-label="Clear status emoji">×</button>
                            <emoji-picker></emoji-picker>
                        </div>
                    </div>
                    <input
                        type="text"
                        name="epos_status_text"
                        value="${currentText}"
                        maxlength="80"
                        placeholder="e.g. On lunch, at warehouse"
                    >
                </div>
                <small style="display:block; margin-top:6px; opacity:.75;">
                    Optional. Clears automatically at 5pm.
                </small>
            `;
            wireEmojiPicker(wrapper);
            return wrapper;
        }

        function wireEmojiPicker(root) {
            const trigger = root.querySelector(".emoji-trigger");
            const input = root.querySelector("[data-emoji-input]");
            const popover = root.querySelector(".emoji-picker-popover");
            const picker = root.querySelector("emoji-picker");
            const clear = root.querySelector(".emoji-clear");
            if (!trigger || !input || !popover || !picker || !clear) return;

            function closePicker() {
                popover.hidden = true;
                trigger.setAttribute("aria-expanded", "false");
            }

            function openPicker() {
                popover.hidden = false;
                trigger.setAttribute("aria-expanded", "true");
            }

            trigger.addEventListener("click", (event) => {
                event.stopPropagation();
                if (popover.hidden) openPicker();
                else closePicker();
            });

            picker.addEventListener("emoji-click", (event) => {
                const emoji = event.detail?.unicode || event.detail?.emoji?.unicode || "";
                if (!emoji) return;
                input.value = emoji;
                trigger.textContent = emoji;
                closePicker();
            });

            clear.addEventListener("click", (event) => {
                event.stopPropagation();
                input.value = "";
                trigger.textContent = "☺";
                closePicker();
            });

            document.addEventListener("click", (event) => {
                if (root.contains(event.target)) return;
                closePicker();
            });

            document.addEventListener("keydown", (event) => {
                if (event.key === "Escape") closePicker();
            });
        }

        function createThemeField(user) {
            const wrapper = document.createElement("div");
            wrapper.className = "form-field";

            const primary = normalizeHexColor(user.themeHex || user.themehex) || "";
            const accent = normalizeHexColor(user.themeAccentHex || user.themeaccenthex) || "";
            const primaryUi = primary || DEFAULT_PRIMARY;
            const accentUi = accent || DEFAULT_ACCENT;

            wrapper.innerHTML = `
                <label>User Theme</label>
                <div class="theme-editor">
                    <div class="theme-picker-grid">
                        <div>
                            <label for="themehex_picker">Primary</label>
                            <div class="theme-colour-row">
                                <input type="color" id="themehex_picker" value="${primaryUi}">
                                <input type="text" id="themehex_text" value="${primary}" placeholder="${DEFAULT_PRIMARY}" maxlength="7">
                            </div>
                            <input type="hidden" name="themehex" id="themehex_value" value="${primary}">
                        </div>
                        <div>
                            <label for="themeaccenthex_picker">Accent</label>
                            <div class="theme-colour-row">
                                <input type="color" id="themeaccenthex_picker" value="${accentUi}">
                                <input type="text" id="themeaccenthex_text" value="${accent}" placeholder="${DEFAULT_ACCENT}" maxlength="7">
                            </div>
                            <input type="hidden" name="themeaccenthex" id="themeaccenthex_value" value="${accent}">
                        </div>
                    </div>

                    <div class="theme-preview" aria-hidden="true">
                        <div class="theme-preview-sidebar"></div>
                        <div class="theme-preview-content">
                            <div class="theme-preview-title"></div>
                            <div class="theme-preview-line"></div>
                            <span class="theme-preview-button"></span>
                            <span class="theme-preview-accent"></span>
                        </div>
                    </div>

                    <div>
                        <small style="display:block; margin-bottom:6px; opacity:.75;">
                            Suggested accent colours for the selected primary.
                        </small>
                        <div class="theme-suggestions" id="theme_suggestions"></div>
                    </div>

                    <div>
                        <button type="button" class="btn-secondary" id="themehex_clear" style="padding:8px 10px;">
                            Clear Theme
                        </button>
                    </div>
                </div>
                <small style="display:block; margin-top:6px; opacity:.75;">
                    Clear will revert to the current default colour scheme.
                </small>
            `;

            wireThemeEditor(wrapper);
            return wrapper;
        }

        function wireThemeEditor(root) {
            const primaryPicker = root.querySelector("#themehex_picker");
            const primaryText = root.querySelector("#themehex_text");
            const primaryHidden = root.querySelector("#themehex_value");
            const accentPicker = root.querySelector("#themeaccenthex_picker");
            const accentText = root.querySelector("#themeaccenthex_text");
            const accentHidden = root.querySelector("#themeaccenthex_value");
            const clearBtn = root.querySelector("#themehex_clear");
            const suggestions = root.querySelector("#theme_suggestions");
            const previewSidebar = root.querySelector(".theme-preview-sidebar");
            const previewButton = root.querySelector(".theme-preview-button");
            const previewAccent = root.querySelector(".theme-preview-accent");
            if (!primaryPicker || !primaryText || !primaryHidden || !accentPicker || !accentText || !accentHidden) return;

            function setPrimary(value, persist = true) {
                const hex = normalizeHexColor(value);
                const uiHex = hex || DEFAULT_PRIMARY;
                primaryPicker.value = uiHex;
                primaryText.value = persist ? hex : "";
                primaryHidden.value = persist ? hex : "";
                renderSuggestions();
                updatePreview();
            }

            function setAccent(value, persist = true) {
                const hex = normalizeHexColor(value);
                const uiHex = hex || DEFAULT_ACCENT;
                accentPicker.value = uiHex;
                accentText.value = persist ? hex : "";
                accentHidden.value = persist ? hex : "";
                updateSelectedSuggestion();
                updatePreview();
            }

            function updatePreview() {
                const primary = normalizeHexColor(primaryHidden.value) || DEFAULT_PRIMARY;
                const accent = normalizeHexColor(accentHidden.value) || DEFAULT_ACCENT;
                previewSidebar.style.background = `linear-gradient(180deg, ${mixColors(primary, "#000000", 0.18)} 0%, ${primary} 58%, ${mixColors(primary, "#000000", 0.28)} 100%)`;
                previewButton.style.background = primary;
                previewAccent.style.background = accent;
            }

            function renderSuggestions() {
                if (!suggestions) return;
                const primary = normalizeHexColor(primaryHidden.value) || normalizeHexColor(primaryPicker.value) || DEFAULT_PRIMARY;
                suggestions.innerHTML = suggestAccentColours(primary).map(hex => `
                    <button
                        type="button"
                        class="theme-swatch"
                        data-accent="${hex}"
                        title="${hex}"
                        aria-label="Use accent ${hex}"
                        style="background:${hex}"
                    ></button>
                `).join("");
                updateSelectedSuggestion();
            }

            function updateSelectedSuggestion() {
                if (!suggestions) return;
                const selected = normalizeHexColor(accentHidden.value);
                suggestions.querySelectorAll("[data-accent]").forEach(button => {
                    button.classList.toggle("is-selected", selected && normalizeHexColor(button.dataset.accent) === selected);
                });
            }

            primaryPicker.addEventListener("input", () => setPrimary(primaryPicker.value));
            accentPicker.addEventListener("input", () => setAccent(accentPicker.value));

            primaryText.addEventListener("input", () => {
                const hex = normalizeHexColor(primaryText.value);
                if (hex) setPrimary(hex);
                else primaryHidden.value = primaryText.value.trim() ? primaryHidden.value : "";
            });

            accentText.addEventListener("input", () => {
                const hex = normalizeHexColor(accentText.value);
                if (hex) setAccent(hex);
                else accentHidden.value = accentText.value.trim() ? accentHidden.value : "";
            });

            suggestions?.addEventListener("click", (event) => {
                const button = event.target.closest("[data-accent]");
                if (!button) return;
                setAccent(button.dataset.accent);
            });

            clearBtn?.addEventListener("click", () => {
                setPrimary(DEFAULT_PRIMARY, false);
                setAccent(DEFAULT_ACCENT, false);
            });

            renderSuggestions();
            updatePreview();
        }

        function createSettingsSection(title, children, grid = false) {
            const section = document.createElement("section");
            section.className = "settings-section";

            const heading = document.createElement("h2");
            heading.className = "settings-section-title";
            heading.textContent = title;
            section.appendChild(heading);

            const body = document.createElement("div");
            if (grid) body.className = "settings-grid";
            children.filter(Boolean).forEach(child => body.appendChild(child));
            section.appendChild(body);

            return section;
        }

        /* ---------------------------------------------------------
           Create field element
        --------------------------------------------------------- */
        function createField(field, value, locations) {
            const wrapper = document.createElement("div");
            wrapper.className = "form-field";

            const label = field
                .replace(/_/g, " ")
                .replace(/([A-Z])/g, " $1")
                .replace(/\b\w/g, c => c.toUpperCase());

            wrapper.innerHTML = `<label>${label}</label>`;

            // ▸ LOCATION DROPDOWN
            if (LOCATION_FIELDS.includes(field)) {
                wrapper.innerHTML += `
          <select name="${field}">
            <option value="">Select Store</option>
            ${locations.map(l => `
              <option value="${l.id}" ${String(l.id) === String(value) ? "selected" : ""}>
                ${l.name}
              </option>
            `).join("")}
          </select>
        `;
                return wrapper;
            }

            // ▸ EMAIL
            if (field.toLowerCase().includes("email")) {
                wrapper.innerHTML += `<input type="email" name="${field}" value="${value || ""}">`;
                return wrapper;
            }

            // ▸ TEL / CONTACT
            if (field.toLowerCase().includes("contact")) {
                wrapper.innerHTML += `<input type="tel" name="${field}" value="${value || ""}">`;
                return wrapper;
            }

            // ▸ URL (images)
            if (field.toLowerCase().includes("image") || field.toLowerCase().includes("url")) {
                wrapper.innerHTML += `<input type="url" name="${field}" value="${value || ""}">`;
                return wrapper;
            }

            // ▸ DEFAULT
            wrapper.innerHTML += `<input type="text" name="${field}" value="${value || ""}">`;
            return wrapper;
        }

        /* ---------------------------------------------------------
           Render the form
        --------------------------------------------------------- */
        async function renderForm() {
            const allowed = await loadAllowedFields();
            const user = await loadUser();
            const locations = await loadLocations();

            manageForm.innerHTML = "";
            manageForm.appendChild(createSettingsSection("Availability", [
                createStatusField(user.eposStatus || "available"),
                createCustomStatusField(user)
            ], true));

            const normalizedAllowed = allowed.map(field => String(field || "").trim().toLowerCase());
            const showThemeEditor = normalizedAllowed.includes("themehex") || normalizedAllowed.includes("themeaccenthex");
            const visibleFields = allowed.filter(field =>
                !DISALLOWED_FIELDS.includes(field) &&
                !STATUS_FIELDS.includes(field) &&
                String(field || "").trim().toLowerCase() !== "themehex" &&
                String(field || "").trim().toLowerCase() !== "themeaccenthex"
            );

            if (showThemeEditor) {
                manageForm.appendChild(createSettingsSection("Theme", [
                    createThemeField(user)
                ]));
            }

            if (!showThemeEditor && visibleFields.length === 0) {
                const note = document.createElement("p");
                note.textContent = "No other editable fields are assigned to this role.";
                manageForm.appendChild(note);
                return;
            }

            const profileFields = visibleFields.map(field =>
                createField(field, getUserValue(user, field), locations)
            );
            if (profileFields.length) {
                manageForm.appendChild(createSettingsSection("Profile Details", profileFields, true));
            }
        }

        /* ---------------------------------------------------------
           Save profile
        --------------------------------------------------------- */
        async function saveProfile() {
            saveBtn.disabled = true;
            saveStatus.textContent = "Saving...";
            const formData = new FormData(manageForm);

            // Include UI active role so backend uses same role as the UI (validated server-side)
            const payload = { activeRole: activeRoleName };

            for (const [key, val] of formData.entries()) {
                payload[key] = (val === "" ? null : val);
            }

            let res;
            try {
                res = await fetch("/api/users/self-update", {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        ...authHeaders
                    },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.error("❌ Network error:", err);
                alert("Network error while saving profile");
                saveStatus.textContent = "";
                saveBtn.disabled = false;
                return;
            }

            let data;
            try {
                data = await res.json();
            } catch (err) {
                console.error("❌ Failed to parse JSON:", err);
                alert("Bad response from server");
                saveStatus.textContent = "";
                saveBtn.disabled = false;
                return;
            }

            console.log("SELF UPDATE RESPONSE:", data);

            if (!data.ok) {
                if (data.debug) console.log("SELF UPDATE DEBUG:", data.debug);
                alert("Failed to save changes: " + (data.error || "Unknown error"));
                saveStatus.textContent = "";
                saveBtn.disabled = false;
                return;
            }

            cacheSavedTheme(data.user);
            saveStatus.textContent = "Saved";
            window.close();
        }

        saveBtn.addEventListener("click", saveProfile);

        // INIT
        renderForm();
    </script>

</body>
