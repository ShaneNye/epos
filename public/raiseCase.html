    function renderWorkflowRunner(message = "") {
      const runner = document.getElementById("caseWorkflowRunner");
      if (!runner) return;

      if (!workflowRun.selected) {
        runner.innerHTML = '<p class="case-status">Select a workflow to begin.</p>';
        renderWorkflowStepsDrawer();
        updateWorkflowStepMenuVisibility();
        return;
      }

      if (message) {
        runner.innerHTML = `<p class="case-status">${escapeHtml(message)}</p>`;
        renderWorkflowStepsDrawer();
        updateWorkflowStepMenuVisibility();
        return;
      }

      if (!workflowRun.started) {
        const description = String(workflowRun.selected.description || "").trim();
        runner.innerHTML = `
          <div class="workflow-question-card">
            <h3>${escapeHtml(workflowRun.selected.name || "Selected workflow")}</h3>
            <p class="workflow-description">${escapeHtml(description || "No workflow description has been added.")}</p>
            <div class="workflow-run-actions">
              <button id="beginWorkflowRunBtn" type="button" class="btn-primary">Begin</button>
            </div>
          </div>
        `;
        document.getElementById("beginWorkflowRunBtn")?.addEventListener("click", beginWorkflow);
        renderWorkflowStepsDrawer();
        updateWorkflowStepMenuVisibility();
        return;
      }

      if (workflowRun.complete) {
        if (workflowRun.awaitingActionApproval) {
          runner.innerHTML = renderWorkflowActionValidation();
          document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
          bindWorkflowActionValidation();
          renderWorkflowStepsDrawer();
          updateWorkflowStepMenuVisibility();
          return;
        }

        runner.innerHTML = `
          <div class="workflow-run-shell">
            <div class="workflow-question-card">
              <h3>Workflow complete</h3>
              <p class="case-status">${workflowRun.actions.length ? "The action messages are now being shown in order." : "No action messages were found on this path."}</p>
              <div class="workflow-run-actions">
                <button id="restartWorkflowBtn" type="button" class="btn-secondary">Restart</button>
              </div>
            </div>
          </div>
        `;
        document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
        renderWorkflowStepsDrawer();
        updateWorkflowStepMenuVisibility();
        return;
      }

      const node = findWorkflowNode(workflowRun.currentNodeId);
      if (!node) {
        runner.innerHTML = '<p class="case-status">This workflow does not have a starting question yet.</p>';
        return;
      }
      broadcastWorkflowDebug(node.id);

      const options = Array.isArray(node.options) ? node.options.filter((option) => option?.label) : [];
      const title = node.question || node.label || "Workflow step";
      const note = node.message || "";
      const isInput = node.type === "input";
      const isCheck = node.type === "check";
      if (isCheck) {
        runner.innerHTML = `
          <div class="workflow-run-shell">
            <div class="workflow-question-card">
              <h3>${escapeHtml(title)}</h3>
              ${note ? `<p class="workflow-description workflow-check-note">${escapeHtml(note)}</p>` : ""}
              <div class="workflow-check-running" role="status" aria-live="polite">
                <span class="workflow-check-spinner" aria-hidden="true"></span>
                <span>Running Check</span>
              </div>
              <div class="workflow-run-actions">
                <button id="restartWorkflowBtn" type="button" class="btn-secondary">Restart</button>
              </div>
            </div>
          </div>
        `;
        document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
        renderWorkflowStepsDrawer();
        updateWorkflowStepMenuVisibility();
        runWorkflowCheck(node);
        return;
      }
      runner.innerHTML = `
        <div class="workflow-run-shell">
          <div class="workflow-question-card">
            <h3>${escapeHtml(title)}</h3>
            ${note ? `<p class="workflow-description">${escapeHtml(note)}</p>` : ""}
            ${isInput ? renderWorkflowInputControl(node) : `
              <div class="workflow-options">
                ${options.map((option, index) => `
                  <label class="workflow-option">
                    <input type="radio" name="workflowAnswer" value="${escapeHtml(option.label)}" ${index === 0 ? "checked" : ""}>
                    <span>${escapeHtml(option.label)}</span>
                  </label>
                `).join("") || '<p class="case-status">This step has no response options yet.</p>'}
              </div>
            `}
            <div class="workflow-run-actions">
              <button id="restartWorkflowBtn" type="button" class="btn-secondary">Restart</button>
              <button id="nextWorkflowStepBtn" type="button" class="btn-primary" ${isInput || options.length ? "" : "disabled"}>Next</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
      if (isInput) bindWorkflowItemSearchInputs(node, runner);
      renderWorkflowStepsDrawer();
      updateWorkflowStepMenuVisibility();
      document.getElementById("nextWorkflowStepBtn")?.addEventListener("click", () => {
        const answer = isInput
          ? collectWorkflowInputAnswers(node, runner)
          : runner.querySelector('input[name="workflowAnswer"]:checked')?.value || "";
        advanceWorkflow(answer);
      });
    }

    function workflowQuestionNodesInOrder() {
      const nodes = workflowNodes();
      const seen = new Set();
      const ordered = [];
      const visit = (nodeId) => {
        const node = findWorkflowNode(nodeId);
        if (!node || seen.has(String(node.id))) return;
        seen.add(String(node.id));
        if (isWorkflowPromptNode(node)) ordered.push(node);
        outgoingWorkflowEdges(node.id).forEach((edge) => visit(edge.to));
      };
      const start = firstWorkflowNode();
      if (start) visit(start.id);
      nodes
        .filter((node) => isWorkflowPromptNode(node) && !seen.has(String(node.id)))
        .forEach((node) => ordered.push(node));
      return ordered;
    }

    function renderWorkflowStepList() {
      const historyIds = new Set(workflowRun.stepHistory.map((step) => String(step.nodeId)));
      const historyIndexById = new Map(workflowRun.stepHistory.map((step, index) => [String(step.nodeId), index]));
      const steps = workflowQuestionNodesInOrder();
      return `
        <ol class="workflow-step-list">
          ${steps.map((node, index) => {
            const nodeId = String(node.id);
            const historyIndex = historyIndexById.get(nodeId);
            const isCurrent = nodeId === String(workflowRun.currentNodeId);
            const isCompleted = historyIds.has(nodeId) && !isCurrent;
            const stateClass = isCurrent ? "current" : isCompleted ? "completed" : "future";
            const label = node.question || node.label || `Step ${index + 1}`;
            const clickable = Number.isFinite(historyIndex) && (workflowRun.complete || !isCurrent);
            return `
              <li>
                <button
                  type="button"
                  class="workflow-step ${stateClass}"
                  ${clickable ? `data-workflow-step-index="${historyIndex}"` : "disabled"}>
                  ${index + 1}. ${escapeHtml(label)}
                </button>
              </li>
            `;
          }).join("")}
        </ol>
      `;
    }

    function renderWorkflowActionsLog() {
      const checksHtml = workflowRun.checks.length
        ? workflowRun.checks.map((check) => {
          const resultClass = String(check.result || "").toLowerCase() === "pass" ? "pass" : "fail";
          const rules = Array.isArray(check.checks) ? check.checks : [];
          return `
            <article class="workflow-log-card">
              <div class="workflow-log-title">
                <span>${escapeHtml(check.label || "Check")}</span>
                <span class="workflow-result-pill ${resultClass}">${escapeHtml(check.result || "Fail")}</span>
              </div>
              ${check.source ? `
                <p class="case-status">
                  Source: ${escapeHtml(workflowSourceLabel(check.source))}
                  ${check.source.checkedSalesOrderId ? `- checked order ${escapeHtml(check.source.checkedSalesOrderId)}` : ""}
                </p>
              ` : ""}
              ${check.message ? `<p class="case-status">${escapeHtml(check.message)}</p>` : ""}
              ${rules.map((rule) => `
                <div class="workflow-check-rule">
                  <strong>${escapeHtml(rule.fieldLabel || rule.field || "Field")}</strong>
                  ${escapeHtml(workflowOperatorLabel(rule.operator))}
                  ${rule.operator === "isSet" || rule.operator === "isNotSet" ? "" : `<strong>${escapeHtml(displayWorkflowValue(rule.expectedValue))}</strong>`}
                  <br>
                  Captured: ${escapeHtml(displayWorkflowValue(rule.actualValue))}
                  <span class="workflow-result-pill ${rule.passed ? "pass" : "fail"}">${rule.passed ? "Matched" : "Did not match"}</span>
                </div>
              `).join("") || '<p class="case-status">No rules were configured for this check.</p>'}
              ${check.data ? `
                <details>
                  <summary>Captured data</summary>
                  <pre class="workflow-captured-data">${escapeHtml(JSON.stringify(check.data, null, 2))}</pre>
                </details>
              ` : ""}
            </article>
          `;
        }).join("")
        : '<p class="case-status">No checks have run yet.</p>';

      const actionsHtml = workflowRun.actions.length
        ? workflowRun.actions.map((action, index) => `
          <article class="workflow-log-card">
            <div class="workflow-log-title">
              <span>${index + 1}. ${escapeHtml(action.label || "Action")}</span>
              <span class="workflow-result-pill">${escapeHtml(action.type || "action")}</span>
            </div>
            <p class="case-status">${escapeHtml(action.message || "No action note was set.")}</p>
          </article>
        `).join("")
        : '<p class="case-status">No action notes have triggered yet.</p>';

      return `
        <div class="workflow-drawer-section">
          <h4>Checks</h4>
          ${checksHtml}
          <h4>Action Notes</h4>
          ${actionsHtml}
        </div>
      `;

    function bindWorkflowActionValidation() {
      const runner = document.getElementById("caseWorkflowRunner");
      if (!runner) return;
      const updateExecuteState = () => {
        const execute = document.getElementById("executeWorkflowActionsBtn");
        if (execute) execute.disabled = !workflowRun.actions.length || !workflowRun.actionApprovals.every(Boolean);
      };
      runner.querySelectorAll("[data-workflow-action-approval]").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          const index = Number(checkbox.dataset.workflowActionApproval);
          if (Number.isFinite(index)) workflowRun.actionApprovals[index] = checkbox.checked;
          updateExecuteState();
        });
      });
      document.getElementById("executeWorkflowActionsBtn")?.addEventListener("click", async () => {
        if (!workflowRun.actionApprovals.every(Boolean)) return;
        const execute = document.getElementById("executeWorkflowActionsBtn");
        if (execute) {
          execute.disabled = true;
          execute.textContent = workflowSettings().executionMode === "fullExecution" ? "Executing..." : "Execute";
        }
        workflowRun.awaitingActionApproval = false;
        workflowRun.actionsRendered = true;
        renderWorkflowRunner();
        await executeWorkflowRunActions();
      });
    }

      const stepsBody = document.getElementById("workflowStepsDrawerBody");
      const actionsBody = document.getElementById("workflowActionsDrawerBody");
      if (!stepsBody || !actionsBody) return;
      document.querySelectorAll("[data-workflow-drawer-tab]").forEach((tab) => {
        const isActive = tab.dataset.workflowDrawerTab === workflowRun.drawerTab;
        tab.classList.toggle("active", isActive);
        tab.setAttribute("aria-selected", isActive ? "true" : "false");
      });
      stepsBody.hidden = workflowRun.drawerTab !== "steps";
      actionsBody.hidden = workflowRun.drawerTab !== "actions";
      if (!workflowRun.started) {
        stepsBody.innerHTML = '<p class="case-status">Begin a workflow to view its steps.</p>';
        actionsBody.innerHTML = '<p class="case-status">Begin a workflow to view checks and actions.</p>';

      }
      stepsBody.innerHTML = renderWorkflowStepList();
      actionsBody.innerHTML = renderWorkflowActionsLog();

          goToWorkflowStep(Number(button.dataset.workflowStepIndex));
          closeWorkflowSteps();

    function ensureCurrentStepInHistory() {
      if (!workflowRun.currentNodeId) return;
      const existingIndex = workflowRun.stepHistory.findIndex((step) => String(step.nodeId) === String(workflowRun.currentNodeId));
      if (existingIndex >= 0) {
        workflowRun.stepHistory = workflowRun.stepHistory.slice(0, existingIndex + 1);
        return;
      }
      const node = findWorkflowNode(workflowRun.currentNodeId);
      workflowRun.stepHistory.push({
        nodeId: workflowRun.currentNodeId,
        question: node?.question || node?.label || "Workflow step",
        answer: "",
        answers: {},
        answerLabels: {},
      });
    }

    function collectWorkflowAction(node) {
      addWorkflowDebugAction(node.id);
      const message = String(node?.message || node?.label || "").trim();
      const actionConfig = node?.actionConfig && typeof node.actionConfig === "object" ? node.actionConfig : {};
      if (!message && !actionConfig.type) return;
      workflowRun.actions.push({
        nodeId: node.id,
        label: node.label || "Action",
        type: node.type || "action",
        actionType: actionConfig.type || "",
        createRecord: actionConfig.createRecord || null,
        itemLineAction: actionConfig.itemLineAction || null,
        message,
        stepIndex: workflowRun.collectingFromStepIndex,
      });
      workflowRun.actionApprovals.push(false);
    }

    function collectSystemWorkflowAction(node, message, actionConfig = {}) {
      addWorkflowDebugAction(node.id);
      workflowRun.actions.push({
        nodeId: node.id,
        label: node.label || node.type || "Action",
        type: node.type || "system",
        actionType: actionConfig.type || "",
        statusId: actionConfig.statusId || "",
        statusName: actionConfig.statusName || "",
        message,
        stepIndex: workflowRun.collectingFromStepIndex,
      });
      workflowRun.actionApprovals.push(false);
    }

    function trimWorkflowActionsFromStep(stepIndex) {
      if (!Number.isFinite(stepIndex) || stepIndex < 0) {
        workflowRun.actions = [];
      } else {
        workflowRun.actions = workflowRun.actions.filter((action) => Number(action.stepIndex ?? -1) < stepIndex);
      }
      workflowRun.actionApprovals = workflowRun.actions.map(() => false);
      workflowRun.debugActionNodeIds = workflowRun.actions.map((action) => String(action.nodeId || "")).filter(Boolean);
    }

    function completeWorkflowRun() {
      if (workflowRun.terminalNodeId) broadcastWorkflowDebug(workflowRun.terminalNodeId);
      workflowRun.currentNodeId = "";
      workflowRun.complete = true;
      workflowRun.awaitingActionApproval = workflowRun.actions.length > 0;
      workflowRun.actionApprovals = workflowRun.actions.map(() => false);
      workflowRun.actionsRendered = false;
      renderWorkflowRunner();
    }

    function trimWorkflowDiagnosticsToHistory() {
      const historyIds = new Set(workflowRun.stepHistory.map((step) => String(step.nodeId)));
      workflowRun.checks = workflowRun.checks.filter((check) => historyIds.has(String(check.nodeId)));
    }

    function evaluateInputWorkflowCheck(node) {
      const config = node?.checkConfig || {};
      const rules = Array.isArray(config.rules) ? config.rules : [];
      const inputNode = findWorkflowNode(config.inputNodeId);
      const inputStep = workflowRun.stepHistory.find((step) => String(step.nodeId) === String(config.inputNodeId));
      const primary = workflowInputPrimaryAnswer(inputNode, inputStep);
      const actualValue = primary.value || "";
      const inputLabel = primary.label || inputNode?.question || inputNode?.label || "Input";

      if (!config.inputNodeId || !inputStep) {
        return {
          nodeId: node.id,
          label: node.label || node.question || "Check",
          result: "Fail",
          recordType: "input",
          source: { type: "input", inputNodeId: config.inputNodeId || "", label: inputLabel },
          message: "Selected input has not been collected yet.",
          checks: [],
          data: { inputNodeId: config.inputNodeId || "", inputLabel, value: actualValue },
        };
      }

      const checks = rules.map((rule) => {
        const expectedValue = rule.compareType === "field" ? "" : rule.staticValue;
        const passed = compareWorkflowValues(actualValue, rule.operator || "equals", expectedValue);
        return {
          field: "value",
          fieldLabel: inputLabel,
          operator: rule.operator || "equals",
          compareType: "static",
          staticValue: rule.staticValue || "",
          actualValue,
          expectedValue,
          passed,
        };
      });

      return {
        nodeId: node.id,
        label: node.label || node.question || "Check",
        result: checks.length && checks.every((check) => check.passed) ? "Pass" : "Fail",
        recordType: "input",
        source: { type: "input", inputNodeId: config.inputNodeId, label: inputLabel },
        message: checks.length ? "" : "No check rules configured",
        checks,
        data: { inputNodeId: config.inputNodeId, inputLabel, value: actualValue },
      };
    }

    async function runWorkflowCheck(node) {
      if (!node || workflowRun.runningCheckNodeId === String(node.id)) return;
      const caseId = params().get("caseId") || loadedCase?.id || "";
      const runner = document.getElementById("caseWorkflowRunner");
      workflowRun.runningCheckNodeId = String(node.id);

      try {
        if (node.checkConfig?.recordType === "input") {
          const inputStep = workflowCheckInputStep(node);
          const inputNode = workflowCheckInputNode(node);
          if (workflowCheckInputUsesSalesOrderItems(node)) {
            if (!caseId) throw new Error("Save the case before running workflow checks.");
            if (!inputStep) throw new Error("Selected input has not been collected yet.");
            const res = await fetch(`/api/netsuite/salesorder/cases/${encodeURIComponent(caseId)}/workflow-check`, {
              method: "POST",
              headers: authHeaders({ "Content-Type": "application/json" }),
              body: JSON.stringify({
                node,
                inputValue: workflowInputPrimaryAnswer(inputNode, inputStep).value || "",
                inputLabel: workflowInputPrimaryAnswer(inputNode, inputStep).label || inputNode?.question || inputNode?.label || "Input",
                inputSource: "salesOrderItems",
              }),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
            const captured = {
              nodeId: node.id,
              label: node.label || node.question || "Check",
              result: data.result || "Fail",
              recordType: data.recordType || "input",
              affectedItemSource: data.affectedItemSource || node.checkConfig?.affectedItemSource || "storeSalesOrder",
              source: data.source || null,
              message: data.message || "",
              checks: Array.isArray(data.checks) ? data.checks : [],
              data: data.data || {},
              case: data.case || null,
            };
            workflowRun.checks = workflowRun.checks.filter((check) => String(check.nodeId) !== String(node.id));
            workflowRun.checks.push(captured);
            workflowRun.drawerTab = "actions";
            renderWorkflowStepsDrawer();
            workflowRun.runningCheckNodeId = "";
            advanceWorkflow(captured.result);
            return;
          }
          const captured = evaluateInputWorkflowCheck(node);
          workflowRun.checks = workflowRun.checks.filter((check) => String(check.nodeId) !== String(node.id));
          workflowRun.checks.push(captured);
          workflowRun.drawerTab = "actions";
          renderWorkflowStepsDrawer();
          workflowRun.runningCheckNodeId = "";
          advanceWorkflow(captured.result);
          return;
        }
        if (!caseId) throw new Error("Save the case before running workflow checks.");
        const res = await fetch(`/api/netsuite/salesorder/cases/${encodeURIComponent(caseId)}/workflow-check`, {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({ node }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);

        const captured = {
          nodeId: node.id,
          label: node.label || node.question || "Check",
          result: data.result || "Fail",
          recordType: data.recordType || node.checkConfig?.recordType || "affectedItem",
          affectedItemSource: data.affectedItemSource || node.checkConfig?.affectedItemSource || "storeSalesOrder",
          source: data.source || null,
          message: data.message || "",
          checks: Array.isArray(data.checks) ? data.checks : [],
          data: data.data || {},
          case: data.case || null,
        };
        workflowRun.checks = workflowRun.checks.filter((check) => String(check.nodeId) !== String(node.id));
        workflowRun.checks.push(captured);
        workflowRun.drawerTab = "actions";
        renderWorkflowStepsDrawer();
        workflowRun.runningCheckNodeId = "";
        advanceWorkflow(captured.result);
      } catch (err) {
        console.error("Workflow check failed:", err);
        workflowRun.runningCheckNodeId = "";
        const captured = {
          nodeId: node.id,
          label: node.label || node.question || "Check",
          result: "Fail",
          recordType: node.checkConfig?.recordType || "affectedItem",
          affectedItemSource: node.checkConfig?.affectedItemSource || "storeSalesOrder",
          source: null,
          message: err.message || "Check failed",
          checks: [],
          data: {},
        };
        workflowRun.checks = workflowRun.checks.filter((check) => String(check.nodeId) !== String(node.id));
        workflowRun.checks.push(captured);
        workflowRun.drawerTab = "actions";
        renderWorkflowStepsDrawer();
        if (runner) {
          runner.innerHTML = `
            <div class="workflow-run-shell">
              <div class="workflow-question-card">
                <h3>${escapeHtml(node.label || node.question || "Check")}</h3>
                <p class="case-status">${escapeHtml(captured.message)}</p>
                <div class="workflow-run-actions">
                  <button id="restartWorkflowBtn" type="button" class="btn-secondary">Restart</button>
                </div>
              </div>
            </div>
          `;
          document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
        }
      }
    }

    function followWorkflowPath(nextNodeId) {
      let node = findWorkflowNode(nextNodeId);
      let guard = 0;
      while (node && guard < 100) {
        guard += 1;
        if (isWorkflowPromptNode(node)) {
          workflowRun.currentNodeId = node.id;
          ensureCurrentStepInHistory();
          renderWorkflowRunner();
          return;
        }

        if (node.type === "start" && node.startStatusId) {
          collectSystemWorkflowAction(node, `Set case status to ${node.startStatusName || node.startStatusId}`, {
            type: "setCaseStatus",
            statusId: node.startStatusId,
            statusName: node.startStatusName || node.startStatusId,
          });
        }
        if (node.type === "action" || node.type === "break") collectWorkflowAction(node);
        if (node.type === "closeCase") collectSystemWorkflowAction(node, "I have closed the case");
        if (node.type === "closeCase" || node.type === "break") {
          workflowRun.terminalNodeId = node.id;
          addWorkflowDebugNode(node.id);
          break;
        }
        const nextEdge = outgoingWorkflowEdges(node.id)[0];
        if (!nextEdge) {
          workflowRun.terminalNodeId = node.id;
          addWorkflowDebugNode(node.id);
          break;
        }
        addWorkflowDebugEdge(nextEdge.id);
        node = findWorkflowNode(nextEdge.to);
      }

      completeWorkflowRun();
    }

    function followWorkflowBranches(nextEdges = []) {
      const promptTarget = { id: "" };
      const visited = new Set();

      const walk = (nodeId) => {
        let node = findWorkflowNode(nodeId);
        let guard = 0;
        while (node && guard < 100) {
          guard += 1;
          const visitKey = String(node.id);
          if (visited.has(visitKey)) break;
          visited.add(visitKey);

          if (isWorkflowPromptNode(node)) {
            if (!promptTarget.id) promptTarget.id = node.id;
            return;
          }

          if (node.type === "start" && node.startStatusId) {
            collectSystemWorkflowAction(node, `Set case status to ${node.startStatusName || node.startStatusId}`, {
              type: "setCaseStatus",
              statusId: node.startStatusId,
              statusName: node.startStatusName || node.startStatusId,
            });
          }
          if (node.type === "action" || node.type === "break") collectWorkflowAction(node);
          if (node.type === "closeCase") collectSystemWorkflowAction(node, "I have closed the case");
          if (node.type === "closeCase" || node.type === "break") {
            workflowRun.terminalNodeId = node.id;
            addWorkflowDebugNode(node.id);
            return;
          }

          const edges = outgoingWorkflowEdges(node.id);
          if (!edges.length) {
            workflowRun.terminalNodeId = node.id;
            addWorkflowDebugNode(node.id);
            return;
          }
          const nextEdge = edges[0];
          addWorkflowDebugEdge(nextEdge.id);
          node = findWorkflowNode(nextEdge.to);
        }
      };

      nextEdges.forEach((edge) => walk(edge.to));

      if (promptTarget.id) {
        workflowRun.currentNodeId = promptTarget.id;
        ensureCurrentStepInHistory();
        renderWorkflowRunner();
        return;
      }

      completeWorkflowRun();
    }

    function advanceWorkflow(answer) {
      const node = findWorkflowNode(workflowRun.currentNodeId);
      if (!node) return;
      const isInputAnswer = answer && typeof answer === "object" && !Array.isArray(answer);
      const answerText = isInputAnswer ? answer.summary || "" : answer;
      const currentStepIndex = workflowRun.stepHistory.findIndex((step) => String(step.nodeId) === String(node.id));
      if (currentStepIndex >= 0) {
        workflowRun.stepHistory = workflowRun.stepHistory.slice(0, currentStepIndex + 1);
        workflowRun.stepHistory[currentStepIndex].answer = answerText;
        if (isInputAnswer) {
          workflowRun.stepHistory[currentStepIndex].answers = answer.answers || {};
          workflowRun.stepHistory[currentStepIndex].answerLabels = answer.labels || {};
        }
      }
      trimWorkflowDiagnosticsToHistory();
      trimWorkflowActionsFromStep(currentStepIndex);
      workflowRun.awaitingActionApproval = false;
      workflowRun.terminalNodeId = "";
      workflowRun.complete = false;
      workflowRun.actionsRendered = false;
      workflowRun.answers = workflowRun.stepHistory
        .filter((item) => item.answer)
        .map((item) => ({ questionId: item.nodeId, question: item.question, answer: item.answer, answers: item.answers || {}, answerLabels: item.answerLabels || {} }));
      const actionTable = document.getElementById("caseWorkflowActionTable");
      const table = document.getElementById("caseWorkflowActions");
      if (actionTable) actionTable.hidden = true;
      if (table) table.innerHTML = '<tr><td colspan="2">No workflow actions have been submitted yet.</td></tr>';

      const edges = outgoingWorkflowEdges(node.id);
      const cleanAnswer = String(answerText || "").trim().toLowerCase();
      const matchingEdges = edges.filter((item) => String(item.label || "").trim().toLowerCase() === cleanAnswer);
      const fallbackEdges = edges.filter((item) => !item.label);
      const nextEdges = matchingEdges.length ? matchingEdges : fallbackEdges.length ? fallbackEdges : edges.slice(0, 1);
      nextEdges.forEach((edge) => addWorkflowDebugEdge(edge.id));

      if (!nextEdges.length) {
        completeWorkflowRun();
        return;
      }

      workflowRun.collectingFromStepIndex = currentStepIndex;
      followWorkflowBranches(nextEdges);
      workflowRun.collectingFromStepIndex = -1;
    }

    function startWorkflow(workflow) {
      resetWorkflowRun(workflow);
      renderWorkflowRunner();
    }

    function beginWorkflow() {
      if (!workflowRun.selected) {
        renderWorkflowRunner();
        return;
      }

      const start = firstWorkflowNode();
      if (!start) {
        renderWorkflowRunner("This workflow is empty. Add questions and actions in CS Workflows first.");
        return;
      }
      workflowRun.started = true;
      workflowRun.currentNodeId = start.id;
      followWorkflowPath(start.id);
    }

    function restartWorkflow() {
      const workflow = workflowRun.selected;
      resetWorkflowRun(workflow);
      workflowRun.selected = workflow;
      beginWorkflow();
    }

    function goToWorkflowStep(index) {
      if (!Number.isFinite(index) || index < 0 || index >= workflowRun.stepHistory.length) return;
      const step = workflowRun.stepHistory[index];
      workflowRun.stepHistory = workflowRun.stepHistory.slice(0, index + 1);
      workflowRun.stepHistory[workflowRun.stepHistory.length - 1].answer = "";
      workflowRun.stepHistory[workflowRun.stepHistory.length - 1].answers = {};
      workflowRun.stepHistory[workflowRun.stepHistory.length - 1].answerLabels = {};
      workflowRun.currentNodeId = step.nodeId;
      trimWorkflowActionsFromStep(index);
      workflowRun.terminalNodeId = "";
      trimWorkflowDiagnosticsToHistory();
      workflowRun.answers = workflowRun.stepHistory
        .slice(0, -1)
        .filter((item) => item.answer)
        .map((item) => ({ questionId: item.nodeId, question: item.question, answer: item.answer, answers: item.answers || {}, answerLabels: item.answerLabels || {} }));
      workflowRun.complete = false;
      workflowRun.awaitingActionApproval = false;
      workflowRun.actionsRendered = false;
      const actionTable = document.getElementById("caseWorkflowActionTable");
      const table = document.getElementById("caseWorkflowActions");
      if (actionTable) actionTable.hidden = true;
      if (table) table.innerHTML = '<tr><td colspan="2">No workflow actions have been submitted yet.</td></tr>';
      window.clearInterval(workflowRun.timer);
      renderWorkflowRunner();
    }

    function workflowActionIconState(action = {}) {
      const state = action.executionState || "pending";
      const running = state === "pending" && action.executionMessage === "Running...";
      return {
        className: state === "success" ? "success" : state === "failed" ? "failed" : state === "needsInput" ? "warning" : running ? "running" : "",
      };
    }

    function appendWorkflowActionRow(action, index) {
      const table = document.getElementById("caseWorkflowActions");
      if (!table) return;
      if (index === 0) table.innerHTML = "";
      const state = action.executionState || "pending";
      const icon = state === "success" ? "✓" : state === "failed" ? "×" : "…";
      const iconClass = state === "success" ? "success" : state === "failed" ? "failed" : "";
      const actionIcon = workflowActionIconState(action);
      table.insertAdjacentHTML("beforeend", `
        <tr data-workflow-action-row="${index}">
          <td>${index + 1}</td>
          <td>
            <div class="workflow-action-response">
              <span class="workflow-action-icon ${actionIcon.className || iconClass}" data-workflow-action-icon="${index}"></span>
              <div>
                <strong>${escapeHtml(action.label || `Action ${index + 1}`)}</strong>
                <span class="case-status"> ${escapeHtml(workflowActionTypeLabel(action.actionType))}</span>
                <div data-workflow-action-message="${index}">${workflowActionMessageHtml(action)}</div>
                <div data-workflow-action-allocation="${index}">${workflowActionAllocationHtml(action, index)}</div>
                ${action.executionError ? `<div class="workflow-action-error" data-workflow-action-error="${index}">${escapeHtml(action.executionError)}</div>` : `<div class="workflow-action-error" data-workflow-action-error="${index}" hidden></div>`}
                <div data-workflow-action-debug="${index}">${action.executionState === "failed" ? workflowActionDebugHtml(action.executionDebug) : ""}</div>
              </div>
            </div>
          </td>
        </tr>
      `);
      wireWorkflowAllocationControls(index);
    }

    function updateWorkflowActionRow(index, patch = {}) {
      const action = workflowRun.actions[index];
      if (!action) return;
      Object.assign(action, patch);
      const state = action.executionState || "pending";
      const icon = document.querySelector(`[data-workflow-action-icon="${index}"]`);
      const message = document.querySelector(`[data-workflow-action-message="${index}"]`);
      const allocation = document.querySelector(`[data-workflow-action-allocation="${index}"]`);
      const error = document.querySelector(`[data-workflow-action-error="${index}"]`);
      const debug = document.querySelector(`[data-workflow-action-debug="${index}"]`);
      if (icon) {
        icon.textContent = state === "success" ? "✓" : state === "failed" ? "×" : "…";
        icon.classList.toggle("success", state === "success");
        icon.classList.toggle("failed", state === "failed");
        icon.classList.toggle("warning", state === "needsInput");
        const iconState = workflowActionIconState(action);
        icon.classList.toggle("running", iconState.className === "running");
        if (iconState.className === "running") icon.textContent = "";
        icon.textContent = "";
      }
      if (message) message.innerHTML = workflowActionMessageHtml(action);
      if (allocation) allocation.innerHTML = workflowActionAllocationHtml(action, index);
      wireWorkflowAllocationControls(index);
      if (error) {
        error.hidden = !action.executionError;
        error.textContent = action.executionError || "";
      }
      if (debug) debug.innerHTML = state === "failed" ? workflowActionDebugHtml(action.executionDebug) : "";
      renderWorkflowStepsDrawer();
    }

    function renderWorkflowExecutionTable(actions = workflowRun.actions) {
      window.clearInterval(workflowRun.timer);
      const actionTable = document.getElementById("caseWorkflowActionTable");
      const table = document.getElementById("caseWorkflowActions");
      if (!table) return;
      if (actionTable) actionTable.hidden = false;

      if (!actions.length) {
        table.innerHTML = '<tr><td colspan="2">This workflow path did not contain any action messages.</td></tr>';
        return;
      }

      table.innerHTML = "";
      actions.forEach((action, index) => appendWorkflowActionRow(action, index));
    }

    function delayWorkflowAction(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    const workflowAlertSound = {
      ctx: null,
      timer: null,
    };

    function playWorkflowBong() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        workflowAlertSound.ctx = workflowAlertSound.ctx || new AudioContext();
        const ctx = workflowAlertSound.ctx;
        if (ctx.state === "suspended") ctx.resume();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(180, ctx.currentTime);
        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.24, ctx.currentTime + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.85);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.9);
      } catch {}
    }

    function startWorkflowBong() {
      if (workflowAlertSound.timer) return;
      playWorkflowBong();
      workflowAlertSound.timer = window.setInterval(playWorkflowBong, 4500);
    }

    function stopWorkflowBong() {
      if (workflowAlertSound.timer) window.clearInterval(workflowAlertSound.timer);
      workflowAlertSound.timer = null;
    }

    function allocationRows(index) {
      const panel = document.querySelector(`[data-allocation-panel="${index}"]`);
      if (!panel) return [];
      const action = workflowRun.actions[index] || {};
      const deposits = Array.isArray(action.depositOptions) ? action.depositOptions : [];
      return deposits.map((deposit, rowIndex) => ({
        rowIndex,
        deposit,
        checkbox: panel.querySelector(`[data-allocation-select="${index}"][data-allocation-row="${rowIndex}"]`),
        amountInput: panel.querySelector(`[data-allocation-amount="${index}"][data-allocation-row="${rowIndex}"]`),
        available: Number(deposit.total || deposit.amount || 0),
      }));
    }

    function distributeAllocation(index, lockedRowIndex = null) {
      const action = workflowRun.actions[index] || {};
      const expected = Number(action.expectedAmount || 0);
      if (!(expected > 0)) return;
      const rows = allocationRows(index);
      const selected = rows.filter((row) => row.checkbox?.checked);
      rows.forEach((row) => {
        if (!row.checkbox?.checked && row.amountInput) row.amountInput.value = "";
      });
      if (!selected.length) return;

      const locked = selected.find((row) => row.rowIndex === lockedRowIndex);
      const lockedAmount = locked ? Math.max(0, Number(locked.amountInput?.value || 0)) : 0;
      const remainingRows = locked ? selected.filter((row) => row.rowIndex !== lockedRowIndex) : selected;
      const remainingTotal = Math.max(0, expected - lockedAmount);
      const share = remainingRows.length ? remainingTotal / remainingRows.length : 0;

      remainingRows.forEach((row, position) => {
        if (!row.amountInput) return;
        const value = position === remainingRows.length - 1
          ? remainingTotal - share * (remainingRows.length - 1)
          : share;
        row.amountInput.value = Math.min(Math.max(0, value), row.available || value).toFixed(2);
      });

      if (locked?.amountInput && lockedAmount > expected) locked.amountInput.value = expected.toFixed(2);
    }

    function wireWorkflowAllocationControls(index) {
      const panel = document.querySelector(`[data-allocation-panel="${index}"]`);
      if (!panel || panel.dataset.wired === "1") return;
      panel.dataset.wired = "1";
      panel.querySelectorAll(`[data-allocation-select="${index}"]`).forEach((checkbox) => {
        checkbox.addEventListener("change", () => distributeAllocation(index));
      });
      panel.querySelectorAll(`[data-allocation-amount="${index}"]`).forEach((input) => {
        input.addEventListener("input", () => distributeAllocation(index, Number(input.dataset.allocationRow)));
      });
      distributeAllocation(index);
      panel.querySelector(`[data-allocation-confirm="${index}"]`)?.addEventListener("click", async () => {
        const action = workflowRun.actions[index];
        if (!action) return;
        const expected = Number(action.expectedAmount || 0);
        const deposits = Array.isArray(action.depositOptions) ? action.depositOptions : [];
        const error = panel.querySelector(`[data-allocation-error="${index}"]`);
        const allocations = [];
        panel.querySelectorAll(`[data-allocation-select="${index}"]`).forEach((checkbox) => {
          if (!checkbox.checked) return;
          const rowIndex = Number(checkbox.dataset.allocationRow);
          const deposit = deposits[rowIndex] || {};
          const amountInput = panel.querySelector(`[data-allocation-amount="${index}"][data-allocation-row="${rowIndex}"]`);
          const amount = Number(amountInput?.value || 0);
          if (amount > 0) allocations.push({ id: deposit.id, tranId: deposit.tranId, amount: amount.toFixed(2) });
        });
        const total = allocations.reduce((sum, item) => sum + Number(item.amount || 0), 0);
        if (!allocations.length) {
          if (error) { error.hidden = false; error.textContent = "Select at least one customer deposit."; }
          return;
        }
        if (expected > 0 && total - expected > 0.0001) {
          if (error) { error.hidden = false; error.textContent = "Selected refund amounts exceed the workflow refund amount."; }
          return;
        }
        stopWorkflowBong();
        action.depositAllocations = allocations;
        await executeWorkflowActionAtIndex(index);
        if (workflowRun.actions[index]?.executionState === "success") {
          for (let nextIndex = index + 1; nextIndex < workflowRun.actions.length; nextIndex += 1) {
            try {
              await executeWorkflowActionAtIndex(nextIndex);
            } catch (err) {
              if (err.message === "__WORKFLOW_ACTION_WAITING_FOR_INPUT__") return;
              stopWorkflowBong();
              updateWorkflowActionRow(nextIndex, {
                executionState: "failed",
                executionMessage: workflowRun.actions[nextIndex]?.message || "Action failed.",
                executionError: err.message || "Action failed.",
              });
              return;
            }
          }
        }
      });
    }

    async function executeWorkflowActionAtIndex(index) {
      const action = workflowRun.actions[index];
      if (!action) return;
      updateWorkflowActionRow(index, {
        executionState: "pending",
        executionMessage: "Running...",
        executionError: "",
      });

      if (workflowSettings().executionMode !== "fullExecution" || !action.actionType) {
        await delayWorkflowAction(2000);
        updateWorkflowActionRow(index, {
          executionState: "success",
          executionMessage: action.message || "Action message shown.",
          executionError: "",
        });
        return;
      }

      const caseId = params().get("caseId") || loadedCase?.id || "";
      if (!caseId) throw new Error("Save the case before executing workflow actions.");
      const res = await fetch(`/api/netsuite/salesorder/cases/${encodeURIComponent(caseId)}/workflow-actions/execute`, {
        method: "POST",
        headers: authHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({
          workflowId: workflowRun.selected?.id || "",
          actions: [action],
          approvals: [true],
          checks: workflowRun.checks,
          answers: workflowRun.answers,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
      const result = Array.isArray(data.results) ? data.results[0] : null;
      if (result?.needsInput === "customerDepositAllocation") {
        updateWorkflowActionRow(index, {
          executionState: "needsInput",
          executionMessage: result.message || "Choose customer deposit allocation.",
          executionError: "",
          needsInput: result.needsInput,
          depositOptions: Array.isArray(result.deposits) ? result.deposits : [],
          expectedAmount: result.expectedAmount || 0,
          executionDebug: result.debug || null,
        });
        startWorkflowBong();
        throw new Error("__WORKFLOW_ACTION_WAITING_FOR_INPUT__");
      }
      if (result?.ok !== false && action.actionType === "setCaseStatus") {
        const statusId = action.statusId || "";
        const statusName = action.statusName || statusId;
        document.getElementById("caseStatus").value = statusId;
        document.getElementById("caseStatusName").value = statusName;
      }
      updateWorkflowActionRow(index, {
        executionState: result?.ok === false ? "failed" : "success",
        executionMessage: result?.message || action.message || "Workflow action completed.",
        executionDocumentNumber: result?.document?.number || "",
        executionDocumentUrl: result?.document?.url || "",
        executionError: result?.ok === false ? result?.error || "Action failed." : "",
        executionDebug: result?.debug || null,
      });
      if (result?.ok !== false) stopWorkflowBong();
    }

    async function executeWorkflowRunActions() {
      renderWorkflowExecutionTable();
      for (let index = 0; index < workflowRun.actions.length; index += 1) {
        try {
          await executeWorkflowActionAtIndex(index);
        } catch (err) {
          if (err.message === "__WORKFLOW_ACTION_WAITING_FOR_INPUT__") return;
          stopWorkflowBong();
          updateWorkflowActionRow(index, {
            executionState: "failed",
            executionMessage: workflowRun.actions[index]?.message || "Action failed.",
            executionError: err.message || "Action failed.",
          });
        }
      }
    }

    async function loadCaseWorkflows() {
      const select = document.getElementById("caseWorkflowSelect");
      if (!select) return;
      select.innerHTML = '<option value="">Loading workflows...</option>';
      try {
        const [res, recordsRes] = await Promise.all([
          fetch("/api/cs-workflows", {
            headers: authHeaders(),
            cache: "no-store",
          }),
          fetch("/api/cs-workflows/records", {
            headers: authHeaders(),
            cache: "no-store",
          }),
        ]);
        const data = await res.json().catch(() => ({}));
        const recordsData = await recordsRes.json().catch(() => ({}));
        if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
        if (!recordsRes.ok || recordsData?.ok === false) throw new Error(recordsData?.error || `HTTP ${recordsRes.status}`);

        workflowRun.workflows = await filterAvailableWorkflows((Array.isArray(data.workflows) ? data.workflows : []).filter((workflow) => workflow.isActive !== false));
        workflowRun.records = Array.isArray(recordsData.records) ? recordsData.records : [];
        select.innerHTML = '<option value="">Select workflow</option>' + workflowRun.workflows
          .map((workflow) => `<option value="${escapeHtml(workflow.id)}">${escapeHtml(workflow.name)}</option>`)
          .join("");
        renderWorkflowRunner();
      } catch (err) {
        console.error("Failed to load CS workflows:", err);
        workflowRun.workflows = [];
        select.innerHTML = '<option value="">Workflows unavailable</option>';
        renderWorkflowRunner(err.message || "Could not load workflows.");
      }
    }

    async function filterAvailableWorkflows(workflows = []) {
      const caseId = currentCaseId();
      const checks = await Promise.all(workflows.map(async (workflow) => {
        const criteria = workflowCriteria(workflow);
        if (!criteria.length) return workflow;
        if (!caseId) return null;
        try {
          const res = await fetch(`/api/netsuite/salesorder/cases/${encodeURIComponent(caseId)}/workflow-criteria`, {
            method: "POST",
            headers: authHeaders({ "Content-Type": "application/json" }),
            body: JSON.stringify({ workflowId: workflow.id, criteria }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
          return data.available ? workflow : null;
        } catch (err) {
          console.warn("Workflow criteria failed; hiding workflow.", workflow.name || workflow.id, err.message || err);
          return null;
        }
      }));
      return checks.filter(Boolean);
    }

    function bindCaseWorkflowRunner() {
      const select = document.getElementById("caseWorkflowSelect");
      if (!select) return;
      select.addEventListener("change", () => {
        const workflow = workflowRun.workflows.find((item) => String(item.id) === String(select.value)) || null;
        resetWorkflowRun(workflow);
        renderWorkflowRunner();
      });
    }

    function bindWorkflowDrawerTabs() {
      document.querySelectorAll("[data-workflow-drawer-tab]").forEach((tab) => {
        tab.addEventListener("click", () => {
          workflowRun.drawerTab = tab.dataset.workflowDrawerTab || "steps";
          renderWorkflowStepsDrawer();
        });
      });
    }

    function initTabs() {
      const tabs = Array.from(document.querySelectorAll(".case-tab"));
      const panels = Array.from(document.querySelectorAll(".case-panel"));
      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((next) => {
            const active = next === tab;
            next.classList.toggle("active", active);
            next.setAttribute("aria-selected", active ? "true" : "false");
          });
          panels.forEach((panel) => {
            panel.hidden = panel.id !== tab.dataset.panel;
          });
          updateCustomerServiceChrome();
          updateWorkflowStepMenuVisibility();
        });
      });
    }

    function bindRelatedPopups() {
      document.addEventListener("click", (event) => {
        const link = event.target.closest(".related-popup-link");
        if (!link) return;
        event.preventDefault();
        const win = window.open(
          link.href,
          "RelatedRecord",
          "width=1200,height=800,resizable=yes,scrollbars=yes"
        );
        if (win) win.focus();
        else window.location.href = link.href;
      });
    }

    async function init() {
      applyPopupUserTheme();
      const query = params();
      document.getElementById("caseCustomerName").value = query.get("customerName") || "";
      document.getElementById("caseCustomerId").value = query.get("customerId") || "";
      populateStore();
      populateHeaderContext();
      document.getElementById("caseIncidentDate").value = todayIsoDate();
      await Promise.all([populateStatuses(), populateAssignedTo(), populateCaseTypes()]);
      populateItems();
      if (query.get("caseId")) {
        await loadExistingCase().catch((err) => {
          console.error("Failed to load case:", err);
          document.getElementById("caseStatusText").textContent = err.message || "Could not load case.";
        });
      } else {
        populateCaseSubTypes();
      }
      loadAiCaseSummary();
      bindAiCaseSummaryRefresh();
      bindCaseWorkflowRunner();
      bindWorkflowDrawerTabs();
      bindRelatedPopups();
      loadCaseWorkflows();
      initTabs();
      window.addEventListener("pagehide", endWorkflowDebug);
      window.addEventListener("beforeunload", endWorkflowDebug);

      document.getElementById("caseType").addEventListener("change", (event) => {
        populateCaseSubTypes(event.target.value);
      });
      document.getElementById("addCaseNoteBtn").addEventListener("click", addCaseNote);
      document.getElementById("headerWorkflowStepToggle")?.addEventListener("click", toggleWorkflowStepsDrawer);
      document.getElementById("workflowStepsClose")?.addEventListener("click", closeWorkflowSteps);
      renderCaseNotes([]);
      updateCustomerServiceChrome();
      updateWorkflowStepMenuVisibility();

      document.getElementById("caseSubject").focus();
      document.getElementById("cancelBtn").addEventListener("click", () => window.close());
      document.getElementById("raiseCaseForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const statusText = document.getElementById("caseStatusText");
        const submitButton = event.currentTarget.querySelector('button[type="submit"]');

        submitButton.disabled = true;
        const isExistingCase = !!loadedCase?.id;
        statusText.textContent = isExistingCase ? "Saving case..." : "Creating case...";

        try {
          const res = await fetch(
            isExistingCase
              ? `/api/netsuite/salesorder/cases/${encodeURIComponent(loadedCase.id)}`
              : "/api/netsuite/salesorder/cases",
            {
              method: isExistingCase ? "PATCH" : "POST",
              headers: authHeaders({ "Content-Type": "application/json" }),
              body: JSON.stringify({ case: currentCaseDraft() }),
            }
          );
          const data = await res.json().catch(() => ({}));
          if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);

          if (isExistingCase) {
            statusText.textContent = `Case saved${data.caseNumber ? `: ${data.caseNumber}` : ""}.`;
            loadedCase = { ...loadedCase, ...currentCaseDraft(), caseNumber: data.caseNumber || loadedCase.caseNumber };
            try {
              window.opener?.postMessage({ action: "support-case-updated", caseId: loadedCase.id || "" }, window.location.origin);
            } catch {}
            submitButton.disabled = false;
            return;
          }

          statusText.textContent = `Case created${data.caseNumber ? `: ${data.caseNumber}` : ""}.`;
          try {
            window.opener?.postMessage({ action: "support-case-created", caseId: data.id || "" }, window.location.origin);
          } catch {}
          window.setTimeout(() => window.close(), 700);
        } catch (err) {
          console.error(isExistingCase ? "Failed to save case:" : "Failed to create case:", err);
          statusText.textContent = err.message || (isExistingCase ? "Could not save the case." : "Could not create the case.");
          submitButton.disabled = false;
        }
      });
    }

    init();
  </script>
</body>
