<!DOCTYPE html>
<html lang="en">

<head>
  <script src="/js/browserLogFilter.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/assets/moon-man-logo.ico">
  <title>Raise Case</title>
  <style>
    :root {
      --brand: #0081ab;
      --brand-600: #006c8e;
      --brand-700: #00536f;
      --brand-rgb: 0, 129, 171;
      --brand-shadow: rgba(0, 129, 171, 0.18);
      --accent: #f4b740;
      --accent-600: #c98500;
      --accent-soft: rgba(244, 183, 64, 0.16);
      --ink: #1a1f24;
      --muted: #667085;
      --line: #e6e9ee;
      --panel: #fff;
      --bg: #f8fafc;
      --radius: 6px;
      --shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
    }

    body {
      box-sizing: border-box;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", "Segoe UI", sans-serif;
    }

    .case-card {
      width: 100%;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      background: var(--panel);
      border: 0;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
    }

    .case-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 1rem;
      align-items: start;
      padding: 0.8rem 1rem;
      border-bottom: 0;
      background: var(--brand);
      color: #fff;
    }

    .case-title-wrap {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      min-width: 0;
    }

    .case-header h1 {
      margin: 0;
      color: #fff;
      font-size: 1.2rem;
    }

    .header-step-toggle {
      display: none;
      place-items: center;
      width: 34px;
      min-height: 32px;
      padding: 0;
      border-color: rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      font-size: 1.05rem;
      line-height: 1;
    }

    body.workflow-steps-available .header-step-toggle {
      display: inline-grid;
    }

    .case-context {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: flex-end;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .case-context span {
      padding: 0.18rem 0.42rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.12);
      white-space: nowrap;
    }

    .case-body {
      padding: 0.8rem 1rem 1rem;
    }

    .case-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.8rem 0.9rem;
    }

    .case-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 0.7rem;
      border-bottom: 1px solid var(--line);
    }

    .case-tab {
      border: 1px solid transparent;
      border-bottom: 0;
      border-radius: 4px 4px 0 0;
      background: transparent;
      color: var(--muted);
      min-height: 31px;
      padding: 0.28rem 0.65rem;
    }

    .case-tab.active {
      border-color: var(--line);
      border-top-color: var(--accent);
      background: #fff;
      color: var(--brand);
      box-shadow: inset 0 2px 0 var(--accent);
    }

    .case-panel[hidden] {
      display: none;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      color: #2f3e46;
      font-size: 0.84rem;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 36px;
      padding: 0.42rem 0.55rem;
      border: 1px solid #d8dee2;
      border-radius: 4px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    input[readonly] {
      background: #f8fafb;
      color: #475467;
    }

    .case-status {
      min-height: 1.25rem;
      margin: 0.5rem 0;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.65rem;
      margin-top: 0.6rem;
    }

    body.customer-service-active .actions,
    body.customer-service-active .ai-case-summary {
      display: none;
    }

    .ai-case-summary {
      margin: 0 1rem 1rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .ai-case-summary[hidden] {
      display: none;
    }

    .ai-case-summary h2 {
      margin: 0 0 0.45rem;
      color: var(--ink);
      font-size: 0.95rem;
    }

    .ai-case-summary-body {
      max-width: 900px;
      margin: 0;
      color: #344054;
      font-size: 0.88rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .ai-case-check {
      max-width: 900px;
      margin-top: 0.8rem;
      padding: 0.8rem 0.9rem;
      border: 1px solid #f0c36a;
      border-left: 4px solid #f59e0b;
      border-radius: 4px;
      background: #fffbeb;
      color: #7c4a03;
    }

    .ai-case-check[hidden] {
      display: none;
    }

    .ai-case-check h3 {
      margin: 0 0 0.4rem;
      font-size: 0.9rem;
      color: #7c4a03;
    }

    .ai-case-check ul {
      margin: 0;
      padding-left: 1.1rem;
    }

    .ai-case-check li + li {
      margin-top: 0.25rem;
    }

    .case-notes-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.45fr);
      gap: 1rem;
    }

    .case-notes-list {
      display: grid;
      gap: 0.65rem;
    }

    .case-note {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0.7rem;
      background: #fff;
    }

    .case-note strong {
      display: block;
      margin-bottom: 0.25rem;
      color: var(--ink);
    }

    .case-note small {
      display: block;
      margin-bottom: 0.45rem;
      color: var(--muted);
    }

    .case-note p {
      margin: 0;
      color: #344054;
      white-space: pre-wrap;
    }

    .case-note-form {
      display: grid;
      gap: 0.75rem;
      align-content: start;
    }

    .case-workflow-layout {
      display: grid;
      gap: 0.65rem;
    }

    .workflow-runner {
      display: grid;
      gap: 0.65rem;
      max-width: none;
    }

    .workflow-run-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0.75rem;
      align-items: start;
      max-width: none;
    }

    .workflow-step-panel {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 50;
      width: min(310px, 86vw);
      max-height: 100vh;
      box-sizing: border-box;
      border-right: 1px solid var(--line);
      background: #fff;
      padding: 0.85rem;
      box-shadow: 12px 0 28px rgba(15, 23, 42, 0.16);
      transform: translateX(-104%);
      transition: transform 0.18s ease;
      display: flex;
      flex-direction: column;
    }

    .workflow-step-panel.open {
      transform: translateX(0);
    }

    .workflow-step-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.65rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.65rem;
      border-bottom: 1px solid var(--line);
    }

    .workflow-step-panel h3 {
      margin: 0;
      font-size: 0.86rem;
      color: #344054;
    }

    .workflow-drawer-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--line);
    }

    .workflow-drawer-tab {
      min-height: 30px;
      padding: 0.32rem 0.45rem;
      border: 1px solid transparent;
      border-bottom: 0;
      background: transparent;
      color: #475467;
      font-size: 0.78rem;
    }

    .workflow-drawer-tab.active {
      border-color: var(--line);
      background: #fff;
      color: var(--brand);
    }

    #workflowStepsDrawerBody,
    #workflowActionsDrawerBody {
      min-height: 0;
      flex: 1 1 auto;
      overflow-y: auto;
      padding-right: 0.15rem;
    }

    .workflow-step-close {
      width: 32px;
      min-height: 30px;
      padding: 0;
      background: #fff;
    }

    .workflow-step-list {
      display: grid;
      gap: 0.32rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .workflow-step {
      width: 100%;
      min-height: 30px;
      padding: 0.32rem 0.42rem;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 0.76rem;
      text-align: left;
    }

    .workflow-step.completed {
      border-color: #86efac;
      background: #f0fdf4;
      color: #166534;
    }

    .workflow-step.current {
      border-color: var(--brand);
      background: #eef8fb;
      color: var(--ink);
      font-weight: 900;
    }

    .workflow-step.future {
      color: #98a2b3;
      cursor: default;
      opacity: 0.75;
    }

    .workflow-step:disabled {
      cursor: default;
    }

    .workflow-drawer-section {
      display: grid;
      gap: 0.55rem;
    }

    .workflow-drawer-section h4 {
      margin: 0.3rem 0 0;
      font-size: 0.82rem;
      color: #101828;
    }

    .workflow-log-card {
      display: grid;
      gap: 0.35rem;
      padding: 0.55rem;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f8fafc;
      font-size: 0.76rem;
    }

    .workflow-history-segment {
      display: grid;
      gap: 0.55rem;
      padding: 0.75rem;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }

    .workflow-history-segment h4 {
      margin: 0;
      color: #101828;
      font-size: 0.9rem;
    }

    .workflow-history-table {
      margin: 0;
    }

    .workflow-history-checks {
      display: grid;
      gap: 0.45rem;
    }

    .workflow-log-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.4rem;
      font-weight: 900;
      color: #101828;
    }

    .workflow-result-pill {
      border-radius: 999px;
      padding: 0.12rem 0.4rem;
      border: 1px solid #d0d5dd;
      background: #fff;
      color: #475467;
      font-size: 0.68rem;
      white-space: nowrap;
    }

    .workflow-result-pill.pass {
      border-color: #86efac;
      background: #f0fdf4;
      color: #166534;
    }

    .workflow-result-pill.fail {
      border-color: #fecaca;
      background: #fef2f2;
      color: #991b1b;
    }

    .workflow-check-rule {
      padding-top: 0.35rem;
      border-top: 1px solid #e4e7ec;
      color: #344054;
      line-height: 1.35;
    }

    .workflow-captured-data {
      margin: 0;
      max-height: 150px;
      overflow: auto;
      padding: 0.45rem;
      border: 1px solid #e4e7ec;
      border-radius: 4px;
      background: #fff;
      color: #344054;
      white-space: pre-wrap;
      font-size: 0.68rem;
    }

    .workflow-question-card {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0.75rem;
      background: #fff;
    }

    .workflow-question-card h3 {
      margin: 0 0 0.55rem;
      font-size: 0.95rem;
      line-height: 1.25;
    }

    .workflow-description {
      margin: 0 0 0.8rem;
      color: #344054;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .workflow-options {
      display: grid;
      gap: 0.4rem;
    }

    .workflow-option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.5rem;
      align-items: center;
      padding: 0.38rem 0.5rem;
      border: 1px solid #d8dee2;
      border-radius: 4px;
      background: #fff;
      font-weight: 700;
    }

    .workflow-option input {
      width: auto;
      min-height: auto;
    }

    .workflow-input-fields {
      display: grid;
      gap: 0.75rem;
    }

    .workflow-progress-banner {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      align-items: center;
      margin: 0.35rem 0 0.85rem;
      padding: 0.65rem 0.75rem;
      border: 1px solid #b8ddea;
      border-radius: 6px;
      background: #eef9fc;
    }

    .workflow-progress-banner strong {
      display: block;
      margin-bottom: 0.12rem;
    }

    .workflow-progress-banner p {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .workflow-progress-list {
      display: grid;
      gap: 0.55rem;
    }

    .workflow-progress-item {
      border: 1px solid #b8ddea;
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
    }

    .workflow-progress-item summary {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.65rem;
      align-items: center;
      padding: 0.65rem 0.75rem;
      cursor: pointer;
      list-style: none;
      background: #eef9fc;
    }

    .workflow-progress-item summary::-webkit-details-marker {
      display: none;
    }

    .workflow-progress-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.35rem;
      height: 1.35rem;
      border: 1px solid #98a2b3;
      border-radius: 999px;
      color: #475467;
      font-weight: 800;
      font-size: 0.82rem;
      background: #fff;
    }

    .workflow-progress-status.complete {
      border-color: #86efac;
      color: #15803d;
      background: #f0fdf4;
    }

    .workflow-progress-body {
      padding: 0.75rem;
    }

    .workflow-select-table {
      width: 100%;
      max-width: none;
      border-collapse: collapse;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 0.88rem;
    }

    .workflow-select-table th,
    .workflow-select-table td {
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    .workflow-select-table th {
      background: #f3f6f8;
      color: #344054;
    }

    .workflow-select-table input[type="radio"] {
      width: auto;
      min-height: auto;
    }

    .workflow-select-table input[type="text"],
    .workflow-select-table input[type="number"] {
      min-width: 12rem;
    }

    .workflow-select-empty {
      margin: 0;
      color: var(--muted);
    }

    .workflow-item-search-field {
      position: relative;
    }

    .workflow-item-suggestions {
      position: absolute;
      z-index: 20;
      left: 0;
      right: 0;
      top: calc(100% + 0.25rem);
      max-height: 240px;
      overflow: auto;
      border: 1px solid #cfd8e3;
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.14);
    }

    .workflow-item-suggestions button {
      display: grid;
      gap: 0.12rem;
      width: 100%;
      min-height: 0;
      padding: 0.55rem 0.65rem;
      border: 0;
      border-bottom: 1px solid #edf1f5;
      border-radius: 0;
      background: #fff;
      color: var(--ink);
      text-align: left;
    }

    .workflow-item-suggestions button:hover,
    .workflow-item-suggestions button:focus-visible {
      background: #eef9fc;
      outline: none;
    }

    .workflow-item-suggestions small,
    .workflow-item-suggestion-empty {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .workflow-item-suggestion-empty {
      padding: 0.65rem;
    }

    .workflow-run-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 0.45rem;
    }

    .workflow-action-table {
      width: 100%;
      max-width: none;
      border-collapse: collapse;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 0.88rem;
    }

    .workflow-action-table th,
    .workflow-action-table td {
      padding: 0.55rem 0.65rem;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    .workflow-action-table th {
      background: #f3f6f8;
      color: #344054;
    }

    .workflow-action-response {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.5rem;
      align-items: start;
    }

    .workflow-action-icon {
      width: 1.25rem;
      height: 1.25rem;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1;
      background: #eef4ff;
      color: #175cd3;
      border: 1px solid #b2ccff;
    }

    .workflow-action-icon::before {
      content: "\2026";
    }

    .workflow-action-icon.success {
      background: #ecfdf3;
      color: #027a48;
      border-color: #abefc6;
    }

    .workflow-action-icon.success::before {
      content: "\2713";
    }

    .workflow-action-icon.failed {
      background: #fef3f2;
      color: #b42318;
      border-color: #fecdca;
    }

    .workflow-action-icon.failed::before {
      content: "\00D7";
    }

    .workflow-action-icon.warning {
      background: #fffaeb;
      color: #b54708;
      border-color: #fedf89;
    }

    .workflow-action-icon.warning::before {
      content: "!";
      font-weight: 900;
    }

    .workflow-action-icon.skipped {
      background: #f8fafc;
      color: #667085;
      border-color: #cbd5e1;
    }

    .workflow-action-icon.skipped::before {
      content: "-";
      font-weight: 900;
    }

    .workflow-action-icon.running {
      background: #fff;
      color: transparent;
      border-color: #b2ccff;
      position: relative;
    }

    .workflow-action-icon.running::before {
      content: "";
      width: 0.72rem;
      height: 0.72rem;
      border-radius: 999px;
      border: 2px solid #b2ccff;
      border-top-color: #175cd3;
      animation: workflowActionSpin 0.75s linear infinite;
    }

    .workflow-check-running {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      justify-content: center;
      width: 100%;
      margin: 0.75rem 0 0.35rem;
      color: #475467;
      font-weight: 800;
      text-align: center;
    }

    .workflow-check-spinner {
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 999px;
      border: 3px solid #d1e0ff;
      border-top-color: var(--brand);
      animation: workflowActionSpin 0.75s linear infinite;
    }

    .workflow-check-note {
      text-align: center;
    }

    @keyframes workflowActionSpin {
      to {
        transform: rotate(360deg);
      }
    }

    .workflow-action-error {
      margin-top: 0.3rem;
      color: #b42318;
      font-weight: 700;
    }

    .workflow-action-debug {
      margin-top: 0.45rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8fafc;
      color: var(--ink);
      font-size: 0.78rem;
    }

    .workflow-action-debug summary {
      cursor: pointer;
      padding: 0.45rem 0.55rem;
      font-weight: 800;
    }

    .workflow-action-debug-body {
      display: grid;
      gap: 0.45rem;
      padding: 0 0.55rem 0.55rem;
    }

    .workflow-debug-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    .workflow-debug-table th,
    .workflow-debug-table td {
      border: 1px solid var(--line);
      padding: 0.3rem 0.4rem;
      text-align: left;
      vertical-align: top;
    }

    .workflow-allocation-panel {
      margin-top: 0.55rem;
      border: 1px solid #d0d5dd;
      background: #fff;
      border-radius: 6px;
      padding: 0.6rem;
      max-width: 560px;
    }

    .workflow-allocation-head {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: baseline;
      margin-bottom: 0.45rem;
    }

    .workflow-allocation-total {
      color: #475467;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .workflow-allocation-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-size: 0.82rem;
    }

    .workflow-allocation-table th,
    .workflow-allocation-table td {
      border: 1px solid var(--line);
      padding: 0.4rem;
      text-align: left;
      vertical-align: middle;
    }

    .workflow-allocation-table input[type="number"] {
      width: 7rem;
      max-width: 100%;
      min-height: 30px;
      padding: 0.25rem 0.4rem;
    }

    .workflow-allocation-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      align-items: center;
      margin-top: 0.5rem;
    }

    .workflow-validation-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 0.84rem;
    }

    .workflow-validation-table th,
    .workflow-validation-table td {
      padding: 0.5rem 0.55rem;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    .workflow-validation-table th {
      background: #f3f6f8;
      color: #344054;
    }

    .workflow-validation-table input {
      width: auto;
      min-height: auto;
    }

    .workflow-action-confirm {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .workflow-action-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin-top: 0.35rem;
      position: relative;
      font-size: 0.76rem;
      font-weight: 700;
      color: #344054;
      cursor: pointer;
    }

    .workflow-action-meta {
      display: block;
    }

    .workflow-action-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .workflow-action-toggle-track {
      width: 34px;
      height: 18px;
      border-radius: 999px;
      background: #cbd5e1;
      position: relative;
      transition: background 0.15s ease;
      flex: 0 0 auto;
    }

    .workflow-action-toggle-track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.25);
      transition: transform 0.15s ease;
    }

    .workflow-action-toggle input:checked + .workflow-action-toggle-track {
      background: var(--brand);
    }

    .workflow-action-toggle input:checked + .workflow-action-toggle-track::after {
      transform: translateX(16px);
    }

    button {
      min-height: 34px;
      padding: 0.38rem 0.75rem;
      border-radius: 4px;
      border: 1px solid #d8dee2;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--brand-600);
    }

    .btn-secondary {
      background: #fff;
      color: var(--ink);
    }

    @media (max-width: 620px) {
      body {
        padding: 0.8rem;
      }

      .case-grid {
        grid-template-columns: 1fr;
      }

      .case-notes-layout {
        grid-template-columns: 1fr;
      }

      .workflow-run-shell {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column-reverse;
      }
    }
  </style>
</head>

<body>
  <main class="case-card">
    <header class="case-header">
      <div class="case-title-wrap">
        <button id="headerWorkflowStepToggle" class="header-step-toggle" type="button" aria-label="Show workflow steps" aria-expanded="false">&#9776;</button>
        <h1>Raise Case</h1>
      </div>
      <div class="case-context" aria-label="Case context">
        <span id="contextDate">Today</span>
        <span id="contextStore">Store</span>
        <span id="contextCustomer">Customer</span>
      </div>
    </header>

    <form id="raiseCaseForm" class="case-body">
      <div class="case-tabs" role="tablist" aria-label="Raise case sections">
        <button id="primaryInfoTab" class="case-tab active" type="button" role="tab" aria-selected="true" aria-controls="primaryInfoPanel" data-panel="primaryInfoPanel">Primary Info</button>
        <button id="incidentInfoTab" class="case-tab" type="button" role="tab" aria-selected="false" aria-controls="incidentInfoPanel" data-panel="incidentInfoPanel">Incident Info</button>
        <button id="userNotesTab" class="case-tab" type="button" role="tab" aria-selected="false" aria-controls="userNotesPanel" data-panel="userNotesPanel">User Notes</button>
        <button id="customerServiceTab" class="case-tab" type="button" role="tab" aria-selected="false" aria-controls="customerServicePanel" data-panel="customerServicePanel">Customer Service</button>
      </div>

      <div id="primaryInfoPanel" class="case-panel case-grid" role="tabpanel" aria-labelledby="primaryInfoTab">
        <label>
          Subject
          <input id="caseSubject" name="subject" type="text" required>
        </label>

        <label>
          Store
          <input id="caseStoreName" name="storeName" type="text" readonly>
          <input id="caseStore" name="store" type="hidden">
          <input id="caseStoreNetSuiteId" name="storeNetSuiteId" type="hidden">
          <input id="caseStoreDistributionLocationId" name="storeDistributionLocationId" type="hidden">
        </label>

        <label>
          Customer
          <input id="caseCustomerName" name="customerName" type="text" readonly>
          <input id="caseCustomerId" name="customerId" type="hidden">
        </label>

        <label>
          Status
          <input id="caseStatusName" name="statusName" type="text" readonly>
          <input id="caseStatus" name="status" type="hidden">
        </label>

        <label>
          Assigned To
          <select id="caseAssignedTo" name="assignedTo" required>
            <option value="">Loading users...</option>
          </select>

      <div id="incidentInfoPanel" class="case-panel case-grid" role="tabpanel" aria-labelledby="incidentInfoTab" hidden>
        <label>
          Incident Date
          <input id="caseIncidentDate" name="incidentDate" type="date">
        </label>

        <label>
          Type
          <select id="caseType" name="type">
            <option value="">Loading types...</option>
          </select>
        </label>

        <label>
          Sub-Type
          <select id="caseSubType" name="subType">
            <option value="">Loading sub-types...</option>
          </select>
        </label>

        <label>
          Item
          <select id="caseItem" name="item">
            <option value="">Loading items...</option>
          </select>
        </label>
      </div>

      <div id="userNotesPanel" class="case-panel case-notes-layout" role="tabpanel" aria-labelledby="userNotesTab" hidden>
        <div>
          <div id="caseNotesList" class="case-notes-list" aria-live="polite">
            <p class="case-status">Open an existing case to review user notes.</p>
          </div>
        </div>

        <div class="case-note-form">
          <label>
            Note Title
            <input id="caseNoteTitle" type="text" placeholder="Add a note title">
          </label>
          <label>
            Note
            <textarea id="caseNoteText" placeholder="Add a user note"></textarea>
          </label>
          <button id="addCaseNoteBtn" type="button" class="btn-secondary">Add Note</button>
          <div id="caseNoteStatus" class="case-status" aria-live="polite"></div>
        </div>
      </div>

      <div id="customerServicePanel" class="case-panel case-workflow-layout" role="tabpanel" aria-labelledby="customerServiceTab" hidden>
        <label>
          Workflow
          <select id="caseWorkflowSelect">
            <option value="">Loading workflows...</option>
          </select>
        </label>
        <div id="caseWorkflowProgressBanner" class="workflow-progress-banner" hidden></div>

        <div id="caseWorkflowRunner" class="workflow-runner" aria-live="polite">
          <p class="case-status">Select a workflow to begin.</p>
        </div>

        <table id="caseWorkflowActionTable" class="workflow-action-table" hidden>
          <thead>
            <tr>
              <th style="width: 90px;">Step</th>
              <th>Action Message</th>

          </thead>
          <tbody id="caseWorkflowActions">

    <section id="aiCaseSummary" class="ai-case-summary" aria-live="polite" hidden>
      <h2>Case Summary</h2>
      <p id="aiCaseSummaryBody" class="ai-case-summary-body">Loading draft case summary...</p>
      <div id="aiCaseCheck" class="ai-case-check" hidden>
        <h3>Please check</h3>
        <ul id="aiCaseCheckList"></ul>
      </div>
    </section>

    <aside id="workflowStepsDrawer" class="workflow-step-panel" aria-label="Workflow steps" aria-hidden="true">
      <div class="workflow-step-panel-head">
        <h3>Workflow</h3>
        <button id="workflowStepsClose" class="workflow-step-close" type="button" aria-label="Close workflow steps">x</button>
      </div>
      <div class="workflow-drawer-tabs" role="tablist" aria-label="Workflow drawer">
        <button id="workflowDrawerStepsTab" class="workflow-drawer-tab active" type="button" data-workflow-drawer-tab="steps">Workflow Steps</button>
        <button id="workflowDrawerActionsTab" class="workflow-drawer-tab" type="button" data-workflow-drawer-tab="actions">Actions</button>
      </div>
      <div id="workflowStepsDrawerBody"></div>
      <div id="workflowActionsDrawerBody" hidden></div>
    </aside>
  </main>

  <script src="/js/storage.js"></script>
  <script>
    const USER_THEME_CACHE_KEY = "eposUserTheme";
    let loadedCase = null;
    const caseNoteCache = new Map();
    const workflowRun = {
      workflows: [],
      records: [],
      inputOptionsCache: new Map(),
      itemSearchItems: [],
      itemSearchLoading: null,
      salesOrderItems: [],
      salesOrderItemsLoading: null,
      selected: null,
      currentNodeId: "",
      started: false,
      stepHistory: [],
      answers: [],
      actions: [],
      auditActions: [],
      actionApprovals: [],
      actionEnableds: [],
      executedActionNodeIds: [],
      checkpoint: null,
      progressByWorkflowId: new Map(),
      focusedProgressWorkflowId: "",
      pausedAtBreak: false,
      resumeNodeId: "",
      checks: [],
      debugSessionId: `case-debug-${Date.now()}-${Math.floor(Math.random() * 10000)}`,
      debugUser: null,
      debugNodeIds: [],
      debugEdgeIds: [],
      debugActionNodeIds: [],
      collectingFromStepIndex: -1,
      drawerTab: "steps",
      runningCheckNodeId: "",
      terminalNodeId: "",
      awaitingActionApproval: false,
      complete: false,
      actionsRendered: false,
      timer: null,
      pendingSalesOrderTabs: new Map(),
    };

    function params() {
      return new URLSearchParams(window.location.search);
    }

    function authHeaders(extra = {}) {
      const saved =
        (typeof storageGet === "function" ? storageGet() : null) ||
        (window.opener && typeof window.opener.storageGet === "function" ? window.opener.storageGet() : null);
      return {
        ...extra,
        ...(saved?.token ? { Authorization: `Bearer ${saved.token}` } : {}),
      };
    }

    function currentStoredSession() {
      return (
        (typeof storageGet === "function" ? storageGet() : null) ||
        (window.opener && typeof window.opener.storageGet === "function" ? window.opener.storageGet() : null) ||
        {}
      );
    }

    function isHexColor(value) {
      return /^#(?:[0-9a-f]{3}|[0-9a-f]{6})$/i.test(String(value || "").trim());
    }

    function normalizeHexColor(value) {
      if (!isHexColor(value)) return "";
      const hex = String(value).trim();
      if (hex.length === 4) return `#${hex[1]}${hex[1]}${hex[2]}${hex[2]}${hex[3]}${hex[3]}`.toUpperCase();
      return hex.toUpperCase();
    }

    function hexToRgb(hex) {
      const normalized = normalizeHexColor(hex);
      if (!normalized) return null;
      const value = parseInt(normalized.slice(1), 16);
      return {
        r: (value >> 16) & 255,
        g: (value >> 8) & 255,
        b: value & 255,
      };
    }

    function rgbToHex({ r, g, b }) {
      return `#${[r, g, b].map((value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, "0")).join("")}`.toUpperCase();
    }

    function mixColors(a, b, weight) {
      const first = hexToRgb(a);
      const second = hexToRgb(b);
      if (!first || !second) return normalizeHexColor(a);
      const w = Math.max(0, Math.min(1, weight));
      return rgbToHex({
        r: first.r * (1 - w) + second.r * w,
        g: first.g * (1 - w) + second.g * w,
        b: first.b * (1 - w) + second.b * w,
      });
    }

    function userThemeCacheKey() {
      const saved = currentStoredSession();
      const userKey = String(saved?.username || saved?.email || saved?.user?.email || "").trim().toLowerCase();
      return userKey ? `${USER_THEME_CACHE_KEY}:${userKey}` : USER_THEME_CACHE_KEY;
    }

    function getCachedPopupTheme() {
      try {
        return JSON.parse(localStorage.getItem(userThemeCacheKey()) || localStorage.getItem(USER_THEME_CACHE_KEY) || "null");
      } catch {
        return null;
      }
    }

    function applyPopupUserTheme() {
      const saved = currentStoredSession();
      const openerTheme = window.opener?.document?.documentElement;
      const cached = getCachedPopupTheme() || {};
      const primary = normalizeHexColor(
        saved.themeHex ||
        saved.themehex ||
        saved.theme?.primary ||
        cached.primary ||
        cached.themeHex ||
        openerTheme?.style?.getPropertyValue("--brand")
      );
      const accent = normalizeHexColor(
        saved.themeAccentHex ||
        saved.themeaccenthex ||
        saved.theme?.accent ||
        cached.accent ||
        cached.themeAccentHex ||
        openerTheme?.style?.getPropertyValue("--accent")
      );
      const root = document.documentElement;

      if (primary) {
        const rgb = hexToRgb(primary);
        const rgbText = `${rgb.r}, ${rgb.g}, ${rgb.b}`;
        root.style.setProperty("--brand", primary);
        root.style.setProperty("--brand-600", mixColors(primary, "#000000", 0.12));
        root.style.setProperty("--brand-700", mixColors(primary, "#000000", 0.24));
        root.style.setProperty("--brand-rgb", rgbText);
        root.style.setProperty("--brand-shadow", `rgba(${rgbText}, 0.18)`);
      }

      if (accent) {
        const rgb = hexToRgb(accent);
        const rgbText = `${rgb.r}, ${rgb.g}, ${rgb.b}`;
        root.style.setProperty("--accent", accent);
        root.style.setProperty("--accent-600", mixColors(accent, "#000000", 0.16));
        root.style.setProperty("--accent-soft", `rgba(${rgbText}, 0.16)`);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function displayWorkflowValue(value) {
      if (value === null || value === undefined || value === "") return "blank";
      return String(value);
    }

    function workflowOperatorLabel(operator) {
      return ({
        equals: "equals",
        notEquals: "does not equal",
        greaterThan: "is greater than",
        lessThan: "is less than",
        isSet: "is set",
        isNotSet: "is not set",
      })[operator] || operator || "equals";
    }

    function workflowCheckReviewValue(rule = {}, kind = "actual") {
      if (kind === "expected") return rule.expectedDisplay || rule.expectedValue || rule.expectedRawValue || "";
      return rule.actualDisplay || rule.actualValue || rule.actualRawValue || "";
    }

    function workflowFailedCheckReviewHtml(check = {}) {
      const failedRules = (Array.isArray(check.checks) ? check.checks : []).filter((rule) => !rule.passed);
      return `
        <div class="workflow-run-shell">
          <div class="workflow-question-card">
            <h3>${escapeHtml(check.label || "Check failed")}</h3>
            ${check.message ? `<p class="workflow-description">${escapeHtml(check.message)}</p>` : ""}
            <p class="case-status">This check failed. Review the current and expected values before continuing.</p>
            ${failedRules.length ? failedRules.map((rule) => `
              <div class="workflow-check-rule">
                <strong>${escapeHtml(rule.fieldLabel || rule.field || "Field")}</strong>
                ${escapeHtml(workflowOperatorLabel(rule.operator))}
                ${rule.operator === "isSet" || rule.operator === "isNotSet" ? "" : `<strong>${escapeHtml(displayWorkflowValue(workflowCheckReviewValue(rule, "expected")))}</strong>`}
                <br>
                Current: ${escapeHtml(displayWorkflowValue(workflowCheckReviewValue(rule, "actual")))}
                <br>
                Expected: ${rule.operator === "isSet" || rule.operator === "isNotSet"
                  ? escapeHtml(workflowOperatorLabel(rule.operator))
                  : escapeHtml(displayWorkflowValue(workflowCheckReviewValue(rule, "expected")))}
              </div>
            `).join("") : '<p class="case-status">No failed rule details were returned.</p>'}
            <div class="workflow-run-actions">
              <button id="restartWorkflowBtn" type="button" class="btn-secondary">Restart</button>
              <button id="continueFailedCheckBtn" type="button" class="btn-primary">Continue</button>
            </div>
          </div>
        </div>
      `;
    }

    function workflowActionTypeLabel(type = "") {
      return ({
        setCaseStatus: "Set Case Status",
        itemLineAction: "Item Line Action",
        addItemLine: "Add Item Line",
        email: "Email",
        closeSalesLine: "Close Sales Line",
        closeIntercompanyLine: "Close Intercompany Line",
        closeSupplierPurchaseOrderLine: "Close Supplier Purchase Order Line",
        refundCreditMemo: "Refund Credit Memo",
        applyCreditMemo: "Apply Credit Memo",
        creditRma: "Credit RMA",
        receiveRma: "Receive RMA",
        createRecord: "Create Record",
      })[type] || "Action message only";
    }

    function workflowActionMessageHtml(action = {}) {
      if (action.executionState === "skipped") return escapeHtml(action.executionMessage || "Skipped by user.");
      const response = String(action.response || "").trim();
      const text = escapeHtml(action.executionMessage || action.message || "No action note was set.");
      const url = String(action.executionDocumentUrl || "").trim();
      const number = String(action.executionDocumentNumber || "").trim();
      const context = response ? `<div>${escapeHtml(response)}</div>` : "";
      if (!url || !number) return `${context}${text}`;
      const opensInNewTab = action.executionDocumentOpenInNewTab === true;
      const link = opensInNewTab
        ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" title="Open in a new tab">${escapeHtml(number)}</a>`
        : `<a href="${escapeHtml(url)}" class="related-popup-link" title="Open in NetSuite">${escapeHtml(number)}</a>`;
      const escapedNumber = escapeHtml(number);
      const linkedText = text.includes(escapedNumber) ? text.replace(escapedNumber, link) : `${text} ${link}`;
      return `${context}${linkedText}`;
    }

    function workflowActionAllocationHtml(action = {}, index = 0) {
      if (action.executionState === "needsInput" && action.needsInput === "creditMemoInvoiceApplication") {
        const invoices = Array.isArray(action.invoiceOptions) ? action.invoiceOptions : [];
        const credits = Array.isArray(action.creditMemoOptions) ? action.creditMemoOptions : [];
        const creditOptions = credits.map((credit) => `<option value="${escapeHtml(credit.id)}" data-remaining="${escapeHtml(credit.remaining || credit.total || "0")}">${escapeHtml(credit.tranId || credit.id)} — ${escapeHtml(credit.remaining || credit.total || "0")}</option>`).join("");
        const rows = invoices.map((invoice, rowIndex) => `
          <tr data-credit-application-row="${index}" data-row-index="${rowIndex}" data-invoice-id="${escapeHtml(invoice.id)}" data-invoice-remaining="${escapeHtml(invoice.remaining || invoice.total || "0")}">
            <td>${escapeHtml(invoice.tranId || invoice.id)}<br><small>Open: ${escapeHtml(invoice.remaining || invoice.total || "0")}</small></td>
            <td><select data-credit-application-credit="${index}"><option value="">Select Credit Memo</option>${creditOptions}</select></td>
            <td><input type="number" min="0" step="0.01" data-credit-application-amount="${index}" placeholder="Amount"></td>
          </tr>
        `).join("");
        return `
          <div class="workflow-allocation-panel" data-credit-application-panel="${index}">
            <div class="workflow-allocation-head"><strong>Apply Credit Memo</strong></div>
            <table class="workflow-allocation-table">
              <thead><tr><th>Open Sales Invoice</th><th>Available Credit Memo</th><th>Amount</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
            <div class="workflow-allocation-actions">
              <span class="workflow-action-error" data-credit-application-error="${index}" hidden></span>
              <button type="button" class="btn-primary" data-credit-application-confirm="${index}">Apply Selected Credits</button>
            </div>
          </div>
        `;
      }
      if (
        action.executionState !== "needsInput" ||
        !["customerDepositAllocation", "customerCreditMemoAllocation"].includes(action.needsInput)
      ) return "";
      const isCreditMemo = action.needsInput === "customerCreditMemoAllocation";
      const documents = Array.isArray(action.depositOptions) ? action.depositOptions : [];
      const title = isCreditMemo ? "Credit memo allocation" : "Customer deposit allocation";
      const noun = isCreditMemo ? "Credit Memo" : "Deposit";
      const empty = isCreditMemo ? "No credit memos were returned." : "No customer deposits were returned.";
      const expected = Number(action.expectedAmount || 0);
      const rows = documents.map((document, rowIndex) => {
        const amount = Number(document.total || document.amount || 0);
        return `
          <tr>
            <td><input type="checkbox" data-allocation-select="${index}" data-allocation-row="${rowIndex}" ${documents.length === 1 ? "checked" : ""}></td>
            <td>${escapeHtml(document.tranId || document.id || "-")}</td>
            <td>${escapeHtml(document.total || document.amount || "-")}</td>
            <td><input type="number" step="0.01" min="0" max="${escapeHtml(String(amount || expected || ""))}" value="" data-allocation-amount="${index}" data-allocation-row="${rowIndex}"></td>
          </tr>
        `;
      }).join("");
      return `
        <div class="workflow-allocation-panel" data-allocation-panel="${index}">
          <div class="workflow-allocation-head">
            <strong>${escapeHtml(title)}</strong>
            <span class="workflow-allocation-total">Refund total: ${escapeHtml(expected ? expected.toFixed(2) : "-")}</span>
          </div>
          <table class="workflow-allocation-table">
            <thead>
              <tr>
                <th>Use</th>
                <th>${escapeHtml(noun)}</th>
                <th>Available</th>
                <th>Refund amount</th>
              </tr>
            </thead>
            <tbody>${rows || `<tr><td colspan="4">${escapeHtml(empty)}</td></tr>`}</tbody>
          </table>
          <div class="workflow-allocation-actions">
            <span class="workflow-action-error" data-allocation-error="${index}" hidden></span>
            <button type="button" class="btn-primary" data-allocation-confirm="${index}">Continue</button>
          </div>
        </div>
      `;
    }

    function workflowHistorySegmentHtml() {
      const checkpointActions = Array.isArray(workflowRun.checkpoint?.actions) ? workflowRun.checkpoint.actions : [];
      const completedActions = checkpointActions.filter((action) =>
        ["success", "failed", "skipped"].includes(String(action.executionState || "").toLowerCase())
      );
      const checkpointChecks = Array.isArray(workflowRun.checkpoint?.checks) ? workflowRun.checkpoint.checks : [];
      if (!completedActions.length && !checkpointChecks.length) return "";
      const actionRows = completedActions.map((action, index) => {
        const state = String(action.executionState || "").toLowerCase();
        const stateLabel = state === "success" ? "Completed" : state === "failed" ? "Failed" : "Skipped";
        return `
          <tr>
            <td>${index + 1}</td>
            <td>
              <div class="workflow-action-response">
                <span class="workflow-action-icon ${escapeHtml(state)}"></span>
                <div>
                  <strong>${escapeHtml(action.label || `Action ${index + 1}`)}</strong>
                  <span class="case-status"> ${escapeHtml(workflowActionTypeLabel(action.actionType))} - ${escapeHtml(stateLabel)}</span>
                  <div>${workflowActionMessageHtml(action)}</div>
                  ${action.executionError ? `<div class="workflow-action-error">${escapeHtml(action.executionError)}</div>` : ""}
                </div>
              </div>
            </td>
          </tr>
        `;
      }).join("");
      const checkRows = checkpointChecks.map((check) => {
        const resultClass = String(check.result || "").toLowerCase() === "pass" ? "pass" : "fail";
        return `
          <article class="workflow-log-card">
            <div class="workflow-log-title">
              <span>${escapeHtml(check.label || "Check")}</span>
              <span class="workflow-result-pill ${resultClass}">${escapeHtml(check.result || "Fail")}</span>
            </div>
            ${check.message ? `<p class="case-status">${escapeHtml(check.message)}</p>` : ""}
          </article>

    function normaliseWorkflowCompareValue(value) {
      if (value === null || value === undefined) return "";
      return String(value).trim();
    }

    function workflowNumericValue(value) {
      const number = Number(String(value ?? "").replace(/[^0-9.-]/g, ""));
      return Number.isFinite(number) ? number : null;
    }

    function compareWorkflowValues(actualValue, operator = "equals", expectedValue = "") {
      const actual = normaliseWorkflowCompareValue(actualValue);
      const expected = normaliseWorkflowCompareValue(expectedValue);
      if (operator === "isSet") return actual !== "";
      if (operator === "isNotSet") return actual === "";
      if (operator === "contains") return actual.toLowerCase().includes(expected.toLowerCase());
      if (operator === "notContains") return !actual.toLowerCase().includes(expected.toLowerCase());
      const actualNumber = workflowNumericValue(actual);
      const expectedNumber = workflowNumericValue(expected);
      if (operator === "greaterThan" && actualNumber !== null && expectedNumber !== null) return actualNumber > expectedNumber;
      if (operator === "lessThan" && actualNumber !== null && expectedNumber !== null) return actualNumber < expectedNumber;
      if (operator === "notEquals") return actual.toLowerCase() !== expected.toLowerCase();
      return actual.toLowerCase() === expected.toLowerCase();
    }

    function normaliseWorkflowSalesOrderItem(item = {}) {
      const id = itemId(item);
      const saleGross = item.saleGrossLine ?? item.grossSaleprice ?? item.saleprice ?? item.grossamt ?? "";
      const amountGross = item.amountGrossLine ?? item.grossAmount ?? item.grossamt ?? "";
      return {

        id: item.id || id,
        itemId: item.itemId || id,
        itemName: item.itemName || itemName(item),
        grossamt: item.grossamt ?? saleGross ?? amountGross,
        grossAmount: item.grossAmount ?? saleGross ?? amountGross,
        saleGrossLine: item.saleGrossLine ?? saleGross,
        grossSaleprice: item.grossSaleprice ?? saleGross,
        saleprice: item.saleprice ?? saleGross,
        amountGrossLine: item.amountGrossLine ?? amountGross,
        amount: item.netamount ?? item.netAmount ?? item.amountNetLine ?? item.amount ?? "",
      };
    }

    async function loadWorkflowSalesOrderItems() {
      const salesOrderId = String(loadedCase?.salesOrderId || params().get("salesOrderId") || "").trim();
      if (!salesOrderId) return [];
      if (workflowRun.salesOrderItems.length) return workflowRun.salesOrderItems;
      if (workflowRun.salesOrderItemsLoading) return workflowRun.salesOrderItemsLoading;
      workflowRun.salesOrderItemsLoading = fetch(`/api/netsuite/salesorder/${encodeURIComponent(salesOrderId)}?_=${Date.now()}`, {
        headers: authHeaders(),
        cache: "no-store",
      })
        .then(async (res) => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
          const rows = Array.isArray(data.salesOrder?.item?.items) ? data.salesOrder.item.items : [];
          workflowRun.salesOrderItems = rows.map(normaliseWorkflowSalesOrderItem);
          populateItems();
          return workflowRun.salesOrderItems;
        })
        .catch((err) => {
          console.warn("Could not load workflow sales order items:", err.message || err);
          workflowRun.salesOrderItems = [];
          return [];
        })
        .finally(() => {
          workflowRun.salesOrderItemsLoading = null;
        });
      return workflowRun.salesOrderItemsLoading;
    }

    function renderCaseNotes(notes = [], state = "") {
      const list = document.getElementById("caseNotesList");
      if (!list) return;

      if (state === "loading") {
        list.innerHTML = '<p class="case-status">Loading user notes...</p>';
        return;
      }

      if (!loadedCase?.id) {
        list.innerHTML = '<p class="case-status">Create or open a case before adding user notes.</p>';
        return;
      }

      if (!notes.length) {
        list.innerHTML = '<p class="case-status">No user notes found for this case.</p>';
        return;
      }

      const mergedNotes = notes.map((note) => {
        const id = String(note.id || note.ID || "").trim();
        const cached = id ? caseNoteCache.get(id) : null;
        const merged = {
          ...note,
          ...(cached && !note.title ? { title: cached.title } : {}),
          ...(cached && !note.memo ? { memo: cached.memo } : {}),
          ...(cached && !note.date ? { date: cached.date } : {}),
          ...(cached && !note.author ? { author: cached.author } : {}),
        };
        if (id && (merged.title || merged.memo)) caseNoteCache.set(id, merged);
        return merged;
      });

      list.innerHTML = mergedNotes.map((note) => `
        <article class="case-note">
          <strong>${escapeHtml(note.title || "Case Note")}</strong>
          <small>${escapeHtml([note.date, note.author].filter(Boolean).join(" - "))}</small>
          <p>${escapeHtml(note.memo || "")}</p>
        </article>
      `).join("");
    }

    function prependCaseNote(note = {}) {
      const list = document.getElementById("caseNotesList");
      if (!list || !loadedCase?.id) return;
      const id = String(note.id || note.ID || "").trim();
      if (id) caseNoteCache.set(id, note);
      const existing = list.innerHTML;
      const html = `
        <article class="case-note">
          <strong>${escapeHtml(note.title || "Case Note")}</strong>
          <small>${escapeHtml([note.date, note.author].filter(Boolean).join(" - "))}</small>
          <p>${escapeHtml(note.memo || "")}</p>
        </article>
      `;

      if (existing.includes("No user notes found") || existing.includes("Create or open a case") || existing.includes("Loading user notes")) {
        list.innerHTML = html;
      } else {
        list.insertAdjacentHTML("afterbegin", html);
      }
    }

    async function loadCaseNotes() {

      renderCaseNotes([], "loading");
      const res = await fetch(`/api/netsuite/salesorder/cases/${encodeURIComponent(loadedCase.id)}/notes?_=${Date.now()}`, {
        headers: authHeaders(),
        cache: "no-store",
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
      renderCaseNotes(Array.isArray(data.notes) ? data.notes : []);
    }

      const button = document.getElementById("addCaseNoteBtn");
      const title = titleInput.value.trim();
      const memo = noteInput.value.trim();

      if (!loadedCase?.id) {
        status.textContent = "Open an existing case before adding a note.";
        return;
      }

      if (!memo) {
        status.textContent = "Enter a note before saving.";
        return;
      }

      button.disabled = true;
      status.textContent = "Adding note...";
      try {
        const res = await fetch(`/api/netsuite/salesorder/cases/${encodeURIComponent(loadedCase.id)}/notes`, {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({ title, memo }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);

        titleInput.value = "";
        noteInput.value = "";
        status.textContent = "Note added.";
        prependCaseNote(data.note || { title, memo });
        loadCaseNotes().catch((err) => {
          console.warn("Note was added, but refresh failed:", err.message || err);
        });
      } catch (err) {
        console.error("Failed to add case note:", err);
        status.textContent = err.message || "Could not add note.";
      } finally {
        button.disabled = false;
      }
    }

    async function loadAiCaseSummary() {
      const panel = document.getElementById("aiCaseSummary");
      const body = document.getElementById("aiCaseSummaryBody");
      const checkPanel = document.getElementById("aiCaseCheck");
      const checkList = document.getElementById("aiCaseCheckList");
      if (!panel || !body) return;

      try {
        const res = await fetch("/api/netsuite/salesorder/case-draft-summary", {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
          cache: "no-store",
          body: JSON.stringify({ draft: currentCaseDraft() }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);

        if (data.enabled === false) {
          panel.hidden = true;
          return;
        }

        panel.hidden = false;
        body.textContent = data.summary || "No draft case summary is available yet.";

        const pleaseCheck = Array.isArray(data.pleaseCheck) ? data.pleaseCheck.filter(Boolean) : [];
        if (checkPanel && checkList) {
          checkPanel.hidden = pleaseCheck.length === 0;
          checkList.innerHTML = pleaseCheck.map((issue) => `<li>${escapeHtml(issue)}</li>`).join("");
        }
      } catch (err) {
        console.error("Failed to load AI case summary:", err);
        panel.hidden = false;
        body.textContent = err.message || "Could not generate the draft case summary.";
        if (checkPanel && checkList) {
          checkPanel.hidden = true;
          checkList.innerHTML = "";
        }
      }
    }

    function bindAiCaseSummaryRefresh() {
      const form = document.getElementById("raiseCaseForm");
      if (!form) return;

      let timer = null;
      const queue = () => {
        window.clearTimeout(timer);
        timer = window.setTimeout(loadAiCaseSummary, 650);
      };

      form.addEventListener("input", queue);
      form.addEventListener("change", queue);
    }

    function workflowDefinition(workflow = {}) {
      return workflow.definition && typeof workflow.definition === "object"
        ? workflow.definition
        : { nodes: [], edges: [] };
    }

    function workflowSettings(workflow = workflowRun.selected) {
      const settings = workflowDefinition(workflow).settings || {};
      return {
        executionMode: settings.executionMode === "fullExecution" ? "fullExecution" : "actionMessageOnly",
        pathwayDebug: settings.pathwayDebug === true,
      };
    }

    function workflowCriteria(workflow = {}) {
      const criteria = workflowDefinition(workflow).criteria;
      return Array.isArray(criteria) ? criteria : [];
    }

    function currentCaseId() {
      return String(params().get("caseId") || loadedCase?.id || "").trim();
    }

    function storedDebugUser() {
      const saved =
        (typeof storageGet === "function" ? storageGet() : null) ||
        (window.opener && typeof window.opener.storageGet === "function" ? window.opener.storageGet() : null) ||
        {};
      const name = String(
        saved.name ||
        saved.userName ||
        `${saved.firstName || ""} ${saved.lastName || ""}`.trim() ||
        saved.email ||
        ""
      ).trim();
      return {
        id: saved.id || saved.userId || "",
        name,
        email: saved.email || "",
        firstName: saved.firstName || "",
        lastName: saved.lastName || "",
        profileImage: saved.profileImage || saved.avatar || saved.picture || "",
      };
    }

    async function currentDebugUser() {
      if (workflowRun.debugUser) return workflowRun.debugUser;
      try {
        const res = await fetch("/api/me", {
          headers: authHeaders(),
          cache: "no-store",
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
        const user = data.user || {};
        workflowRun.debugUser = {
          id: user.id || "",
          name: `${user.firstName || ""} ${user.lastName || ""}`.trim() || user.email || "",
          email: user.email || "",
          firstName: user.firstName || "",
          lastName: user.lastName || "",
          profileImage: user.profileImage || "",
        };
      } catch {
        workflowRun.debugUser = storedDebugUser();
      }
      return workflowRun.debugUser;
    }

    function addWorkflowDebugNode(nodeId) {
      const clean = String(nodeId || "");
      if (clean && !workflowRun.debugNodeIds.includes(clean)) workflowRun.debugNodeIds.push(clean);
    }

    function addWorkflowDebugEdge(edgeId) {
      const clean = String(edgeId || "");
      if (clean && !workflowRun.debugEdgeIds.includes(clean)) workflowRun.debugEdgeIds.push(clean);
    }

    function addWorkflowDebugAction(nodeId) {
      const clean = String(nodeId || "");
      if (clean && !workflowRun.debugActionNodeIds.includes(clean)) workflowRun.debugActionNodeIds.push(clean);
      addWorkflowDebugNode(clean);
    }

    async function broadcastWorkflowDebug(nodeId = "", { ended = false } = {}) {
      if (!workflowRun.selected || !workflowSettings().pathwayDebug) return;
      const activeNodeId = String(nodeId || workflowRun.currentNodeId || workflowRun.terminalNodeId || "");
      if (!activeNodeId && !ended) return;
      if (activeNodeId && !ended) addWorkflowDebugNode(activeNodeId);
      const payload = {
        type: "cs-workflow-debug",
        workflowId: String(workflowRun.selected.id || ""),
        sessionId: workflowRun.debugSessionId,
        nodeId: activeNodeId,
        nodeIds: workflowRun.debugNodeIds,
        edgeIds: workflowRun.debugEdgeIds,
        actionNodeIds: workflowRun.debugActionNodeIds,
        user: ended ? (workflowRun.debugUser || storedDebugUser()) : await currentDebugUser(),
        ended,
        at: Date.now(),
      };
      try {
        const channel = new BroadcastChannel("cs-workflow-debug");
        channel.postMessage(payload);
        channel.close();
      } catch {}
      try {
        localStorage.setItem("csWorkflowDebug", JSON.stringify(payload));
      } catch {}
    }

    function endWorkflowDebug() {
      if (!workflowRun.selected || !workflowSettings().pathwayDebug) return;
      broadcastWorkflowDebug(workflowRun.currentNodeId || workflowRun.terminalNodeId || "", { ended: true });
    }

    function workflowNodes() {
      const definition = workflowDefinition(workflowRun.selected);
      return Array.isArray(definition.nodes) ? definition.nodes : [];
    }

    function workflowEdges() {
      const definition = workflowDefinition(workflowRun.selected);
      return Array.isArray(definition.edges) ? definition.edges : [];
    }

    function findWorkflowNode(id) {
      return workflowNodes().find((node) => String(node.id) === String(id)) || null;
    }

    function isWorkflowPromptNode(node = {}) {
      return node.type === "question" || node.type === "input" || node.type === "check";
    }

    function workflowStartNode() {
      return workflowNodes().find((node) => node.type === "start") || null;
    }

    function firstWorkflowNode() {
      const nodes = workflowNodes();
      const edges = workflowEdges();
      const incoming = new Set(edges.map((edge) => String(edge.to)));
      return (
        workflowStartNode() ||
        nodes.find((node) => isWorkflowPromptNode(node) && !incoming.has(String(node.id))) ||
        nodes.find((node) => isWorkflowPromptNode(node)) ||
        nodes.find((node) => !incoming.has(String(node.id))) ||
        nodes[0] ||
        null
      );
    }

    function outgoingWorkflowEdges(nodeId) {
      return workflowEdges().filter((edge) => String(edge.from) === String(nodeId));
    }

    function workflowSourceLabel(source = null) {
      if (!source) return "";
      if (source.type === "inputSalesOrderItem") return `Input item - ${source.label || source.itemName || source.inputNodeId || "selected item"}`;
      if (source.type === "input") return `Input - ${source.label || source.inputNodeId || "selected answer"}`;
      if (source.type === "intercompanySalesOrder") return "Intercompany Sales Order";
      if (source.recordId || source.documentNumber) return `${source.label || "Record"} - ${source.documentNumber || source.recordId}`;
      return "Store Sales Order";
    }

    function workflowInputConfig(node = {}) {
      const config = node.inputConfig && typeof node.inputConfig === "object" ? node.inputConfig : {};
      const type = ["string", "currency", "list", "select", "multiSelect", "boolean"].includes(config.type) ? config.type : "string";
      const fields = Array.isArray(config.fields) && config.fields.length
        ? config.fields.map((field, index) => ({
          id: field.id || `field_${index}`,
          label: field.label || `Response ${index + 1}`,
          mandatory: field.mandatory !== false,
          type: ["string", "currency", "list", "select", "multiSelect", "boolean"].includes(field.type) ? field.type : "string",
          listSource: field.listSource || "salesOrderItems",
          listField: field.listField || "",
          selectOptions: Array.isArray(field.selectOptions) ? field.selectOptions.map((option, optionIndex) => ({
            id: option.id || `option_${optionIndex}`,
            label: option.label || option.value || `Option ${optionIndex + 1}`,
            valueMode: option.valueMode === "affectedItemField" ? "affectedItemField" : "static",
            value: option.value || "",
            affectedItemField: option.affectedItemField || "",
          })) : [],
        }))
        : [{
          id: "answer",
          label: "Response",
          mandatory: config.mandatory !== false,
          type,
          listSource: config.listSource || "salesOrderItems",
          listField: config.listField || "",
          selectOptions: [],
        }];
      return {
        type,
        listSource: config.listSource || "salesOrderItems",
        listField: config.listField || "",
        fields,
      };
    }

    function workflowRecordSourceId(source = "") {
      const match = String(source || "").match(/^record:(\d+)$/);
      return match ? match[1] : "";
    }

    function workflowInputRecord(source = "") {
      const id = workflowRecordSourceId(source);
      return workflowRun.records.find((record) => String(record.id) === String(id)) || null;
    }

    function workflowInputField(record = null, internalId = "") {
      return (record?.fields || []).find((field) => String(field.internalId) === String(internalId)) || null;
    }

    function workflowCheckInputNode(node = {}) {
      return findWorkflowNode(node?.checkConfig?.inputNodeId || "");
    }

    function workflowCheckInputStep(node = {}) {
      return workflowRun.stepHistory.find((step) => String(step.nodeId) === String(node?.checkConfig?.inputNodeId || ""));
    }

    function workflowCheckInputUsesSalesOrderItems(node = {}) {
      const input = workflowCheckInputNode(node);
      if (input?.type !== "input") return false;
      const fields = workflowInputConfig(input).fields;
      if (fields.some((field) => ["list", "multiSelect"].includes(field.type) && field.listSource === "salesOrderItems")) return true;
      return ["list", "multiSelect"].includes(input.inputConfig?.type) && input.inputConfig?.listSource === "salesOrderItems";
    }

    function workflowInputPrimaryAnswer(inputNode = {}, inputStep = {}) {
      const fields = workflowInputConfig(inputNode).fields;
      const itemField = fields.find((field) => ["list", "multiSelect"].includes(field.type) && field.listSource === "salesOrderItems");
      const firstField = itemField || fields[0];
      if (firstField && inputStep.answers && Object.prototype.hasOwnProperty.call(inputStep.answers, firstField.id)) {
        return {
          value: inputStep.answers[firstField.id] || "",
          label: inputStep.answerLabels?.[firstField.id] || firstField.label || inputNode.question || inputNode.label || "Input",
          fieldId: firstField.id,
        };
      }
      return {
        value: inputStep.answer || "",
        label: inputNode?.question || inputNode?.label || "Input",
        fieldId: "",
      };
    }

    function workflowInputCurrentAnswer(nodeId = "", fieldId = "answer") {
      const step = workflowRun.stepHistory.find((item) => String(item.nodeId) === String(nodeId));
      if (step?.answers && Object.prototype.hasOwnProperty.call(step.answers, fieldId)) return step.answers[fieldId] || "";
      return fieldId === "answer" ? step?.answer || "" : "";
    }

    function workflowSalesOrderItemOptions() {
      return currentSaleItems()
        .map((item) => ({ id: itemId(item), name: itemName(item) }))
        .filter((item) => item.id && item.name)
        .filter((item, index, list) => list.findIndex((next) => next.id === item.id) === index);
    }

    function workflowSalesOrderItemRows() {
      return currentSaleItems()
        .map((item, index) => {
          const quantity = workflowRowValue(item, "quantity");
          const rate = workflowRowValue(item, "rate");
          return {
            id: itemId(item),
            name: itemName(item),
            quantity,
            rate,
            amount: workflowLineNetAmount(item, rate, quantity),
            grossamt: workflowRowValue(item, "grossamt"),
            lineId: item.lineId || item.line || item.lineuniquekey || String(index + 1),
          };
        })
        .filter((item) => item.id && item.name);
    }

    function workflowNumber(value) {
      if (value === undefined || value === null || value === "") return null;
      const cleaned = String(value).replace(/[^\d.-]/g, "");
      if (!cleaned || cleaned === "-" || cleaned === ".") return null;
      const number = Number(cleaned);
      return Number.isFinite(number) ? number : null;
    }

    function workflowDecimalString(value, places = 2) {
      const number = workflowNumber(value);
      if (number === null) return value === undefined || value === null ? "" : String(value);
      return number.toFixed(places);
    }

    function workflowLineNetAmount(item, rate, quantity) {
      const rateNumber = workflowNumber(rate);
      const quantityNumber = workflowNumber(quantity);
      if (rateNumber !== null && quantityNumber !== null) {
        return workflowDecimalString(rateNumber * quantityNumber);
      }
      const explicit = workflowRowValue(item, "amount");
      if (explicit !== "") return workflowDecimalString(explicit);
      if (rateNumber !== null) return workflowDecimalString(rateNumber);
      return "";
    }

    function workflowLineAmountForQuantity(rate, quantity, fallbackAmount = "", originalQuantity = "") {
      const rateNumber = workflowNumber(rate);
      const quantityNumber = workflowNumber(quantity);
      if (rateNumber !== null && quantityNumber !== null) {
        return workflowDecimalString(rateNumber * quantityNumber);
      }
      const fallbackNumber = workflowNumber(fallbackAmount);
      const originalQuantityNumber = workflowNumber(originalQuantity);
      if (fallbackNumber !== null && quantityNumber !== null && originalQuantityNumber) {
        return workflowDecimalString((fallbackNumber / originalQuantityNumber) * quantityNumber);
      }
      return fallbackAmount || "";
    }

    function workflowAffectedItemRow() {
      const wanted = String(loadedCase?.itemId || document.getElementById("caseItem")?.value || "").trim();
      if (!wanted) return null;
      return currentSaleItems().find((item) => String(itemId(item)) === wanted) || null;
    }

    function workflowRowValue(row = {}, fieldId = "") {
      const wanted = String(fieldId || "").trim();
      if (!wanted) return "";
      const aliases = {
        grossamt: [
          "grossamt",
          "grossAmt",
          "grossamount",
          "saleGrossLine",
          "grossSaleprice",
          "saleprice",
          "grossAmount",
          "saleGross",
          "total",
          "lineTotal",
          "amountGrossLine",
          "gross",
          "amount",
        ],
        amount: [
          "netamount",
          "netAmount",
          "amountNetLine",
          "amountnetline",
          "lineAmount",
          "lineamount",
          "amount",
        ],
        rate: ["rate", "salePrice", "saleNetPerUnit", "saleNet"],
        quantity: ["quantity", "qty"],
        description: ["description", "memo"],
      };
      const candidates = [
        ...(aliases[wanted.toLowerCase()] || []),
        wanted,
        wanted.toLowerCase(),
        wanted.toUpperCase(),
        wanted.replace(/_/g, ""),
        `${wanted}_display`,
        `${wanted}display`,
        `${wanted}Name`,
        `${wanted}_name`,
      ];
      for (const key of candidates) {
        if (row && Object.prototype.hasOwnProperty.call(row, key)) {
          const value = row[key];
          if (value && typeof value === "object") return value.id || value.value || value.refName || value.name || "";
          if (value !== undefined && value !== null && String(value).trim() !== "") return String(value);
        }
      }
      return "";
    }

    function workflowInputSelectOptionRows(input = {}) {
      const affectedItem = workflowAffectedItemRow();
      return (input.selectOptions || []).map((option, index) => {
        const valueMode = option.valueMode === "affectedItemField" ? "affectedItemField" : "static";
        const value = valueMode === "affectedItemField"
          ? workflowRowValue(affectedItem, option.affectedItemField)
          : option.value;
        const itemLabel = affectedItem ? itemName(affectedItem) : "";
        return {
          id: option.id || `select_option_${index}`,
          label: option.label || value || "Option",
          valueMode,
          value: value == null ? "" : String(value),
          itemLabel,
          affectedItemField: option.affectedItemField || "",
        };
      });
    }

    function workflowItemSearchRows() {
      return (workflowRun.itemSearchItems || [])
        .map((item) => ({
          id: itemId(item),
          name: itemName(item),
          displayName: String(item["Display Name"] || item.displayName || "").trim(),
        }))
        .filter((item) => item.id && item.name)
        .filter((item, index, list) => list.findIndex((next) => next.id === item.id) === index);
    }

    async function loadWorkflowItemSearchItems() {
      if (workflowRun.itemSearchItems.length) return workflowRun.itemSearchItems;
      if (workflowRun.itemSearchLoading) return workflowRun.itemSearchLoading;
      workflowRun.itemSearchLoading = fetch("/api/netsuite/items", {
        headers: authHeaders(),
        cache: "no-store",
      })
        .then(async (res) => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data?.error || `HTTP ${res.status}`);
          workflowRun.itemSearchItems = Array.isArray(data.results) ? data.results : [];
          return workflowRun.itemSearchItems;
        })
        .finally(() => {
          workflowRun.itemSearchLoading = null;
        });
      return workflowRun.itemSearchLoading;
    }

    function workflowInputItemAnswerLabel(nodeId = "", input = {}) {
      const answer = workflowInputCurrentAnswer(nodeId, input.id);
      if (!answer) return "";
      const step = workflowRun.stepHistory.find((item) => String(item.nodeId) === String(nodeId));
      const savedLabel = step?.answerLabels?.[input.id] || "";
      if (savedLabel && savedLabel !== answer) return savedLabel;
      return workflowItemSearchRows().find((item) => String(item.id) === String(answer))?.name || savedLabel || "";
    }

    function workflowInputOptionCacheKey(node = {}, field = null) {
      const config = workflowInputConfig(node);
      const input = field || config.fields[0] || config;
      return `${input.listSource}:${input.listField}`;
    }

    async function loadWorkflowInputListOptions(node = {}, field = null) {
      const config = workflowInputConfig(node);
      const input = field || config.fields[0] || config;
      if (input.type !== "list" || input.listSource === "salesOrderItems") return;
      const record = workflowInputRecord(input.listSource);
      const listField = workflowInputField(record, input.listField);
      const key = workflowInputOptionCacheKey(node, input);
      if (!record || !listField?.id) {
        workflowRun.inputOptionsCache.set(key, []);
        return;
      }
      const res = await fetch(`/api/cs-workflows/records/${encodeURIComponent(record.id)}/fields/${encodeURIComponent(listField.id)}/options`, {
        headers: authHeaders(),
        cache: "no-store",
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
      workflowRun.inputOptionsCache.set(key, Array.isArray(data.options) ? data.options : []);
    }

    function renderWorkflowInputFieldControl(node = {}, input = {}) {
      const answer = workflowInputCurrentAnswer(node.id, input.id);
      const label = input.label || "Response";
      if (input.type === "currency") {
        return `
          <label>
            ${escapeHtml(label)}
            <input data-workflow-input-answer="${escapeHtml(input.id)}" type="number" step="0.01" inputmode="decimal" value="${escapeHtml(answer)}" placeholder="0.00">
          </label>
        `;
      }
      if (input.type === "boolean") {
        return `
          <label>
            ${escapeHtml(label)}
            <select data-workflow-input-answer="${escapeHtml(input.id)}">
              <option value="">Select response</option>
              <option value="true" ${answer === "true" ? "selected" : ""}>True</option>
              <option value="false" ${answer === "false" ? "selected" : ""}>False</option>
            </select>
          </label>
        `;
      }
      if (input.type === "select") {
        const rows = workflowInputSelectOptionRows(input);
        const fieldId = String(input.id || "");
        const selectedIndex = rows.findIndex((row) => String(row.value) === String(answer));
        const staticOnly = rows.length > 0 && rows.every((row) => row.valueMode === "static");
        if (staticOnly) {
          return `
            <label>
              ${escapeHtml(label)}
              <select data-workflow-static-select="${escapeHtml(fieldId)}" data-workflow-input-answer="${escapeHtml(fieldId)}">
                <option value="">Select option</option>
                ${rows.map((row) => `<option value="${escapeHtml(row.value)}" ${String(row.value) === String(answer) ? "selected" : ""}>${escapeHtml(row.label)}</option>`).join("")}
              </select>
            </label>
          `;
        }
        return `
          <div>
            <label>${escapeHtml(label)}</label>
            ${rows.length ? `
              <table class="workflow-select-table">
                <thead>
                  <tr>
                    <th>Choose</th>
                    <th>Option</th>
                    <th>Item</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.map((row, index) => {
                    const checked = selectedIndex >= 0 ? index === selectedIndex : false;
                    return `
                      <tr
                        data-workflow-select-row="${escapeHtml(fieldId)}"
                        data-workflow-select-option-id="${escapeHtml(row.id)}"
                        data-workflow-select-mode="${escapeHtml(row.valueMode)}"
                        data-workflow-select-label="${escapeHtml(row.label)}"
                        data-workflow-select-value="${escapeHtml(row.value)}"
                        data-workflow-select-item="${escapeHtml(row.itemLabel)}">
                        <td>
                          <input
                            type="radio"
                            name="workflowSelect_${escapeHtml(fieldId)}"
                            data-workflow-select-option="${escapeHtml(fieldId)}"
                            value="${escapeHtml(row.id)}"
                            ${checked ? "checked" : ""}>
                        </td>
                        <td>${escapeHtml(row.label)}</td>
                        <td>${row.valueMode === "affectedItemField" ? escapeHtml(row.itemLabel || "Affected item") : ""}</td>
                        <td>
                          ${row.valueMode === "affectedItemField"
                            ? escapeHtml(row.value || "")
                            : `<input data-workflow-select-static-value="${escapeHtml(fieldId)}" type="text" value="${escapeHtml(row.value)}" placeholder="Enter value">`}
                        </td>
                      </tr>
                    `;
                  }).join("")}
                </tbody>
              </table>
            ` : '<p class="workflow-select-empty">No select options configured.</p>'}
          </div>
        `;
      }
      if (input.type === "list") {
        const isSalesOrderItems = input.listSource === "salesOrderItems";
        const isItemSearch = input.listSource === "item";
        if (isItemSearch) {
          const searchValue = workflowInputItemAnswerLabel(node.id, input);
          return `
            <label class="workflow-item-search-field">
              ${escapeHtml(label)}
              <input
                data-workflow-item-search="${escapeHtml(input.id)}"
                type="search"
                value="${escapeHtml(searchValue)}"
                placeholder="Search item"
                autocomplete="off">
              <input
                data-workflow-input-answer="${escapeHtml(input.id)}"
                data-workflow-input-label="${escapeHtml(input.id)}"
                type="hidden"
                value="${escapeHtml(answer)}">
              <div class="workflow-item-suggestions" data-workflow-item-suggestions="${escapeHtml(input.id)}" hidden></div>
            </label>
          `;
        }
        const key = workflowInputOptionCacheKey(node, input);
