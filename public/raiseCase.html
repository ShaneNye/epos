        const options = isSalesOrderItems ? workflowSalesOrderItemOptions() : workflowRun.inputOptionsCache.get(key);
        if (!isSalesOrderItems && !workflowRun.inputOptionsCache.has(key)) {
          loadWorkflowInputListOptions(node, input)
            .then(() => {
              if (String(workflowRun.currentNodeId) === String(node.id)) renderWorkflowRunner();
            })
            .catch((err) => {
              workflowRun.inputOptionsCache.set(key, []);
              if (String(workflowRun.currentNodeId) === String(node.id)) {
                renderWorkflowRunner(err.message || "Could not load list options.");
              }
            });
          return `
            <label>
              ${escapeHtml(label)}
              <select data-workflow-input-answer="${escapeHtml(input.id)}" disabled>
                <option value="">Loading options...</option>
              </select>
            </label>
          `;
        }
        return `
          <label>
            ${escapeHtml(label)}
            <select data-workflow-input-answer="${escapeHtml(input.id)}">
              <option value="">Select response</option>
              ${(options || []).map((option) => `
                <option value="${escapeHtml(option.id)}" ${String(answer) === String(option.id) ? "selected" : ""}>${escapeHtml(option.name)}</option>
              `).join("")}
            </select>
          </label>
        `;
      }
      if (input.type === "multiSelect") {
        const rows = workflowSalesOrderItemRows();
        let selected = [];
        try {
          const parsed = JSON.parse(answer || "[]");
          selected = Array.isArray(parsed) ? parsed : [];
        } catch {
          selected = String(answer || "").split(",").map((item) => item.trim()).filter(Boolean);
        }
        const selectedForRow = (row = {}) => selected.find((item) => {
          if (item && typeof item === "object") {
            return String(item.lineId || "") === String(row.lineId || "") ||
              String(item.id || "") === String(row.id || "");
          }
          return String(item || "") === String(row.id || "");
        }) || null;
        return `
          <div class="workflow-input-multiselect">
            <strong>${escapeHtml(label)}</strong>
            ${rows.length ? `
              <table class="workflow-select-table">
                <thead>
                  <tr>
                    <th>Use</th>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Amount</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.map((row) => {
                    const selectedRow = selectedForRow(row);
                    const checked = !!selectedRow;
                    const selectedQty = selectedRow && typeof selectedRow === "object" ? selectedRow.quantity : "";
                    const quantity = selectedQty || row.quantity || 1;
                    return `
                    <tr
                      data-workflow-multiselect-row="${escapeHtml(input.id)}"
                      data-item-id="${escapeHtml(row.id)}"
                      data-item-line-id="${escapeHtml(row.lineId)}"
                      data-item-name="${escapeHtml(row.name)}"
                      data-item-quantity="${escapeHtml(row.quantity || "")}"
                      data-item-rate="${escapeHtml(row.rate || "")}"
                      data-item-amount="${escapeHtml(row.amount || "")}"
                      data-item-grossamt="${escapeHtml(row.grossamt || "")}">
                      <td>
                        <input
                          type="checkbox"
                          data-workflow-multiselect-option="${escapeHtml(input.id)}"
                          value="${escapeHtml(row.id)}"
                          ${checked ? "checked" : ""}>
                      </td>
                      <td>${escapeHtml(row.name)}</td>
                      <td>
                        <input
                          data-workflow-multiselect-quantity="${escapeHtml(input.id)}"
                          type="number"
                          min="0"
                          step="1"
                          max="${escapeHtml(row.quantity || "")}"
                          value="${escapeHtml(quantity)}"
                          ${checked ? "" : "disabled"}>
                      </td>
                      <td><span data-workflow-multiselect-amount-display>${escapeHtml(workflowLineAmountForQuantity(row.rate, quantity, row.amount || row.grossamt || "", row.quantity))}</span></td>
                    </tr>
                  `;
                  }).join("")}
                </tbody>
              </table>
            ` : '<p class="workflow-select-empty">No sales order items available.</p>'}
            <input data-workflow-input-answer="${escapeHtml(input.id)}" type="hidden" value="${escapeHtml(answer)}">
          </div>
        `;
      }
      return `
        <label>
          ${escapeHtml(label)}
          <input data-workflow-input-answer="${escapeHtml(input.id)}" type="text" value="${escapeHtml(answer)}" placeholder="Enter response">
        </label>
      `;
    }

    function renderWorkflowInputControl(node = {}) {
      const config = workflowInputConfig(node);
      return `
        <div class="workflow-input-fields">
          ${config.fields.map((field) => renderWorkflowInputFieldControl(node, field)).join("")}
        </div>
      `;
    }

    function bindWorkflowItemSearchInputs(node = {}, runner = document) {
      runner.querySelectorAll("[data-workflow-item-search]").forEach((input) => {
        const inputId = input.dataset.workflowItemSearch || "";
        const hidden = runner.querySelector(`[data-workflow-input-answer="${CSS.escape(inputId)}"]`);
        const suggestions = runner.querySelector(`[data-workflow-item-suggestions="${CSS.escape(inputId)}"]`);
        if (!hidden || !suggestions) return;

        const hideSuggestions = () => {
          suggestions.hidden = true;
          suggestions.innerHTML = "";
        };

        const renderSuggestions = async () => {
          const query = String(input.value || "").trim().toLowerCase();
          hidden.value = "";
          hidden.dataset.selectedLabel = "";
          if (query.length < 2) {
            hideSuggestions();
            return;
          }
          suggestions.hidden = false;
          suggestions.innerHTML = '<div class="workflow-item-suggestion-empty">Searching...</div>';
          try {
            await loadWorkflowItemSearchItems();
            const matches = workflowItemSearchRows()
              .filter((item) => {
                const haystack = `${item.name} ${item.displayName} ${item.id}`.toLowerCase();
                return haystack.includes(query);
              })
              .slice(0, 20);
            suggestions.innerHTML = matches.length
              ? matches.map((item) => `
                <button type="button" data-workflow-item-id="${escapeHtml(item.id)}" data-workflow-item-name="${escapeHtml(item.name)}">
                  <span>${escapeHtml(item.name)}</span>
                  <small>${escapeHtml(item.displayName || item.id)}</small>
                </button>
              `).join("")
              : '<div class="workflow-item-suggestion-empty">No items found.</div>';
          } catch (err) {
            suggestions.innerHTML = `<div class="workflow-item-suggestion-empty">${escapeHtml(err.message || "Could not load items.")}</div>`;
          }
        };

        input.addEventListener("input", renderSuggestions);
        input.addEventListener("focus", () => {
          if (String(input.value || "").trim().length >= 2 && !hidden.value) renderSuggestions();
        });
        input.addEventListener("blur", () => {
          window.setTimeout(hideSuggestions, 160);
        });
        suggestions.addEventListener("click", (event) => {
          const option = event.target.closest("[data-workflow-item-id]");
          if (!option) return;
          input.value = option.dataset.workflowItemName || "";
          hidden.value = option.dataset.workflowItemId || "";
          hidden.dataset.selectedLabel = option.dataset.workflowItemName || "";
          hideSuggestions();
        });
      });
    }

    function bindWorkflowSelectInputs(runner = document) {
      runner.querySelectorAll("[data-workflow-select-row]").forEach((row) => {
        const radio = row.querySelector("[data-workflow-select-option]");
        if (!radio) return;
        row.addEventListener("click", (event) => {
          if (event.target.closest("a, button")) return;
          radio.checked = true;
        });
      });
      runner.querySelectorAll("[data-workflow-select-static-value]").forEach((input) => {
        const row = input.closest("[data-workflow-select-row]");
        const radio = row?.querySelector("[data-workflow-select-option]");
        if (!radio) return;
        input.addEventListener("focus", () => {
          radio.checked = true;
        });
        input.addEventListener("input", () => {
          radio.checked = true;
        });
      });
    }

    function bindWorkflowMultiSelectInputs(runner = document) {
      runner.querySelectorAll("[data-workflow-multiselect-row]").forEach((row) => {
        const checkbox = row.querySelector("[data-workflow-multiselect-option]");
        const quantity = row.querySelector("[data-workflow-multiselect-quantity]");
        const amountDisplay = row.querySelector("[data-workflow-multiselect-amount-display]");
        if (!checkbox) return;
        const syncQuantity = () => {
          if (quantity) quantity.disabled = !checkbox.checked;
          if (amountDisplay) {
            amountDisplay.textContent = workflowLineAmountForQuantity(
              row.dataset.itemRate || "",
              quantity?.value || row.dataset.itemQuantity || 1,
              row.dataset.itemAmount || row.dataset.itemGrossamt || "",
              row.dataset.itemQuantity || ""
            );
          }
        };
        row.addEventListener("click", (event) => {
          if (event.target.closest("a, button, input")) return;
          checkbox.checked = !checkbox.checked;
          syncQuantity();
        });
        checkbox.addEventListener("change", syncQuantity);
        quantity?.addEventListener("input", syncQuantity);
        syncQuantity();
      });
    }

    function collectWorkflowInputAnswers(node = {}, runner = document) {
      const config = workflowInputConfig(node);
      const answers = {};
      const labels = {};
      config.fields.forEach((field) => {
        if (field.type === "select") {
          const staticSelect = runner.querySelector(`[data-workflow-static-select="${CSS.escape(String(field.id))}"]`);
          if (staticSelect) {
            answers[field.id] = staticSelect.value || "";
            labels[field.id] = staticSelect.selectedOptions?.[0]?.textContent || "";
            return;
          }
          const checked = runner.querySelector(`[data-workflow-select-option="${CSS.escape(String(field.id))}"]:checked`);
          const row = checked?.closest("[data-workflow-select-row]");
          const mode = row?.dataset.workflowSelectMode || "";
          const optionLabel = row?.dataset.workflowSelectLabel || "";
          const itemLabel = row?.dataset.workflowSelectItem || "";
          let value = "";
          let selectedText = "";
          if (mode === "static") {
            const staticInput = row?.querySelector(`[data-workflow-select-static-value="${CSS.escape(String(field.id))}"]`);
            value = staticInput?.value || "";
            selectedText = optionLabel ? `${optionLabel}: ${value}` : value;
          } else if (mode === "affectedItemField") {
            value = row?.dataset.workflowSelectValue || "";
            selectedText = [optionLabel, itemLabel, value].filter(Boolean).join(": ");
          }
          answers[field.id] = value;
          labels[field.id] = selectedText || value;
          return;
        }
        if (field.type === "multiSelect") {
          const checked = Array.from(runner.querySelectorAll(`[data-workflow-multiselect-option="${CSS.escape(String(field.id))}"]:checked`));
          const values = checked.map((item) => {
            const row = item.closest("[data-workflow-multiselect-row]");
            const quantityInput = row?.querySelector(`[data-workflow-multiselect-quantity="${CSS.escape(String(field.id))}"]`);
            const quantity = Number(quantityInput?.value || 0);
            const amount = workflowLineAmountForQuantity(
              row?.dataset.itemRate || "",
              quantity,
              row?.dataset.itemAmount || "",
              row?.dataset.itemQuantity || ""
            );
            const grossamt = workflowLineAmountForQuantity(
              "",
              quantity,
              row?.dataset.itemGrossamt || "",
              row?.dataset.itemQuantity || ""
            );
            return {
              id: String(item.value || "").trim(),
              lineId: row?.dataset.itemLineId || "",
              name: row?.dataset.itemName || item.value || "",
              quantity: Number.isFinite(quantity) && quantity > 0 ? quantity : 0,
              rate: row?.dataset.itemRate || "",
              amount,
              grossamt,
            };
          }).filter((item) => item.id && item.quantity > 0);
          const names = values.map((item) => `${item.name} x ${item.quantity}`).filter(Boolean);
          const value = JSON.stringify(values);
          answers[field.id] = value;
          labels[field.id] = names.join(", ");
          return;
        }
        const control = runner.querySelector(`[data-workflow-input-answer="${CSS.escape(String(field.id))}"]`);
        const value = control?.value || "";
        const searchInput = runner.querySelector(`[data-workflow-item-search="${CSS.escape(String(field.id))}"]`);
        const selectedText = searchInput
          ? (control?.dataset?.selectedLabel || searchInput.value || value)
          : control?.tagName === "SELECT"
          ? control.selectedOptions?.[0]?.textContent || value
          : value;
        answers[field.id] = value;
        labels[field.id] = selectedText;
      });
      const summary = config.fields
        .map((field) => {
          const value = labels[field.id] || answers[field.id] || "";
          return value ? `${field.label || "Response"}: ${value}` : "";
        })
        .filter(Boolean)
        .join("; ");
      return { summary, answers, labels };
    }

    function missingMandatoryWorkflowInputs(node = {}, collected = {}) {
      const config = workflowInputConfig(node);
      return config.fields.filter((field) => {
        if (field.mandatory === false) return false;
        const value = collected.answers?.[field.id];
        if (field.type === "multiSelect") {
          try { return !Array.isArray(JSON.parse(value || "[]")) || JSON.parse(value || "[]").length === 0; } catch { return true; }
        }
        return String(value ?? "").trim() === "";
      });
    }

    function resetWorkflowRun(workflow = null) {
      window.clearInterval(workflowRun.timer);
      endWorkflowDebug();
      workflowRun.pendingSalesOrderTabs.forEach((tab) => {
        if (tab && !tab.closed) tab.close();
      });
      workflowRun.pendingSalesOrderTabs.clear();
      workflowRun.selected = workflow;
      workflowRun.currentNodeId = "";
      workflowRun.started = false;
      workflowRun.stepHistory = [];
      workflowRun.answers = [];
      workflowRun.actions = [];
      workflowRun.auditActions = [];
      workflowRun.actionApprovals = [];
      workflowRun.actionEnableds = [];
      workflowRun.executedActionNodeIds = [];
      workflowRun.checkpoint = null;
      workflowRun.focusedProgressWorkflowId = "";
      workflowRun.pausedAtBreak = false;
      workflowRun.resumeNodeId = "";
      workflowRun.checks = [];
      workflowRun.debugNodeIds = [];
      workflowRun.debugEdgeIds = [];
      workflowRun.debugActionNodeIds = [];
      workflowRun.collectingFromStepIndex = -1;
      workflowRun.runningCheckNodeId = "";
      workflowRun.terminalNodeId = "";
      workflowRun.drawerTab = "steps";
      workflowRun.awaitingActionApproval = false;
      workflowRun.complete = false;
      workflowRun.actionsRendered = false;
      const table = document.getElementById("caseWorkflowActions");
      if (table) {
        table.innerHTML = '<tr><td colspan="2">No workflow actions have been submitted yet.</td></tr>';
      }
      const actionTable = document.getElementById("caseWorkflowActionTable");
      if (actionTable) actionTable.hidden = true;
      closeWorkflowSteps();
      updateWorkflowStepMenuVisibility();
    }

    function workflowProgressCaseId() {
      return String(params().get("caseId") || loadedCase?.id || "").trim();
    }

    function workflowProgressId(workflow = workflowRun.selected) {
      return String(workflow?.id || "").trim();
    }

    function workflowProgressUrl(workflow = workflowRun.selected) {
      const caseId = workflowProgressCaseId();
      const workflowId = workflowProgressId(workflow);
      if (!caseId || !workflowId) return "";
      return `/api/netsuite/salesorder/cases/${encodeURIComponent(caseId)}/workflow-progress/${encodeURIComponent(workflowId)}`;
    }

    function workflowRunCheckpointPayload(extra = {}) {
      const isPaused = extra.status === "paused" || workflowRun.pausedAtBreak;
      return {
        workflowId: workflowProgressId(),
        workflowName: workflowRun.selected?.name || "",
        currentNodeId: workflowRun.currentNodeId || "",
        terminalNodeId: workflowRun.terminalNodeId || "",
        resumeNodeId: workflowRun.resumeNodeId || "",
        breakNodeId: isPaused ? workflowRun.terminalNodeId || "" : "",
        stepHistory: workflowRun.stepHistory || [],
        answers: workflowRun.answers || [],
        checks: workflowRun.checks || [],
        actions: workflowCheckpointActions(),
        executedActionNodeIds: workflowRun.executedActionNodeIds || [],
        debugNodeIds: workflowRun.debugNodeIds || [],
        debugEdgeIds: workflowRun.debugEdgeIds || [],
        debugActionNodeIds: workflowRun.debugActionNodeIds || [],
        savedAt: new Date().toISOString(),
        ...extra,
      };
    }

    function workflowCheckpointActions() {
      return [...(workflowRun.auditActions || []), ...(workflowRun.actions || [])];
    }

    async function loadWorkflowProgress(workflow = workflowRun.selected) {
      const url = workflowProgressUrl(workflow);
      if (!url) return null;
      const res = await fetch(`${url}?_=${Date.now()}`, {
        headers: authHeaders(),
        cache: "no-store",
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
      return data.progress || null;
    }

    async function loadCaseWorkflowProgressList() {
      const caseId = workflowProgressCaseId();
      if (!caseId) return [];
      const res = await fetch(`/api/netsuite/salesorder/cases/${encodeURIComponent(caseId)}/workflow-progress?_=${Date.now()}`, {
        headers: authHeaders(),
        cache: "no-store",
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
      return Array.isArray(data.progress) ? data.progress : [];
    }

    async function saveWorkflowProgress(extra = {}) {
      const url = workflowProgressUrl();
      if (!url) return null;
      const progress = workflowRunCheckpointPayload(extra);
      const res = await fetch(url, {
        method: "PUT",
        headers: authHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({ progress }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
      workflowRun.checkpoint = data.progress || progress;
      if (workflowRun.checkpoint) workflowRun.progressByWorkflowId.set(workflowProgressId(), workflowRun.checkpoint);
      renderWorkflowProgressBanner();
      return workflowRun.checkpoint;
    }

    async function clearWorkflowProgress(workflow = workflowRun.selected) {
      const url = workflowProgressUrl(workflow);
      if (!url) return;
      const res = await fetch(url, {
        method: "DELETE",
        headers: authHeaders(),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
      workflowRun.progressByWorkflowId.delete(workflowProgressId(workflow));
      renderWorkflowProgressBanner();
    }

    function applyWorkflowProgress(progress = null) {
      if (!progress || typeof progress !== "object") return false;
      workflowRun.checkpoint = progress;
      workflowRun.stepHistory = Array.isArray(progress.stepHistory) ? progress.stepHistory : [];
      workflowRun.answers = Array.isArray(progress.answers) ? progress.answers : [];
      workflowRun.checks = Array.isArray(progress.checks) ? progress.checks : [];
      workflowRun.actions = Array.isArray(progress.actions) ? progress.actions : [];
      workflowRun.auditActions = [];
      workflowRun.executedActionNodeIds = Array.isArray(progress.executedActionNodeIds) ? progress.executedActionNodeIds.map(String) : [];
      workflowRun.debugNodeIds = Array.isArray(progress.debugNodeIds) ? progress.debugNodeIds : [];
      workflowRun.debugEdgeIds = Array.isArray(progress.debugEdgeIds) ? progress.debugEdgeIds : [];
      workflowRun.debugActionNodeIds = Array.isArray(progress.debugActionNodeIds) ? progress.debugActionNodeIds : [];
      workflowRun.terminalNodeId = String(progress.breakNodeId || progress.terminalNodeId || "");
      workflowRun.resumeNodeId = String(progress.resumeNodeId || "");
      workflowRun.currentNodeId = "";
      workflowRun.started = true;
      workflowRun.complete = true;
      workflowRun.awaitingActionApproval = false;
      workflowRun.pausedAtBreak = String(progress.status || "").toLowerCase() === "paused" || !!progress.breakNodeId;
      workflowRun.actionsRendered = true;
      workflowRun.actionApprovals = workflowRun.actions.map(defaultWorkflowActionApproval);
      workflowRun.actionEnableds = workflowRun.actions.map(defaultWorkflowActionEnabled);
      orderWorkflowActionsForReview();
      return true;
    }

    async function selectWorkflowProgress(workflowId = "") {
      let workflow = workflowRun.workflows.find((item) => String(item.id) === String(workflowId)) || null;
      const existingProgress = workflowRun.progressByWorkflowId.get(String(workflowId));
      if (!workflow && existingProgress) {
        workflow = {
          id: workflowId,
          name: existingProgress.workflowName || "Saved workflow",
          definition: { nodes: [], edges: [] },
        };
      }
      if (!workflow) return;
      const select = document.getElementById("caseWorkflowSelect");
      if (select && Array.from(select.options).some((option) => String(option.value) === String(workflow.id))) {
        select.value = String(workflow.id);
      }
      resetWorkflowRun(workflow);
      workflowRun.focusedProgressWorkflowId = String(workflow.id || "");
      let progress = workflowRun.progressByWorkflowId.get(String(workflow.id));
      if (!progress) {
        progress = await loadWorkflowProgress(workflow);
        if (progress) workflowRun.progressByWorkflowId.set(String(workflow.id), progress);
      }
      if (progress) applyWorkflowProgress(progress);
      renderWorkflowProgressBanner();
      renderWorkflowRunner();
    }

    function renderWorkflowProgressBanner() {
      const banner = document.getElementById("caseWorkflowProgressBanner");
      if (!banner) return;
      const entries = Array.from(workflowRun.progressByWorkflowId.entries())
        .map(([workflowId, progress]) => ({
          workflowId,
          progress,
          workflow: workflowRun.workflows.find((item) => String(item.id) === String(workflowId)) || {
            id: workflowId,
            name: progress?.workflowName || "Saved workflow",
            definition: { nodes: [], edges: [] },
          },
        }))
        .filter((item) => item.progress && (item.progress.status || item.progress.breakNodeId || item.progress.terminalNodeId));
      if (!entries.length) {
        banner.hidden = true;
        banner.innerHTML = "";
        return;
      }
      banner.hidden = false;
      banner.innerHTML = `
        <div class="workflow-progress-list">
          ${entries.map((entry) => workflowProgressAuditHtml(entry)).join("")}
        </div>
      `;
      banner.querySelectorAll("[data-continue-workflow-progress], [data-view-workflow-progress]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          const workflowId = button.dataset.continueWorkflowProgress || button.dataset.viewWorkflowProgress || "";
          if (button.dataset.viewWorkflowProgress) {
            const details = button.closest(".workflow-progress-item");
            if (details) details.open = true;
            workflowRun.focusedProgressWorkflowId = String(workflowId || "");
            return;
          }
          workflowRun.focusedProgressWorkflowId = String(workflowId || "");
          selectWorkflowProgress(workflowId).catch((err) => {
            console.error("Could not open workflow progress:", err);
            const statusText = document.getElementById("caseStatusText");
            if (statusText) statusText.textContent = err.message || "Could not open workflow.";
          });
        });
      });
    }

    function workflowProgressAuditHtml(entry = {}) {
      const progress = entry.progress || {};
      const workflow = entry.workflow || {};
      const status = String(progress.status || (progress.breakNodeId ? "paused" : "completed")).toLowerCase();
      const isComplete = status === "completed";
      const canContinue = !isComplete && workflowRun.workflows.some((item) => String(item.id) === String(entry.workflowId));
      const breakNode = workflowDefinition(workflow).nodes?.find((node) => String(node.id) === String(progress.breakNodeId || progress.terminalNodeId || ""));
      const savedAt = progress.savedAt || progress.updatedAt || "";
      const savedText = savedAt ? new Date(savedAt).toLocaleString() : "";
      const actionCount = (Array.isArray(progress.actions) ? progress.actions : [])
        .filter((action) => ["success", "failed", "skipped"].includes(String(action.executionState || "").toLowerCase()))
        .length;
      const summaryText = isComplete
        ? `Completed${savedText ? ` ${savedText}` : ""}`
        : `${breakNode?.label || breakNode?.message || "Paused at break"}${savedText ? ` - saved ${savedText}` : ""}`;
      const actionButton = isComplete
        ? `<button type="button" class="btn-secondary" data-view-workflow-progress="${escapeHtml(entry.workflowId)}">View</button>`
        : canContinue
        ? `<button type="button" class="btn-primary" data-continue-workflow-progress="${escapeHtml(entry.workflowId)}">Continue</button>`
        : `<button type="button" class="btn-secondary" data-view-workflow-progress="${escapeHtml(entry.workflowId)}">View</button>`;
      return `
        <details class="workflow-progress-item" ${String(entry.workflowId) === String(workflowRun.focusedProgressWorkflowId || "") ? "open" : ""}>
          <summary>
            <span class="workflow-progress-status ${isComplete ? "complete" : ""}">${isComplete ? "&#10003;" : "..."}</span>
            <span>
              <strong>${escapeHtml(workflow.name || progress.workflowName || "Workflow")}</strong>
              <p>${escapeHtml(summaryText)}${actionCount ? ` - ${actionCount} recorded action${actionCount === 1 ? "" : "s"}` : ""}</p>
            </span>
            ${actionButton}
          </summary>
          <div class="workflow-progress-body">
            ${workflowProgressHistoryHtml(progress)}
          </div>
        </details>
      `;
    }

    function workflowProgressHistoryHtml(progress = {}) {
      const previousCheckpoint = workflowRun.checkpoint;
      workflowRun.checkpoint = progress;
      const html = workflowHistorySegmentHtml() || '<p class="case-status">No recorded actions or checks were saved for this workflow.</p>';
      workflowRun.checkpoint = previousCheckpoint;
      return html;
    }

    function renderWorkflowRunner(message = "") {
      const runner = document.getElementById("caseWorkflowRunner");
      if (!runner) return;

      if (!workflowRun.selected) {
        runner.innerHTML = '<p class="case-status">Select a workflow to begin.</p>';
        renderWorkflowStepsDrawer();
        updateWorkflowStepMenuVisibility();
        return;
      }

      if (message) {
        runner.innerHTML = `<p class="case-status">${escapeHtml(message)}</p>`;
        renderWorkflowStepsDrawer();
        updateWorkflowStepMenuVisibility();
        return;
      }

      if (!workflowRun.started) {
        const description = String(workflowRun.selected.description || "").trim();
        runner.innerHTML = `
          <div class="workflow-question-card">
            <h3>${escapeHtml(workflowRun.selected.name || "Selected workflow")}</h3>
            <p class="workflow-description">${escapeHtml(description || "No workflow description has been added.")}</p>
            <div class="workflow-run-actions">
              <button id="beginWorkflowRunBtn" type="button" class="btn-primary">Begin</button>
            </div>
          </div>
        `;
        document.getElementById("beginWorkflowRunBtn")?.addEventListener("click", beginWorkflow);
        renderWorkflowStepsDrawer();
        updateWorkflowStepMenuVisibility();
        return;
      }

      if (workflowRun.complete) {
        if (workflowRun.pausedAtBreak && !workflowRun.awaitingActionApproval) {
          clearWorkflowExecutionTable();
          const breakNode = findWorkflowNode(workflowRun.terminalNodeId);
          const savedAt = workflowRun.checkpoint?.savedAt || workflowRun.checkpoint?.updatedAt || "";
          runner.innerHTML = `
            <div class="workflow-run-shell">
              <div class="workflow-question-card">
                <h3>${escapeHtml(breakNode?.label || breakNode?.message || "Workflow paused")}</h3>
                <p class="workflow-description">${escapeHtml(breakNode?.message || "This workflow is paused at a break point. Continue when the required external work has been completed.")}</p>
                ${savedAt ? `<p class="case-status">Checkpoint saved ${escapeHtml(new Date(savedAt).toLocaleString())}.</p>` : ""}
                <div class="workflow-run-actions">
                  <button id="restartWorkflowBtn" type="button" class="btn-secondary">Restart</button>
                  <button id="continueWorkflowBtn" type="button" class="btn-primary" ${workflowRun.resumeNodeId ? "" : "disabled"}>Continue</button>
                </div>
              </div>
            </div>
          `;
          document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
          document.getElementById("continueWorkflowBtn")?.addEventListener("click", continueWorkflowFromBreak);
          renderWorkflowStepsDrawer();
          updateWorkflowStepMenuVisibility();
          return;
        }

        if (workflowRun.awaitingActionApproval) {
          runner.innerHTML = renderWorkflowActionValidation();
          document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
          document.getElementById("newWorkflowBtn")?.addEventListener("click", startNewWorkflow);
          bindWorkflowActionValidation();
          renderWorkflowStepsDrawer();
          updateWorkflowStepMenuVisibility();
          return;
        }

        runner.innerHTML = `
          <div class="workflow-run-shell">
            <div class="workflow-question-card">
              <h3>Workflow complete</h3>
              <p class="case-status">This workflow has been saved to the audit history above.</p>
              <div class="workflow-run-actions">
                <button id="newWorkflowBtn" type="button" class="btn-primary">New workflow</button>
              </div>
            </div>
          </div>
        `;
        document.getElementById("newWorkflowBtn")?.addEventListener("click", startNewWorkflow);
        renderWorkflowStepsDrawer();
        updateWorkflowStepMenuVisibility();
        return;
      }

      const node = findWorkflowNode(workflowRun.currentNodeId);
      if (!node) {
        runner.innerHTML = '<p class="case-status">This workflow does not have a starting question yet.</p>';
        return;
      }
      broadcastWorkflowDebug(node.id);

      const options = Array.isArray(node.options) ? node.options.filter((option) => option?.label) : [];
      const title = node.question || node.label || "Workflow step";
      const note = node.message || "";
      const isInput = node.type === "input";
      const isCheck = node.type === "check";
      if (isCheck) {
        runner.innerHTML = `
          <div class="workflow-run-shell">
            <div class="workflow-question-card">
              <h3>${escapeHtml(title)}</h3>
              ${note ? `<p class="workflow-description workflow-check-note">${escapeHtml(note)}</p>` : ""}
              <div class="workflow-check-running" role="status" aria-live="polite">
                <span class="workflow-check-spinner" aria-hidden="true"></span>
                <span>Running Check</span>
              </div>
            <div class="workflow-run-actions">
              <button id="restartWorkflowBtn" type="button" class="btn-secondary">Restart</button>
            </div>
          </div>
          ${workflowHistorySegmentHtml()}
        </div>
      `;
        document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
        renderWorkflowStepsDrawer();
        updateWorkflowStepMenuVisibility();
        runWorkflowCheck(node);
        return;
      }
      runner.innerHTML = `
        <div class="workflow-run-shell">
          <div class="workflow-question-card">
            <h3>${escapeHtml(title)}</h3>
            ${note ? `<p class="workflow-description">${escapeHtml(note)}</p>` : ""}
            ${isInput ? renderWorkflowInputControl(node) : `
              <div class="workflow-options">
                ${options.map((option, index) => `
                  <label class="workflow-option">
                    <input type="radio" name="workflowAnswer" value="${escapeHtml(option.label)}" ${index === 0 ? "checked" : ""}>
                    <span>${escapeHtml(option.label)}</span>
                  </label>
                `).join("") || '<p class="case-status">This step has no response options yet.</p>'}
              </div>
            `}
            <div class="workflow-run-actions">
              <button id="restartWorkflowBtn" type="button" class="btn-secondary">Restart</button>
              <button id="nextWorkflowStepBtn" type="button" class="btn-primary" ${isInput || options.length ? "" : "disabled"}>Next</button>
            </div>
          </div>
          ${workflowHistorySegmentHtml()}
        </div>
      `;
      document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
      if (isInput) {
        bindWorkflowItemSearchInputs(node, runner);
        bindWorkflowSelectInputs(runner);
        bindWorkflowMultiSelectInputs(runner);
      }
      renderWorkflowStepsDrawer();
      updateWorkflowStepMenuVisibility();
      document.getElementById("nextWorkflowStepBtn")?.addEventListener("click", () => {
        const answer = isInput
          ? collectWorkflowInputAnswers(node, runner)
          : runner.querySelector('input[name="workflowAnswer"]:checked')?.value || "";
        if (isInput) {
          const missing = missingMandatoryWorkflowInputs(node, answer);
          if (missing.length) {
            const message = missing.map((field) => field.label).join(", ");
            let error = runner.querySelector("[data-workflow-input-error]");
            if (!error) {
              error = document.createElement("p");
              error.dataset.workflowInputError = "1";
              error.className = "workflow-action-error";
              runner.querySelector(".workflow-run-actions")?.before(error);
            }
            error.textContent = `Complete the mandatory input${missing.length === 1 ? "" : "s"}: ${message}`;
            return;
          }
        }
        advanceWorkflow(answer);
      });
    }

    function workflowQuestionNodesInOrder() {
      const nodes = workflowNodes();
      const seen = new Set();
      const ordered = [];
      const visit = (nodeId) => {
        const node = findWorkflowNode(nodeId);
        if (!node || seen.has(String(node.id))) return;
        seen.add(String(node.id));
        if (isWorkflowPromptNode(node)) ordered.push(node);
        outgoingWorkflowEdges(node.id).forEach((edge) => visit(edge.to));
      };
      const start = firstWorkflowNode();
      if (start) visit(start.id);
      nodes
        .filter((node) => isWorkflowPromptNode(node) && !seen.has(String(node.id)))
        .forEach((node) => ordered.push(node));
      return ordered;
    }

    function renderWorkflowStepList() {
      const historyIds = new Set(workflowRun.stepHistory.map((step) => String(step.nodeId)));
      const historyIndexById = new Map(workflowRun.stepHistory.map((step, index) => [String(step.nodeId), index]));
      const steps = workflowQuestionNodesInOrder();
      return `
        <ol class="workflow-step-list">
          ${steps.map((node, index) => {
            const nodeId = String(node.id);
            const historyIndex = historyIndexById.get(nodeId);
            const isCurrent = nodeId === String(workflowRun.currentNodeId);
            const isCompleted = historyIds.has(nodeId) && !isCurrent;
            const stateClass = isCurrent ? "current" : isCompleted ? "completed" : "future";
            const label = node.question || node.label || `Step ${index + 1}`;
            const clickable = Number.isFinite(historyIndex) && (workflowRun.complete || !isCurrent);
            return `
              <li>
                <button
                  type="button"
                  class="workflow-step ${stateClass}"
                  ${clickable ? `data-workflow-step-index="${historyIndex}"` : "disabled"}>
                  ${index + 1}. ${escapeHtml(label)}
                </button>
              </li>
            `;
          }).join("")}
        </ol>
      `;
    }

    function renderWorkflowActionsLog() {
      const checksHtml = workflowRun.checks.length
        ? workflowRun.checks.map((check) => {
          const resultClass = String(check.result || "").toLowerCase() === "pass" ? "pass" : "fail";
          const rules = Array.isArray(check.checks) ? check.checks : [];
          return `
            <article class="workflow-log-card">
              <div class="workflow-log-title">
                <span>${escapeHtml(check.label || "Check")}</span>
                <span class="workflow-result-pill ${resultClass}">${escapeHtml(check.result || "Fail")}</span>
              </div>
              ${check.source ? `
                <p class="case-status">
                  Source: ${escapeHtml(workflowSourceLabel(check.source))}
                  ${check.source.checkedSalesOrderId ? `- checked order ${escapeHtml(check.source.checkedSalesOrderId)}` : ""}
                </p>
              ` : ""}
              ${check.message ? `<p class="case-status">${escapeHtml(check.message)}</p>` : ""}
              ${rules.map((rule) => `
                <div class="workflow-check-rule">
                  <strong>${escapeHtml(rule.fieldLabel || rule.field || "Field")}</strong>
                  ${escapeHtml(workflowOperatorLabel(rule.operator))}
                  ${rule.operator === "isSet" || rule.operator === "isNotSet" ? "" : `<strong>${escapeHtml(displayWorkflowValue(workflowCheckReviewValue(rule, "expected")))}</strong>`}
                  <br>
                  Captured: ${escapeHtml(displayWorkflowValue(workflowCheckReviewValue(rule, "actual")))}
                  <span class="workflow-result-pill ${rule.passed ? "pass" : "fail"}">${rule.passed ? "Matched" : "Did not match"}</span>
                </div>
              `).join("") || '<p class="case-status">No rules were configured for this check.</p>'}
              ${check.data ? `
                <details>
                  <summary>Captured data</summary>
                  <pre class="workflow-captured-data">${escapeHtml(JSON.stringify(check.data, null, 2))}</pre>
                </details>
              ` : ""}
            </article>
          `;
        }).join("")
        : '<p class="case-status">No checks have run yet.</p>';

      const actionsHtml = workflowRun.actions.length
        ? workflowRun.actions.map((action, index) => `
          <article class="workflow-log-card">
            <div class="workflow-log-title">
              <span>${index + 1}. ${escapeHtml(action.label || "Action")}</span>
              <span class="workflow-result-pill">${escapeHtml(action.type || "action")}</span>
            </div>
            <p class="case-status">${escapeHtml(action.message || "No action note was set.")}</p>
          </article>
        `).join("")
        : '<p class="case-status">No action notes have triggered yet.</p>';

      return `
        <div class="workflow-drawer-section">
          <h4>Checks</h4>
          ${checksHtml}
          <h4>Action Notes</h4>
          ${actionsHtml}
        </div>
      `;
    }

    function renderWorkflowActionValidation() {
      const actions = workflowRun.actions || [];
      if (!actions.length) {
        return `
          <div class="workflow-run-shell">
            <div class="workflow-question-card">
              <h3>Workflow complete</h3>
              <p class="case-status">This workflow has been saved to the audit history above.</p>
              <div class="workflow-run-actions">
                <button id="newWorkflowBtn" type="button" class="btn-primary">New workflow</button>
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="workflow-run-shell">
          <div class="workflow-question-card">
            <h3>Review actions</h3>
            <p class="workflow-description">Check each action before executing this workflow path.</p>
            <table class="workflow-validation-table">
              <thead>
                <tr>
                  <th>Confirm</th>
                  <th>Action</th>
                  <th>Message</th>
                </tr>
              </thead>
              <tbody>
                ${actions.map((action, index) => `
                  <tr>
                    <td>
                      ${action.type === "break"
                        ? '<span class="case-status">-</span>'
                        : `<label class="workflow-action-confirm">
                            <input type="checkbox" data-workflow-action-approval="${index}" ${workflowRun.actionApprovals[index] ? "checked" : ""} aria-label="Confirm action ${index + 1}">
                          </label>`}
                    </td>
                    <td>
                      <strong>${escapeHtml(action.label || `Action ${index + 1}`)}</strong><br>
                      <span class="case-status workflow-action-meta">${escapeHtml(workflowActionTypeLabel(action.actionType))}</span>
                      ${action.mandatory === false ? `
                        <label class="workflow-action-toggle">
                          <input type="checkbox" data-workflow-action-enabled="${index}" ${workflowRun.actionEnableds[index] !== false ? "checked" : ""}>
                          <span class="workflow-action-toggle-track" aria-hidden="true"></span>
                          <span class="workflow-action-toggle-text">${workflowRun.actionEnableds[index] === false ? "Disabled" : "Enabled"}</span>
                        </label>
                      ` : ""}
                    </td>
                    <td>${escapeHtml(action.message || "No action note was set.")}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
            <div class="workflow-run-actions">
              <button id="restartWorkflowBtn" type="button" class="btn-secondary">Restart</button>
              <button id="executeWorkflowActionsBtn" type="button" class="btn-primary" ${workflowMandatoryActionsApproved() ? "" : "disabled"}>Execute</button>
            </div>
          </div>
        </div>
      `;
    }

    function bindWorkflowActionValidation() {
      const runner = document.getElementById("caseWorkflowRunner");
      if (!runner) return;
      const updateExecuteState = () => {
        const execute = document.getElementById("executeWorkflowActionsBtn");
        if (execute) execute.disabled = !workflowRun.actions.length || !workflowMandatoryActionsApproved();
      };
      runner.querySelectorAll("[data-workflow-action-approval]").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          const index = Number(checkbox.dataset.workflowActionApproval);
          if (Number.isFinite(index)) workflowRun.actionApprovals[index] = checkbox.checked;
          updateExecuteState();
        });
      });
      runner.querySelectorAll("[data-workflow-action-enabled]").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          const index = Number(checkbox.dataset.workflowActionEnabled);
          if (Number.isFinite(index)) workflowRun.actionEnableds[index] = checkbox.checked;
          const label = checkbox.closest(".workflow-action-toggle");
          const text = label?.querySelector(".workflow-action-toggle-text");
          if (text) text.textContent = checkbox.checked ? "Enabled" : "Disabled";
        });
      });
      document.getElementById("executeWorkflowActionsBtn")?.addEventListener("click", async () => {
        if (!workflowMandatoryActionsApproved()) return;
        reserveWorkflowSalesOrderTabs();
        const execute = document.getElementById("executeWorkflowActionsBtn");
        if (execute) {
          execute.disabled = true;
          execute.textContent = workflowSettings().executionMode === "fullExecution" ? "Executing..." : "Execute";
        }
        workflowRun.awaitingActionApproval = false;
        workflowRun.actionsRendered = true;
        renderWorkflowRunner();
        await executeWorkflowRunActions();
      });
    }

    function workflowActionCreatesSalesOrder(action = {}) {
      const target = String(action.createRecord?.targetRecord || "").replace(/[^a-z]/gi, "").toLowerCase();
      return action.actionType === "createRecord" && target === "salesorder";
    }

    function reserveWorkflowSalesOrderTabs() {
      workflowRun.actions.forEach((action, index) => {
        if (!workflowActionCreatesSalesOrder(action) || workflowActionSkippedByUser(index)) return;
        reserveWorkflowSalesOrderTab(index);
      });
    }

    function reserveWorkflowSalesOrderTab(index) {
      const existing = workflowRun.pendingSalesOrderTabs.get(index);
      if (existing && !existing.closed) return;
      const tabHost = window.opener && !window.opener.closed ? window.opener : window;
      const tabName = `WorkflowSalesOrder_${Date.now()}_${index}`;
      let tab = null;
      try {
        const anchor = tabHost.document.createElement("a");
        anchor.href = "about:blank";
        anchor.target = tabName;
        anchor.hidden = true;
        tabHost.document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        tab = tabHost.open("", tabName);
      } catch (err) {
        console.warn("Could not reserve the Sales Order tab through the main app window:", err);
      }
      if (!tab) tab = window.open("about:blank", tabName);
      if (tab) {
        workflowRun.pendingSalesOrderTabs.set(index, tab);
        renderPendingSalesOrderTab(tab);
      }
    }

    function renderPendingSalesOrderTab(tab) {
      try {
        tab.document.title = "Creating Customer Service Order";
        tab.document.body.innerHTML = `
          <main style="min-height:100vh;display:grid;place-items:center;background:#f4f7f9;font-family:Arial,sans-serif;color:#17324d;">
            <section style="display:flex;flex-direction:column;align-items:center;gap:22px;text-align:center;padding:40px;">
              <span aria-hidden="true" style="width:54px;height:54px;border:6px solid #d8e4ea;border-top-color:#0784a8;border-radius:50%;animation:customer-service-order-spin .8s linear infinite;"></span>
              <h1 style="margin:0;font-size:24px;font-weight:700;">Please Wait for Customer Service Order</h1>
              <p style="margin:0;color:#607486;font-size:15px;">The new sales order is being created.</p>
            </section>
          </main>
        `;
        const style = tab.document.createElement("style");
        style.textContent = "@keyframes customer-service-order-spin { to { transform: rotate(360deg); } }";
        tab.document.head.appendChild(style);
      } catch (err) {
        console.warn("Could not render the Sales Order waiting screen:", err);
      }
    }

    function completeWorkflowSalesOrderTab(index, url = "") {
      const tab = workflowRun.pendingSalesOrderTabs.get(index);
      workflowRun.pendingSalesOrderTabs.delete(index);
      if (!tab || tab.closed) return false;
      if (!url) {
        tab.close();
        return false;
      }
      tab.location.href = new URL(url, window.location.origin).href;
      tab.focus();
      return true;
    }

    function renderWorkflowStepsDrawer() {
      const stepsBody = document.getElementById("workflowStepsDrawerBody");
      const actionsBody = document.getElementById("workflowActionsDrawerBody");
      if (!stepsBody || !actionsBody) return;
      document.querySelectorAll("[data-workflow-drawer-tab]").forEach((tab) => {
        const isActive = tab.dataset.workflowDrawerTab === workflowRun.drawerTab;
        tab.classList.toggle("active", isActive);
        tab.setAttribute("aria-selected", isActive ? "true" : "false");
      });
      stepsBody.hidden = workflowRun.drawerTab !== "steps";
      actionsBody.hidden = workflowRun.drawerTab !== "actions";
      if (!workflowRun.started) {
        stepsBody.innerHTML = '<p class="case-status">Begin a workflow to view its steps.</p>';
        actionsBody.innerHTML = '<p class="case-status">Begin a workflow to view checks and actions.</p>';
        return;
      }
      stepsBody.innerHTML = renderWorkflowStepList();
      actionsBody.innerHTML = renderWorkflowActionsLog();
      stepsBody.querySelectorAll("[data-workflow-step-index]").forEach((button) => {
        button.addEventListener("click", () => {
          goToWorkflowStep(Number(button.dataset.workflowStepIndex));
          closeWorkflowSteps();
        });
      });
    }

    function isCustomerServiceTabActive() {
      return document.getElementById("customerServiceTab")?.classList.contains("active");
    }

    function updateWorkflowStepMenuVisibility() {
      const available = isCustomerServiceTabActive() && workflowRun.started;
      document.body.classList.toggle("workflow-steps-available", !!available);
      const toggle = document.getElementById("headerWorkflowStepToggle");
      if (toggle) toggle.disabled = !available;
      if (!available) closeWorkflowSteps();
    }

    function updateCustomerServiceChrome() {
      document.body.classList.toggle("customer-service-active", isCustomerServiceTabActive());
    }

    function openWorkflowSteps() {
      const drawer = document.getElementById("workflowStepsDrawer");
      const toggle = document.getElementById("headerWorkflowStepToggle");
      renderWorkflowStepsDrawer();
      drawer?.classList.add("open");
      drawer?.setAttribute("aria-hidden", "false");
      toggle?.setAttribute("aria-expanded", "true");
    }

    function closeWorkflowSteps() {
      const drawer = document.getElementById("workflowStepsDrawer");
      const toggle = document.getElementById("headerWorkflowStepToggle");
      drawer?.classList.remove("open");
      drawer?.setAttribute("aria-hidden", "true");
      toggle?.setAttribute("aria-expanded", "false");
    }

    function toggleWorkflowStepsDrawer() {
      const drawer = document.getElementById("workflowStepsDrawer");
      if (drawer?.classList.contains("open")) closeWorkflowSteps();
      else openWorkflowSteps();
    }

    function ensureCurrentStepInHistory() {
      if (!workflowRun.currentNodeId) return;
      const existingIndex = workflowRun.stepHistory.findIndex((step) => String(step.nodeId) === String(workflowRun.currentNodeId));
      if (existingIndex >= 0) {
        workflowRun.stepHistory = workflowRun.stepHistory.slice(0, existingIndex + 1);
        return;
      }
      const node = findWorkflowNode(workflowRun.currentNodeId);
      workflowRun.stepHistory.push({
        nodeId: workflowRun.currentNodeId,
        question: node?.question || node?.label || "Workflow step",
        answer: "",
        answers: {},
        answerLabels: {},
      });
    }

    function collectWorkflowAction(node) {
      addWorkflowDebugAction(node.id);
      if (workflowRun.executedActionNodeIds.includes(String(node.id))) return;
      const actionConfig = node?.actionConfig && typeof node.actionConfig === "object" ? node.actionConfig : {};
      const message = String(
        actionConfig.type === "email"
          ? actionConfig.emailAction?.message || node?.message || node?.label || ""
          : node?.message || node?.label || ""
      ).trim();
      if (!message && !actionConfig.type) return;
      workflowRun.actions.push({
        nodeId: node.id,
        label: node.label || "Action",
        type: node.type || "action",
        actionType: actionConfig.type || "",
        mandatory: actionConfig.mandatory !== false,
        response: actionConfig.response || "",
        createRecord: actionConfig.createRecord || null,
        itemLineAction: actionConfig.itemLineAction || null,
        emailAction: actionConfig.emailAction || null,
        message,
        stepIndex: workflowRun.collectingFromStepIndex,
      });
      workflowRun.actionApprovals.push(defaultWorkflowActionApproval(workflowRun.actions[workflowRun.actions.length - 1]));
      workflowRun.actionEnableds.push(defaultWorkflowActionEnabled(workflowRun.actions[workflowRun.actions.length - 1]));
    }

    function collectSystemWorkflowAction(node, message, actionConfig = {}) {
      addWorkflowDebugAction(node.id);
      workflowRun.actions.push({
        nodeId: node.id,
        label: node.label || node.type || "Action",
        type: node.type || "system",
        actionType: actionConfig.type || "",
        mandatory: true,
        statusId: actionConfig.statusId || "",
        statusName: actionConfig.statusName || "",
        message,
        stepIndex: workflowRun.collectingFromStepIndex,
      });
      workflowRun.actionApprovals.push(false);
      workflowRun.actionEnableds.push(true);
    }

    function orderWorkflowActionsForReview() {
      const rows = (workflowRun.actions || []).map((action, index) => ({
        action,
        approval: workflowRun.actionApprovals[index],
        enabled: workflowRun.actionEnableds[index],
      }));
      const ordered = [
        ...rows.filter((row) => row.action?.type !== "break"),
        ...rows.filter((row) => row.action?.type === "break"),
      ];
      workflowRun.actions = ordered.map((row) => row.action);
      workflowRun.actionApprovals = ordered.map((row) => row.approval ?? defaultWorkflowActionApproval(row.action));
      workflowRun.actionEnableds = ordered.map((row) => row.enabled ?? defaultWorkflowActionEnabled(row.action));
    }

    function trimWorkflowActionsFromStep(stepIndex) {
      if (!Number.isFinite(stepIndex) || stepIndex < 0) {
        workflowRun.actions = [];
      } else {
        workflowRun.actions = workflowRun.actions.filter((action) => Number(action.stepIndex ?? -1) < stepIndex);
      }
      workflowRun.actionApprovals = workflowRun.actions.map(defaultWorkflowActionApproval);
      workflowRun.actionEnableds = workflowRun.actions.map(defaultWorkflowActionEnabled);
      workflowRun.debugActionNodeIds = workflowRun.actions.map((action) => String(action.nodeId || "")).filter(Boolean);
    }

    function completeWorkflowRun() {
      if (workflowRun.terminalNodeId) broadcastWorkflowDebug(workflowRun.terminalNodeId);
      workflowRun.currentNodeId = "";
      workflowRun.complete = true;
      const terminalNode = findWorkflowNode(workflowRun.terminalNodeId);
      workflowRun.pausedAtBreak = terminalNode?.type === "break";
      workflowRun.resumeNodeId = workflowRun.pausedAtBreak ? outgoingWorkflowEdges(terminalNode.id)[0]?.to || "" : "";
      orderWorkflowActionsForReview();
      workflowRun.awaitingActionApproval = workflowRun.actions.length > 0;
      workflowRun.actionApprovals = workflowRun.actions.map(defaultWorkflowActionApproval);
      workflowRun.actionEnableds = workflowRun.actions.map(defaultWorkflowActionEnabled);
      workflowRun.actionsRendered = false;
      if (workflowRun.pausedAtBreak && !workflowRun.awaitingActionApproval) {
        saveWorkflowProgress({ status: "paused" }).catch((err) => {
          console.error("Failed to save workflow break progress:", err);
        });
      } else if (!workflowRun.pausedAtBreak && !workflowRun.awaitingActionApproval) {
        saveWorkflowProgress({ status: "completed", breakNodeId: "" }).catch((err) => {
          console.error("Failed to save completed workflow progress:", err);
        });
      }
      renderWorkflowRunner();
    }

    function trimWorkflowDiagnosticsToHistory() {
      const historyIds = new Set(workflowRun.stepHistory.map((step) => String(step.nodeId)));
      workflowRun.checks = workflowRun.checks.filter((check) => historyIds.has(String(check.nodeId)));
    }

    function evaluateInputWorkflowCheck(node) {
      const config = node?.checkConfig || {};
      const rules = Array.isArray(config.rules) ? config.rules : [];
      const inputNode = findWorkflowNode(config.inputNodeId);
      const inputStep = workflowRun.stepHistory.find((step) => String(step.nodeId) === String(config.inputNodeId));
      const primary = workflowInputPrimaryAnswer(inputNode, inputStep);
      const actualValue = primary.value || "";
      const inputLabel = primary.label || inputNode?.question || inputNode?.label || "Input";

      if (!config.inputNodeId || !inputStep) {
        return {
          nodeId: node.id,
          label: node.label || node.question || "Check",
          result: "Fail",
          recordType: "input",
          source: { type: "input", inputNodeId: config.inputNodeId || "", label: inputLabel },
          message: "Selected input has not been collected yet.",
          checks: [],
          data: { inputNodeId: config.inputNodeId || "", inputLabel, value: actualValue },
        };
      }

      const checks = rules.map((rule) => {
        const expectedValue = rule.compareType === "field" ? "" : rule.staticValue;
        const passed = compareWorkflowValues(actualValue, rule.operator || "equals", expectedValue);
        return {
          field: "value",
          fieldLabel: inputLabel,
          operator: rule.operator || "equals",
          compareType: "static",
          staticValue: rule.staticValue || "",
          actualValue,
          expectedValue,
          passed,
        };
      });

      return {
        nodeId: node.id,
        label: node.label || node.question || "Check",
        result: checks.length && checks.every((check) => check.passed) ? "Pass" : "Fail",
        recordType: "input",
        source: { type: "input", inputNodeId: config.inputNodeId, label: inputLabel },
        message: checks.length ? "" : "No check rules configured",
        checks,
        data: { inputNodeId: config.inputNodeId, inputLabel, value: actualValue },
      };
    }

    async function runWorkflowCheck(node, selectedRecordId = "") {
      if (!node || workflowRun.runningCheckNodeId === String(node.id)) return;
      const caseId = params().get("caseId") || loadedCase?.id || "";
      const runner = document.getElementById("caseWorkflowRunner");
      workflowRun.runningCheckNodeId = String(node.id);

      const captureWorkflowCheckResult = (data = {}) => {
        const captured = {
          nodeId: node.id,
          label: node.label || node.question || "Check",
          result: data.result || "Fail",
          recordType: data.recordType || node.checkConfig?.recordType || "affectedItem",
          affectedItemSource: data.affectedItemSource || node.checkConfig?.affectedItemSource || "storeSalesOrder",
          source: data.source || null,
          message: data.message || "",
          checks: Array.isArray(data.checks) ? data.checks : [],
          data: data.data || {},
          case: data.case || null,
        };
        workflowRun.checks = workflowRun.checks.filter((check) => String(check.nodeId) !== String(node.id));
        workflowRun.checks.push(captured);
        workflowRun.drawerTab = "actions";
        renderWorkflowStepsDrawer();
        workflowRun.runningCheckNodeId = "";
        if (String(captured.result || "").toLowerCase() === "fail") {
          if (runner) {
            runner.innerHTML = workflowFailedCheckReviewHtml(captured);
            document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
            document.getElementById("continueFailedCheckBtn")?.addEventListener("click", () => advanceWorkflow(captured.result));
          }
          updateWorkflowStepMenuVisibility();
          return;
        }
        advanceWorkflow(captured.result);
      };

      const renderWorkflowCheckRecordSelection = (data = {}) => {
        workflowRun.runningCheckNodeId = "";
        if (!runner) return;
        runner.innerHTML = workflowCheckRecordSelectionHtml(node, data);
        document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
        document.getElementById("workflowCheckRecordContinueBtn")?.addEventListener("click", async () => {
          const selected = runner.querySelector("[data-workflow-check-record]:checked")?.dataset.workflowCheckRecord || "";
          if (!selected) return;
          await runWorkflowCheck(node, selected);
        });
      };

      try {
        if (node.checkConfig?.recordType === "input") {
          const inputStep = workflowCheckInputStep(node);
          const inputNode = workflowCheckInputNode(node);
          if (workflowCheckInputUsesSalesOrderItems(node)) {
            if (!caseId) throw new Error("Save the case before running workflow checks.");
            if (!inputStep) throw new Error("Selected input has not been collected yet.");
            const res = await fetch(`/api/netsuite/salesorder/cases/${encodeURIComponent(caseId)}/workflow-check`, {
              method: "POST",
              headers: authHeaders({ "Content-Type": "application/json" }),
              body: JSON.stringify({
                node,
                inputValue: workflowInputPrimaryAnswer(inputNode, inputStep).value || "",
                inputLabel: workflowInputPrimaryAnswer(inputNode, inputStep).label || inputNode?.question || inputNode?.label || "Input",
                inputSource: "salesOrderItems",
              }),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
            captureWorkflowCheckResult({
              ...data,
              recordType: data.recordType || "input",
            });
            return;
          }
          captureWorkflowCheckResult(evaluateInputWorkflowCheck(node));
          return;
        }
        if (!caseId) throw new Error("Save the case before running workflow checks.");
        const res = await fetch(`/api/netsuite/salesorder/cases/${encodeURIComponent(caseId)}/workflow-check`, {
          method: "POST",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({ node, selectedRecordId }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
        if (data.needsInput === "workflowCheckRecordSelection") {
          renderWorkflowCheckRecordSelection(data);
          return;
        }
        captureWorkflowCheckResult(data);
      } catch (err) {
        console.error("Workflow check failed:", err);
        workflowRun.runningCheckNodeId = "";
        const captured = {
          nodeId: node.id,
          label: node.label || node.question || "Check",
          result: "Fail",
          recordType: node.checkConfig?.recordType || "affectedItem",
          affectedItemSource: node.checkConfig?.affectedItemSource || "storeSalesOrder",
          source: null,
          message: err.message || "Check failed",
          checks: [],
          data: {},
        };
        workflowRun.checks = workflowRun.checks.filter((check) => String(check.nodeId) !== String(node.id));
        workflowRun.checks.push(captured);
        workflowRun.drawerTab = "actions";
        renderWorkflowStepsDrawer();
        if (runner) {
          runner.innerHTML = `
            <div class="workflow-run-shell">
              <div class="workflow-question-card">
                <h3>${escapeHtml(node.label || node.question || "Check")}</h3>
                <p class="case-status">${escapeHtml(captured.message)}</p>
                <div class="workflow-run-actions">
                  <button id="restartWorkflowBtn" type="button" class="btn-secondary">Restart</button>
                </div>
              </div>
            </div>
          `;
          document.getElementById("restartWorkflowBtn")?.addEventListener("click", restartWorkflow);
        }
      }
    }

    function followWorkflowPath(nextNodeId) {
      let node = findWorkflowNode(nextNodeId);
      let guard = 0;
      while (node && guard < 100) {
        guard += 1;
        if (isWorkflowPromptNode(node)) {
          workflowRun.currentNodeId = node.id;
          ensureCurrentStepInHistory();
          renderWorkflowRunner();
          return;
        }

        if (node.type === "start" && node.startStatusId) {
          collectSystemWorkflowAction(node, `Set case status to ${node.startStatusName || node.startStatusId}`, {
            type: "setCaseStatus",
            statusId: node.startStatusId,
            statusName: node.startStatusName || node.startStatusId,
          });
        }
        if (node.type === "action" || node.type === "break") collectWorkflowAction(node);
        if (node.type === "closeCase") collectSystemWorkflowAction(node, "I have closed the case");
        if (node.type === "closeCase" || node.type === "break") {
          workflowRun.terminalNodeId = node.id;
          addWorkflowDebugNode(node.id);
          break;
        }
        const nextEdge = outgoingWorkflowEdges(node.id)[0];
        if (!nextEdge) {
          workflowRun.terminalNodeId = node.id;
          addWorkflowDebugNode(node.id);
          break;
        }
        addWorkflowDebugEdge(nextEdge.id);
        node = findWorkflowNode(nextEdge.to);
      }

      completeWorkflowRun();
    }

    function followWorkflowBranches(nextEdges = []) {
      const promptTarget = { id: "" };
      const visited = new Set();

      const walk = (nodeId) => {
        let node = findWorkflowNode(nodeId);
        let guard = 0;
        while (node && guard < 100) {
          guard += 1;
          const visitKey = String(node.id);
          if (visited.has(visitKey)) break;
          visited.add(visitKey);

          if (isWorkflowPromptNode(node)) {
            if (!promptTarget.id) promptTarget.id = node.id;
            return;
          }

          if (node.type === "start" && node.startStatusId) {
            collectSystemWorkflowAction(node, `Set case status to ${node.startStatusName || node.startStatusId}`, {
              type: "setCaseStatus",
              statusId: node.startStatusId,
              statusName: node.startStatusName || node.startStatusId,
            });
          }
          if (node.type === "action" || node.type === "break") collectWorkflowAction(node);
          if (node.type === "closeCase") collectSystemWorkflowAction(node, "I have closed the case");
          if (node.type === "closeCase" || node.type === "break") {
            workflowRun.terminalNodeId = node.id;
            addWorkflowDebugNode(node.id);
            return;
          }

          const edges = outgoingWorkflowEdges(node.id);
          if (!edges.length) {
            workflowRun.terminalNodeId = node.id;
            addWorkflowDebugNode(node.id);
            return;
          }
          const nextEdge = edges[0];
          addWorkflowDebugEdge(nextEdge.id);
          node = findWorkflowNode(nextEdge.to);
        }
      };

      nextEdges.forEach((edge) => walk(edge.to));

      if (promptTarget.id) {
        workflowRun.currentNodeId = promptTarget.id;
        ensureCurrentStepInHistory();
        renderWorkflowRunner();
        return;
      }

      completeWorkflowRun();
    }

    function advanceWorkflow(answer) {
      const node = findWorkflowNode(workflowRun.currentNodeId);
      if (!node) return;
      const isInputAnswer = answer && typeof answer === "object" && !Array.isArray(answer);
      const answerText = isInputAnswer ? answer.summary || "" : answer;
      const currentStepIndex = workflowRun.stepHistory.findIndex((step) => String(step.nodeId) === String(node.id));
      if (currentStepIndex >= 0) {
        workflowRun.stepHistory = workflowRun.stepHistory.slice(0, currentStepIndex + 1);
        workflowRun.stepHistory[currentStepIndex].answer = answerText;
        if (isInputAnswer) {
          workflowRun.stepHistory[currentStepIndex].answers = answer.answers || {};
          workflowRun.stepHistory[currentStepIndex].answerLabels = answer.labels || {};
        }
      }
      trimWorkflowDiagnosticsToHistory();
      trimWorkflowActionsFromStep(currentStepIndex);
      workflowRun.awaitingActionApproval = false;
      workflowRun.terminalNodeId = "";
      workflowRun.complete = false;
      workflowRun.actionsRendered = false;
      workflowRun.answers = workflowRun.stepHistory
        .filter((item) => item.answer)
        .map((item) => ({ questionId: item.nodeId, question: item.question, answer: item.answer, answers: item.answers || {}, answerLabels: item.answerLabels || {} }));
      const actionTable = document.getElementById("caseWorkflowActionTable");
      const table = document.getElementById("caseWorkflowActions");
      if (actionTable) actionTable.hidden = true;
      if (table) table.innerHTML = '<tr><td colspan="2">No workflow actions have been submitted yet.</td></tr>';

      const edges = outgoingWorkflowEdges(node.id);
      const cleanAnswer = String(answerText || "").trim().toLowerCase();
      const matchingEdges = edges.filter((item) => String(item.label || "").trim().toLowerCase() === cleanAnswer);
      const fallbackEdges = edges.filter((item) => !item.label);
      const nextEdges = matchingEdges.length ? matchingEdges : fallbackEdges.length ? fallbackEdges : edges.slice(0, 1);
      nextEdges.forEach((edge) => addWorkflowDebugEdge(edge.id));

      if (!nextEdges.length) {
        completeWorkflowRun();
        return;
      }

      workflowRun.collectingFromStepIndex = currentStepIndex;
      followWorkflowBranches(nextEdges);
      workflowRun.collectingFromStepIndex = -1;
    }

    function startWorkflow(workflow) {
      resetWorkflowRun(workflow);
      renderWorkflowRunner();
    }

    function beginWorkflow() {
      if (!workflowRun.selected) {
        renderWorkflowRunner();
        return;
      }

      const start = firstWorkflowNode();
      if (!start) {
        renderWorkflowRunner("This workflow is empty. Add questions and actions in CS Workflows first.");
        return;
      }
      workflowRun.started = true;
      workflowRun.currentNodeId = start.id;
      followWorkflowPath(start.id);
    }

    async function continueWorkflowFromBreak() {
      const nextNodeId = workflowRun.resumeNodeId || "";
      if (!nextNodeId) return;
      workflowRun.pausedAtBreak = false;
      workflowRun.complete = false;
      workflowRun.awaitingActionApproval = false;
      workflowRun.terminalNodeId = "";
      workflowRun.currentNodeId = "";
      workflowRun.auditActions = workflowCheckpointActions();
      workflowRun.actions = [];
      workflowRun.actionApprovals = [];
      workflowRun.actionEnableds = [];
      workflowRun.actionsRendered = false;
      const actionTable = document.getElementById("caseWorkflowActionTable");
      const table = document.getElementById("caseWorkflowActions");
      if (actionTable) actionTable.hidden = true;
      if (table) table.innerHTML = '<tr><td colspan="2">No workflow actions have been submitted yet.</td></tr>';
      followWorkflowPath(nextNodeId);
    }

    function restartWorkflow() {
      const workflow = workflowRun.selected;
      clearWorkflowProgress(workflow).catch((err) => {
        console.warn("Could not clear workflow progress:", err.message || err);
      });
      resetWorkflowRun(workflow);
      workflowRun.selected = workflow;
      beginWorkflow();
    }

    function startNewWorkflow() {
      const select = document.getElementById("caseWorkflowSelect");
      if (select) select.value = "";
      resetWorkflowRun(null);
      workflowRun.focusedProgressWorkflowId = "";
      renderWorkflowProgressBanner();
      renderWorkflowRunner();
      renderWorkflowStepsDrawer();
      updateWorkflowStepMenuVisibility();
    }

    function goToWorkflowStep(index) {
      if (!Number.isFinite(index) || index < 0 || index >= workflowRun.stepHistory.length) return;
      const step = workflowRun.stepHistory[index];
      workflowRun.stepHistory = workflowRun.stepHistory.slice(0, index + 1);
      workflowRun.stepHistory[workflowRun.stepHistory.length - 1].answer = "";
      workflowRun.stepHistory[workflowRun.stepHistory.length - 1].answers = {};
      workflowRun.stepHistory[workflowRun.stepHistory.length - 1].answerLabels = {};
      workflowRun.currentNodeId = step.nodeId;
      trimWorkflowActionsFromStep(index);
      workflowRun.terminalNodeId = "";
      trimWorkflowDiagnosticsToHistory();
      workflowRun.answers = workflowRun.stepHistory
        .slice(0, -1)
        .filter((item) => item.answer)
        .map((item) => ({ questionId: item.nodeId, question: item.question, answer: item.answer, answers: item.answers || {}, answerLabels: item.answerLabels || {} }));
      workflowRun.complete = false;
      workflowRun.awaitingActionApproval = false;
      workflowRun.actionsRendered = false;
      const actionTable = document.getElementById("caseWorkflowActionTable");
      const table = document.getElementById("caseWorkflowActions");
      if (actionTable) actionTable.hidden = true;
      if (table) table.innerHTML = '<tr><td colspan="2">No workflow actions have been submitted yet.</td></tr>';
      window.clearInterval(workflowRun.timer);
      renderWorkflowRunner();
    }

    function workflowActionIconState(action = {}) {
      const state = action.executionState || "pending";
      const running = state === "pending" && action.executionMessage === "Running...";
      return {
        className: state === "success" ? "success" : state === "failed" ? "failed" : state === "needsInput" ? "warning" : state === "skipped" ? "skipped" : running ? "running" : "",
      };
    }

    function appendWorkflowActionRow(action, index) {
      const table = document.getElementById("caseWorkflowActions");
      if (!table) return;
      if (index === 0) table.innerHTML = "";
      const state = action.executionState || "pending";
      const icon = state === "success" ? "✓" : state === "failed" ? "×" : "…";
      const iconClass = state === "success" ? "success" : state === "failed" ? "failed" : "";
      const actionIcon = workflowActionIconState(action);
      table.insertAdjacentHTML("beforeend", `
        <tr data-workflow-action-row="${index}">
          <td>${index + 1}</td>
          <td>
            <div class="workflow-action-response">
              <span class="workflow-action-icon ${actionIcon.className || iconClass}" data-workflow-action-icon="${index}"></span>
              <div>
                <strong>${escapeHtml(action.label || `Action ${index + 1}`)}</strong>
                <span class="case-status"> ${escapeHtml(workflowActionTypeLabel(action.actionType))}</span>
                <div data-workflow-action-message="${index}">${workflowActionMessageHtml(action)}</div>
                <div data-workflow-action-allocation="${index}">${workflowActionAllocationHtml(action, index)}</div>
                ${action.executionError ? `<div class="workflow-action-error" data-workflow-action-error="${index}">${escapeHtml(action.executionError)}</div>` : `<div class="workflow-action-error" data-workflow-action-error="${index}" hidden></div>`}
                <div data-workflow-action-debug="${index}">${action.executionState === "failed" ? workflowActionDebugHtml(action.executionDebug) : ""}</div>
                <div data-workflow-action-retry-wrap="${index}" ${action.executionState === "failed" ? "" : "hidden"}>
                  <button type="button" class="btn-secondary" data-workflow-action-retry="${index}">Retry Action</button>
                </div>
              </div>
            </div>
          </td>
        </tr>
      `);
      wireWorkflowAllocationControls(index);
      wireWorkflowRetryControl(index);
    }

    function wireWorkflowRetryControl(index) {
      const button = document.querySelector(`[data-workflow-action-retry="${index}"]`);
      if (!button || button.dataset.wired === "1") return;
      button.dataset.wired = "1";
      button.addEventListener("click", async () => {
        const action = workflowRun.actions[index];
        if (!action || action.executionState !== "failed") return;
        if (workflowActionCreatesSalesOrder(action)) reserveWorkflowSalesOrderTab(index);
        button.disabled = true;
        button.textContent = "Retrying...";
        try {
          await executeWorkflowActionAtIndex(index);
        } catch (err) {
          if (err.message === "__WORKFLOW_ACTION_WAITING_FOR_INPUT__") return;
          completeWorkflowSalesOrderTab(index);
          updateWorkflowActionRow(index, {
            executionState: "failed",
            executionMessage: action.message || "Action failed.",
            executionError: err.message || "Action failed.",
          });
        }
      });
    }

    function updateWorkflowActionRow(index, patch = {}) {
      const action = workflowRun.actions[index];
      if (!action) return;
      Object.assign(action, patch);
      const state = action.executionState || "pending";
      const icon = document.querySelector(`[data-workflow-action-icon="${index}"]`);
      const message = document.querySelector(`[data-workflow-action-message="${index}"]`);
