<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/browserLogFilter.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Search</title>
  <link rel="icon" type="image/x-icon" href="/assets/moon-man-logo.ico" />
  <script src="/js/storage.js"></script>
  <style>
    :root {
      --brand: #007fa8;
      --ink: #102033;
      --muted: #617085;
      --line: #dbe3ea;
      --soft: #f6f8fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--soft);
      color: var(--ink);
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    main {
      padding: 18px;
    }

    .popup-shell {
      max-width: 1180px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
      padding: 18px;
    }

    .header,
    .search-row,
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 11px;
      color: var(--ink);
      font: inherit;
    }

    input:focus {
      border-color: var(--brand);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 127, 168, 0.12);
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 13px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      border-color: var(--brand);
    }

    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .search-row {
      margin: 18px 0 12px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 280px;
      max-height: 560px;
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 9px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef3f7;
      font-size: 12px;
    }

    tr:hover td {
      background: #f8fbfd;
    }

    .status {
      min-height: 20px;
      margin: 12px 0;
      color: var(--muted);
    }

    .status.error {
      color: #b42318;
      font-weight: 700;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .header,
      .search-row,
      .footer {
        align-items: stretch;
        flex-direction: column;
      }

      .header button,
      .search-row button,
      .footer button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="popup-shell">
      <div class="header">
        <h1>Customer Search</h1>
        <button type="button" id="closeBtn">Close</button>
      </div>

      <div class="search-row">
        <input id="customerSearchInput" type="search" placeholder="Search by name, email, phone or postcode" autofocus />
        <button type="button" id="refreshBtn">Refresh</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Customer ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Postcode</th>
              <th>Address</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="customerResultsBody">
            <tr><td colspan="7" class="muted">Loading customers...</td></tr>
          </tbody>
        </table>
      </div>

      <p id="status" class="status" aria-live="polite"></p>

      <div class="footer">
        <span class="muted" id="resultCount"></span>
        <button type="button" id="cancelBtn">Cancel</button>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const tokenFromUrl = params.get("token") || "";
    const saved = typeof storageGet === "function" ? storageGet() : null;
    const token = tokenFromUrl || saved?.token || "";
    const searchInput = document.getElementById("customerSearchInput");
    const tbody = document.getElementById("customerResultsBody");
    const statusEl = document.getElementById("status");
    const resultCountEl = document.getElementById("resultCount");

    let customers = [];
    let filtered = [];
    let selectedId = "";

    function headers(extra = {}) {
      return {
        ...extra,
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
      };
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message || "";
      statusEl.classList.toggle("error", !!isError);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function valueFrom(obj, keys) {
      for (const key of keys) {
        const value = obj?.[key];
        if (value !== undefined && value !== null && value !== "") {
          if (typeof value === "object") return value.id || value.value || value.refName || value.name || "";
          return value;
        }
      }
      return "";
    }

    function idFrom(customer) {
      return String(valueFrom(customer, ["Internal ID", "InternalID", "Customer ID", "id", "internalId", "internalid"]) || "");
    }

    function displayName(customer) {
      return (
        [valueFrom(customer, ["First Name", "firstName", "firstname"]), valueFrom(customer, ["Last Name", "lastName", "lastname"])]
          .filter(Boolean)
          .join(" ") ||
        valueFrom(customer, ["Name", "name", "entityId", "entityid"]) ||
        "-"
      );
    }

    function displayAddress(customer) {
      return [
        valueFrom(customer, ["Address Line 1", "Address 1", "addr1", "address1"]),
        valueFrom(customer, ["Address Line 2", "Address 2", "addr2", "address2"]),
        valueFrom(customer, ["Address Line 3", "Address 3", "city", "address3"]),
      ]
        .filter(Boolean)
        .join(", ");
    }

    function renderResults() {
      if (!tbody) return;

      const rows = filtered.slice(0, 100);
      resultCountEl.textContent = `${filtered.length} customer${filtered.length === 1 ? "" : "s"} found`;

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="muted">No customers found.</td></tr>';
        return;
      }

      tbody.innerHTML = rows
        .map((customer) => {
          const id = idFrom(customer);
          const email = valueFrom(customer, ["Email", "Customer Email", "email"]);
          const phone = valueFrom(customer, ["Phone", "Primary Phone", "phone", "contactNumber"]);
          const postcode = valueFrom(customer, ["Postal Code", "Postcode", "Post Code", "Zip", "zip", "postcode"]);
          const address = displayAddress(customer);
          return `
            <tr>
              <td>${escapeHtml(id || "-")}</td>
              <td>${escapeHtml(displayName(customer))}</td>
              <td>${escapeHtml(email || "-")}</td>
              <td>${escapeHtml(phone || "-")}</td>
              <td>${escapeHtml(postcode || "-")}</td>
              <td>${escapeHtml(address || "-")}</td>
              <td><button type="button" class="primary" data-select-customer="${escapeHtml(id)}">Select</button></td>
            </tr>
          `;
        })
        .join("");
    }

    function applyFilter() {
      const query = searchInput.value.trim().toLowerCase();
      filtered = query
        ? customers.filter((customer) => Object.values(customer).join(" ").toLowerCase().includes(query))
        : customers;
      renderResults();
    }

    async function loadCustomers() {
      setStatus("Loading customers...");
      tbody.innerHTML = '<tr><td colspan="7" class="muted">Loading customers...</td></tr>';

      const res = await fetch("/api/netsuite/customer-lookup", {
        headers: headers(),
        cache: "no-store",
      });
      const data = await res.json();
      if (!res.ok || data.ok === false) throw new Error(data.error || "Failed to load customer lookup");

      customers = Array.isArray(data.results) ? data.results : [];
      filtered = customers;
      setStatus("");
      applyFilter();
    }

    async function hydrateCustomer(customer) {
      const id = idFrom(customer);
      if (!id) return customer;

      setStatus("Loading selected customer details...");
      const res = await fetch(`/api/netsuite/entity/${encodeURIComponent(id)}`, {
        headers: headers(),
        cache: "no-store",
      });
      const data = await res.json();
      if (!res.ok || data.ok === false) throw new Error(data.error || "Failed to load selected customer details");
      return { ...customer, ...(data.entity || {}) };
    }

    async function selectCustomer(customer) {
      if (!window.opener || window.opener.closed || typeof window.opener.onCustomerSearchSelected !== "function") {
        setStatus("The Sales New window is not available. Please reopen this search from Sales New.", true);
        return;
      }

      const id = idFrom(customer);
      selectedId = id;
      renderResults();

      try {
        const fullCustomer = await hydrateCustomer(customer);
        window.opener.onCustomerSearchSelected(fullCustomer);
        window.opener.focus();
        window.close();
      } catch (err) {
        setStatus(err.message || "Failed to select customer.", true);
      }
    }

    tbody.addEventListener("click", (event) => {
      const button = event.target.closest("[data-select-customer]");
      if (!button) return;
      const id = button.dataset.selectCustomer || "";
      const customer = filtered.find((row) => idFrom(row) === id);
      if (customer) selectCustomer(customer);
    });

    searchInput.addEventListener("input", applyFilter);
    document.getElementById("refreshBtn").addEventListener("click", () => loadCustomers().catch((err) => setStatus(err.message, true)));
    document.getElementById("closeBtn").addEventListener("click", () => window.close());
    document.getElementById("cancelBtn").addEventListener("click", () => window.close());

    loadCustomers().catch((err) => {
      customers = [];
      filtered = [];
      renderResults();
      setStatus(err.message || "Failed to load customer lookup.", true);
    });
  </script>
</body>
</html>
