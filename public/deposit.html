<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/assets/moon-man-logo.ico">
    <title>Add Customer Deposit</title>
    <style>
        :root {
            --brand: #0081ab;
            --brand-600: #006c8e;
            --ink: #1a1f24;
            --muted: #6a7480;
            --line: #e6e9ee;
            --panel: #ffffff;
            --bg: #f8fafc;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: "Inter", "Segoe UI", sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .deposit-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem 2rem;
            width: 360px;
        }

        h2 {
            font-size: 1.3rem;
            color: var(--brand);
            margin-bottom: 1rem;
            font-weight: 600;
            text-align: center;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        select,
        input[type="number"] {
            width: 100%;
            padding: 0.6rem 0.7rem;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--ink);
            background-color: #fff;
            transition: border-color 0.15s ease;
        }

        select:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 2px rgba(0, 129, 171, 0.15);
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background-color: var(--brand);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: var(--brand-600);
        }

        .field {
            margin-bottom: 1.2rem;
        }

        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 1rem;
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
                height: auto;
                min-height: 100vh;
                padding: 1rem;
            }

            .deposit-card {
                width: 100%;
                padding: 1.25rem;
            }
        }
    </style>
</head>

<body>
    <div class="deposit-card">
        <h2>Add Deposit</h2>

        <div class="field">
            <label for="depositMethod">Payment Method</label>
            <select id="depositMethod">
                <option value="">Loading methods...</option>
            </select>
        </div>

        <div class="field">
            <label for="depositAmount">Amount (£)</label>
            <input type="number" id="depositAmount" min="0" step="0.01" placeholder="£0.00" />
        </div>

        <button id="saveDepositBtn">Save Deposit</button>

        <p class="footer-note">This payment will be applied to the active Sales Order.</p>
    </div>

    <script src="/js/storage.js"></script>
    <script>
          function prefillDepositAmountFromQuery() {
    const params = new URLSearchParams(window.location.search);
    const amount = parseFloat(params.get("amount"));

    if (Number.isFinite(amount) && amount > 0) {
      const input = document.getElementById("depositAmount");
      input.value = amount.toFixed(2);     // ✅ prefill
      input.focus();                       // optional
      input.select();                      // optional: easy overwrite for partial payments
    }
  }

        function depositAuthHeaders() {
            const saved =
                (typeof storageGet === "function" ? storageGet() : null) ||
                (window.opener && typeof window.opener.storageGet === "function"
                    ? window.opener.storageGet()
                    : null);
            return saved?.token ? { Authorization: `Bearer ${saved.token}` } : {};
        }

        function readPaymentMethodField(method, names) {
            if (!method || typeof method !== "object") return "";
            for (const name of names) {
                if (method[name] !== undefined && method[name] !== null && method[name] !== "") {
                    return String(method[name]).trim();
                }
            }

            const wanted = names.map(name => String(name).toLowerCase().replace(/[^a-z0-9]/g, ""));
            const key = Object.keys(method).find(entry =>
                wanted.includes(String(entry).toLowerCase().replace(/[^a-z0-9]/g, ""))
            );
            return key ? String(method[key] || "").trim() : "";
        }

        function normalizePaymentMethods(data) {
            if (Array.isArray(data?.results)) return data.results;
            if (Array.isArray(data?.data)) return data.data;
            if (Array.isArray(data?.items)) return data.items;
            if (Array.isArray(data?.paymentMethods)) return data.paymentMethods;
            if (Array.isArray(data)) return data;
            return [];
        }

        async function loadPaymentMethods() {
            try {
                const res = await fetch("/api/netsuite/payment-methods", {
                    headers: depositAuthHeaders(),
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                console.log("🔎 Payment methods response:", data);

                const select = document.getElementById("depositMethod");
                select.innerHTML = '<option value="">Select Method</option>';

                const methods = normalizePaymentMethods(data);

                methods.forEach(pm => {
                    const id = readPaymentMethodField(pm, ["Internal ID", "InternalID", "internalid", "id", "value"]);
                    const name = readPaymentMethodField(pm, ["Name", "Title", "name", "label", "text"]);
                    if (!id || !name) return;

                    const opt = document.createElement("option");
                    opt.value = id;
                    opt.textContent = name;
                    select.appendChild(opt);
                });

                if (select.options.length === 1) {
                    select.innerHTML = '<option value="">No methods found</option>';
                }
            } catch (err) {
                console.error("❌ Failed to load payment methods:", err);
                document.getElementById("depositMethod").innerHTML =
                    `<option value="">Error loading methods</option>`;
            }
        }

        document.getElementById("saveDepositBtn").addEventListener("click", () => {
            const select = document.getElementById("depositMethod");
            const id = select.value;
            const name = select.options[select.selectedIndex]?.textContent;
            const amount = parseFloat(document.getElementById("depositAmount").value || 0);

            if (!id || amount <= 0) {
                alert("⚠️ Please select a payment method and enter a valid amount.");
                return;
            }

            if (window.opener && typeof window.opener.onDepositSaved === "function") {
                window.opener.onDepositSaved({ id, name, amount });
            }
            window.close();
        });
        prefillDepositAmountFromQuery();
        loadPaymentMethods();
    </script>
</body>

</html>
