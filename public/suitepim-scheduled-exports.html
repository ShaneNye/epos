<!DOCTYPE html>
<html lang="en">

<head>
  <script src="/js/browserLogFilter.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/assets/moon-man-logo.ico" />
  <title>SuitePim Scheduled Exports</title>

  <link rel="stylesheet" href="/assistant/assistant.css" />
  <link rel="stylesheet" href="/css/home.css" />
  <link rel="stylesheet" href="/css/suitepim.css?v=scheduled-exports-1" />

  <script src="/js/storage.js"></script>
  <script src="/js/menu.js"></script>
  <script src="/js/suitepimPreload.js" defer></script>
  <script src="/assistant/assistant.js"></script>
  <script type="module" src="/assistant/assistantHooks.js"></script>
  <script src="/js/suitepimScheduledExports.js?v=scheduled-exports-1" defer></script>
</head>

<body>
  <div id="menu"></div>

  <main class="content suitepim-page suitepim-page-wide">
    <header class="suitepim-header">
      <div>
        <p class="suitepim-kicker">SuitePim</p>
        <h1>Scheduled Exports</h1>
      </div>
    </header>

    <nav class="suitepim-subnav" aria-label="SuitePim sections">
      <a class="suitepim-subnav-link" href="/suitepim">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 19V5"></path><path d="M8 19v-6"></path><path d="M13 19v-9"></path><path d="M18 19V8"></path></svg>
        Dashboard
      </a>
      <a class="suitepim-subnav-link" href="/suitepim/web-management">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 6h16"></path><path d="M4 12h10"></path><path d="M4 18h13"></path><path d="M18 11h2a2 2 0 0 1 2 2v3"></path><path d="M16 14l2-3 2 3"></path></svg>
        Item Management
      </a>
      <a class="suitepim-subnav-link active" href="/suitepim/scheduled-exports">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M8 2v4"></path><path d="M16 2v4"></path><path d="M4 9h16"></path><path d="M5 5h14v15H5z"></path><path d="M12 13v3l2 1"></path></svg>
        Scheduled Exports
      </a>
    </nav>

    <section class="suitepim-toolbar suitepim-toolbar-web" aria-label="Scheduled export controls">
      <select id="suitepimScheduleStatus" aria-label="Scheduled export status">
        <option value="pending">Pending scheduled pushes</option>
        <option value="queued">Queued pushes</option>
        <option value="completed">Completed pushes</option>
        <option value="error">Errored pushes</option>
        <option value="all">All scheduled pushes</option>
      </select>
      <button id="suitepimScheduledRefresh" class="suitepim-primary-btn" type="button">Refresh</button>
    </section>

    <section id="suitepimScheduledStatus" class="suitepim-status" aria-live="polite"></section>
    <section id="suitepimScheduledMount" class="suitepim-scheduled-shell" aria-label="Scheduled exports">
      <div class="suitepim-loading"><div class="suitepim-spinner" aria-hidden="true"></div><p>Loading scheduled exports...</p></div>
    </section>
  </main>
</body>

</html>
