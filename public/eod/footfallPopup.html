<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>End Of Day - Footfall</title>

    <link rel="stylesheet" href="/eod/footfallPopup.css" />
    <script src="/js/storage.js"></script>
    <script src="/eod/footfallPopup.js" defer></script>
</head>

<body>
    <div class="popup-wrapper">
        <div class="popup-card">

            <div class="popup-header">
                <h2>Footfall - Today</h2>
            </div>

            <div class="popup-body">

                <h3>End of Day Footfall</h3>
                <p class="muted">Select your store and complete today's footfall records.</p>

                <div class="form-grid">
                    <div>
                        <label for="storeSelect">Store</label>
                        <select id="storeSelect">
                            <option value="">Select Store...</option>
                        </select>
                    </div>
                </div>

                <div id="emptyState" class="empty-state">
                    Choose a store to start entering today's footfall.
                </div>

                <div id="footfallForm" class="footfall-form hidden">
                    <div class="record-summary">
                        <div>
                            <span class="summary-label">Store</span>
                            <strong id="selectedStoreName"></strong>
                        </div>
                        <div>
                            <span class="summary-label">Record ID</span>
                            <strong id="selectedRecordId"></strong>
                        </div>
                    </div>

                    <div class="section-title">Team</div>
                    <div class="form-grid staff-grid">
                        <div id="bedSpecialistField">
                            <label for="storeLeader">Bed Specialist <span class="required">*</span></label>
                            <select id="storeLeader" class="user-select" required></select>
                        </div>
                        <div id="bedSpecialist2Field" class="hidden">
                            <label for="bedSpecialist">Bed Specialist 2</label>
                            <select id="bedSpecialist" class="user-select"></select>
                        </div>
                        <div id="bedSpecialist3Field" class="hidden">
                            <label for="bedSpecialist2">Bed Specialist 3</label>
                            <select id="bedSpecialist2" class="user-select"></select>
                        </div>
                    </div>

                    <div class="section-title"></div>
                    <div class="highlight-field">
                        <label for="teamFootfallCount">Team Footfall Count</label>
                        <input id="teamFootfallCount" type="number" data-field="team footfall count" min="0" />
                    </div>

                    <div class="section-title">Non-Purchase Reasons</div>
                    <div id="metricGrid" class="metric-grid"></div>
                </div>

                <div class="form-actions">
                    <button id="closeBtn" class="btn-secondary" onclick="window.close()">Close</button>
                    <button id="saveFootfallBtn" class="btn-primary" disabled>Save Footfall</button>
                </div>

            </div>

        </div>
    </div>

    <div id="savingOverlay" class="saving-overlay hidden">
        <div class="saving-box">
            <div class="loader"></div>
            <p>Saving...</p>
        </div>
    </div>

</body>

</html>
