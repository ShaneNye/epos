<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="/js/browserLogFilter.js"></script>
    <script src="/js/storage.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/assets/moon-man-logo.ico" />
    <title>Edit Location</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      :root {
        --brand: #0081ab;
        --brand-600: #006c8e;
        --ink: #1a1f24;
        --muted: #6a7480;
        --line: #e6e9ee;
        --panel: #ffffff;
      }

      body {
        font-family: "Segoe UI", Roboto, sans-serif;
        background: var(--panel);
        color: var(--ink);
        padding: 2rem;
        margin: 0;
      }

      h2 {
        color: var(--brand-600);
        font-size: 1.4rem;
        margin-bottom: 1.2rem;
        text-align: center;
      }

      form {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        padding: 1.5rem;
        max-width: 520px;
        margin: 0 auto;
      }

      form label {
        display: block;
        font-weight: 600;
        margin-top: 1rem;
        font-size: 0.9rem;
        color: var(--muted);
      }

      form input,
      form select {
        width: 100%;
        padding: 0.6rem 0.75rem;
        margin-top: 0.3rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 0.95rem;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      form input:focus,
      form select:focus {
        outline: none;
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(0, 129, 171, 0.15);
      }

      .section-title {
        margin-top: 1.4rem;
        padding-top: 1.2rem;
        border-top: 1px dashed var(--line);
        color: var(--ink);
        font-weight: 700;
        font-size: 0.95rem;
      }

      .hint {
        font-size: 0.82rem;
        color: var(--muted);
        margin-top: 0.25rem;
        font-weight: 500;
      }

      .btn-row {
        display: flex;
        justify-content: space-between;
        margin-top: 1.5rem;
        gap: 1rem;
      }

      button {
        flex: 1;
        padding: 0.7rem 1rem;
        font-size: 0.95rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }

      button.save {
        background: var(--brand);
        color: white;
      }

      button.save:hover {
        background: var(--brand-600);
        transform: translateY(-1px);
      }

      button.cancel {
        background: var(--line);
        color: var(--ink);
      }

      button.cancel:hover {
        background: #dfe3e8;
        transform: translateY(-1px);
      }

      @media (max-width: 560px) {
        body {
          padding: 1rem;
        }

        form {
          padding: 1rem;
        }

        .btn-row {
          flex-direction: column;
        }

        button {
          width: 100%;
          min-height: 40px;
        }
      }
    </style>
  </head>

  <body>
    <h2 id="formTitle">Edit Location</h2>

    <form id="locationForm">
      <div class="section-title">Core</div>

      <label>Name <input name="name" required /></label>

      <label>
        Store Manager
        <select name="store_manager">
          <option value="">Loading users...</option>
        </select>
      </label>

      <!-- Keep legacy field for backwards compatibility -->
      <label>
        Email (legacy)
        <input name="email" type="email" placeholder="store@example.com" />
        <div class="hint">Existing column: <code>email</code></div>
      </label>

      <!-- New preferred email column -->
      <label>
        Location Email
        <input name="location_email" type="email" placeholder="store@example.com" />
        <div class="hint">New column: <code>location_email</code></div>
      </label>

      <label>
        Phone Number
        <input name="location_phone_number" placeholder="e.g. 01273 123456" />
        <div class="hint">Stored as text; supports +44, spaces, etc.</div>
      </label>

      <label>NetSuite Internal ID <input name="netsuite_internal_id" /></label>
      <label>Invoice Location ID <input name="invoice_location_id" /></label>
      <label>Intercompany Customer <input name="intercompany_customer" /></label>

      <label>
        Distribution Location ID
        <input name="distribution_location_id" placeholder="e.g. 203" />
      </label>

      <div class="section-title">Company / Compliance</div>

      <label>
        VAT Number
        <input name="vat_number" placeholder="e.g. GB123456789" />
      </label>

      <label>
        Company Number
        <input name="company_number" placeholder="e.g. 12345678" />
      </label>

      <div class="section-title">Address</div>

      <label>Address Line 1 <input name="address_line_1" /></label>
      <label>Address Line 2 <input name="address_line_2" /></label>
      <label>Postcode <input name="postcode" placeholder="e.g. BN27 1AA" /></label>

      <div class="section-title">Accounts</div>

      <label>
        Petty Cash Account
        <select name="petty_cash_account">
          <option value="">Loading...</option>
        </select>
      </label>

      <label>
        Current Account
        <select name="current_account">
          <option value="">Loading...</option>
        </select>
      </label>

      <div class="btn-row">
        <button type="button" class="save">💾 Save</button>
        <button type="button" class="cancel">✖ Cancel</button>
      </div>
    </form>

    <script>
      let currentId = null;
      let glAccounts = [];
      let glAccountsLoaded = false;
      let usersLoaded = false;
      let pendingLocationData = null;

      function authHeaders() {
        try {
          const saved =
            typeof storageGet === "function"
              ? storageGet()
              : JSON.parse(sessionStorage.getItem("eposAuth") || localStorage.getItem("eposAuth") || "null");

          return saved?.token ? { Authorization: `Bearer ${saved.token}` } : {};
        } catch {
          return {};
        }
      }

      async function readJsonResponse(res) {
        const text = await res.text();
        let data = {};

        if (text) {
          try {
            data = JSON.parse(text);
          } catch {
            data = { ok: false, error: text };
          }
        }

        if (!res.ok) {
          throw new Error(data.error || data.message || `Request failed with status ${res.status}`);
        }

        return data;
      }

      function userLabel(user = {}) {
        return String(
          [user.firstName || user.firstname || "", user.lastName || user.lastname || ""]
            .filter(Boolean)
            .join(" ") ||
            user.name ||
            user.email ||
            user.id ||
            ""
        ).trim();
      }

      async function loadUsers() {
        const managerSelect = document.querySelector('[name="store_manager"]');

        try {
          const res = await fetch("/api/users", {
            headers: authHeaders(),
          });
          const data = await readJsonResponse(res);
          const users = Array.isArray(data.users) ? data.users : Array.isArray(data.data) ? data.data : [];

          managerSelect.innerHTML = `<option value="">Select Store Manager</option>`;
          users.forEach((user) => {
            const id = String(user.id || "").trim();
            const label = userLabel(user);
            if (!id || !label) return;

            const opt = document.createElement("option");
            opt.value = id;
            opt.textContent = label;
            opt.dataset.netsuiteId = user.netsuiteId || user.netsuiteid || "";
            managerSelect.appendChild(opt);
          });

          usersLoaded = true;
          if (pendingLocationData !== null) {
            applyLocationData(pendingLocationData);
            if (glAccountsLoaded) pendingLocationData = null;
          }
        } catch (err) {
          console.error("âŒ Failed to load users:", err);
          managerSelect.innerHTML = `<option value="">Users unavailable</option>`;
        }
      }

      /* === Load GL Accounts from NetSuite === */
      async function loadGLAccounts() {
        const pettySelect = document.querySelector('[name="petty_cash_account"]');
        const currentSelect = document.querySelector('[name="current_account"]');

        try {
          const res = await fetch("/api/netsuite/glaccounts", {
            headers: authHeaders(),
          });
          const data = await readJsonResponse(res);

          if (data.ok && Array.isArray(data.results)) {
            glAccounts = data.results;
            glAccountsLoaded = true;

            pettySelect.innerHTML = `<option value="">Select Account</option>`;
            currentSelect.innerHTML = `<option value="">Select Account</option>`;

            data.results.forEach((acc) => {
              const opt1 = document.createElement("option");
              const opt2 = document.createElement("option");
              opt1.value = String(acc["Internal ID"]);
              opt1.textContent = acc["Name"];
              opt2.value = String(acc["Internal ID"]);
              opt2.textContent = acc["Name"];
              pettySelect.appendChild(opt1);
              currentSelect.appendChild(opt2);
            });

            // If edit data arrived before GL accounts were ready, apply now
            if (pendingLocationData !== null) {
              applyLocationData(pendingLocationData);
              if (usersLoaded) pendingLocationData = null;
            }
          } else {
            console.warn("⚠️ GL accounts payload unexpected:", data);
          }
        } catch (err) {
          console.error("❌ Failed to load GL Accounts:", err);
        }
      }

      function setField(name, value) {
        const el = document.querySelector(`[name="${name}"]`);
        if (!el) return;
        el.value = value ?? "";
      }

      /* === Apply existing location data === */
      function applyLocationData(loc) {
        document.getElementById("formTitle").textContent = loc ? "Edit Location" : "New Location";
        currentId = loc?.id || null;

        // Clear all fields first (important when switching from edit -> new without refresh)
        const form = document.getElementById("locationForm");
        form.querySelectorAll("input").forEach((i) => (i.value = ""));
        // selects will be set after GL loaded, but clear them now too:
        form.querySelectorAll("select").forEach((s) => (s.value = ""));

        if (!loc) return;

        // Core
        setField("name", loc.name);
        setField("netsuite_internal_id", loc.netsuite_internal_id);
        setField("invoice_location_id", loc.invoice_location_id);
        setField("intercompany_customer", loc.intercompany_customer);
        setField("distribution_location_id", loc.distribution_location_id);
        setField("store_manager", loc.store_manager || "");

        // Emails: support both, and if one is missing, mirror from the other for convenience
        setField("email", loc.email);
        setField("location_email", loc.location_email || loc.email || "");
        setField("location_phone_number", loc.location_phone_number);

        // Compliance
        setField("vat_number", loc.vat_number);
        setField("company_number", loc.company_number);

        // Address
        setField("address_line_1", loc.address_line_1);
        setField("address_line_2", loc.address_line_2);
        setField("postcode", loc.postcode);

        // Accounts
        if (glAccountsLoaded) {
          setField("petty_cash_account", loc.petty_cash_account || "");
          setField("current_account", loc.current_account || "");
        }
      }

      /* === Listen for parent edit message === */
      window.addEventListener("message", (event) => {
        if (event.data?.action === "edit-location") {
          const loc = event.data.location; // can be null
          applyLocationData(loc);
          if ((!glAccountsLoaded || !usersLoaded) && loc) pendingLocationData = loc; // re-apply selects when async options load
        }
      });

      /* === Cancel and Save handlers === */
      document.querySelector(".cancel").addEventListener("click", () => window.close());

      document.querySelector(".save").addEventListener("click", async () => {
        const formEl = document.getElementById("locationForm");
        const raw = Object.fromEntries(new FormData(formEl).entries());

        // Trim strings
        const formData = {};
        Object.keys(raw).forEach((k) => {
          const v = raw[k];
          formData[k] = typeof v === "string" ? v.trim() : v;
          if (formData[k] === "") formData[k] = null;
        });

        // Convenience: if user fills only one email field, keep them aligned
        // (backend supports both columns; this just reduces mistakes)
        if (!formData.location_email && formData.email) formData.location_email = formData.email;
        if (!formData.email && formData.location_email) formData.email = formData.location_email;

        const method = currentId ? "PUT" : "POST";
        const url = currentId ? `/api/meta/locations/${currentId}` : `/api/meta/locations`;

        try {
          const res = await fetch(url, {
            method,
            headers: { "Content-Type": "application/json", ...authHeaders() },
            body: JSON.stringify(formData),
          });

          const data = await readJsonResponse(res);
          if (data.ok) {
            window.opener?.postMessage({ action: "refresh-locations" }, "*");
            window.close();
          } else {
            alert("Failed to save location: " + (data.error || "Unknown error"));
          }
        } catch (err) {
          console.error("❌ Save failed:", err);
          alert("Save failed. Check console for details.");
        }
      });

      loadUsers();
      loadGLAccounts();
    </script>
  </body>
</html>
