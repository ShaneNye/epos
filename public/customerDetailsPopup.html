<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/browserLogFilter.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Customer Details</title>
  <link rel="icon" type="image/x-icon" href="/assets/moon-man-logo.ico" />
  <script src="/js/storage.js"></script>
  <script src="/js/customerCountySelect.js"></script>
  <style>
    :root {
      --brand: #007fa8;
      --ink: #102033;
      --muted: #617085;
      --line: #dbe3ea;
      --soft: #f6f8fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--soft);
      color: var(--ink);
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    main {
      padding: 18px;
    }

    .popup-shell {
      max-width: 1180px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
      padding: 18px;
    }

    .header,
    .addresses-head,
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1,
    h2 {
      margin: 0;
    }

    h1 {
      font-size: 22px;
    }

    h2 {
      font-size: 17px;
    }

    .customer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    label {
      display: grid;
      gap: 5px;
      font-weight: 700;
      font-size: 12px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      color: var(--ink);
      font: inherit;
    }

    input:focus,
    select:focus {
      border-color: var(--brand);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 127, 168, 0.12);
    }

    .addresses-wrap {
      margin-top: 12px;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 820px;
      border-collapse: collapse;
    }

    .select-cell {
      text-align: center;
      width: 68px;
    }

    .select-cell input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--brand);
      cursor: pointer;
    }

    th,
    td {
      padding: 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #eef3f7;
      font-size: 12px;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .status {
      min-height: 20px;
      margin: 14px 0;
      color: var(--muted);
    }

    .status.error {
      color: #b42318;
      font-weight: 700;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 13px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--brand);
    }

    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <main>
    <div class="popup-shell">
      <div class="header">
        <h1>Update Customer Details</h1>
        <button type="button" id="closeBtn">Close</button>
      </div>

      <section class="customer-grid">
        <label>First Name<input name="firstName" type="text" /></label>
        <label>Last Name<input name="lastName" type="text" /></label>
        <label>Contact Number<input name="contactNumber" type="tel" /></label>
        <label>Alt Contact Number<input name="altContactNumber" type="tel" /></label>
        <label>Email Address<input name="email" type="email" /></label>
      </section>

      <section>
        <div class="addresses-head">
          <h2>Addresses</h2>
          <button type="button" id="addAddressBtn">+ Add Address</button>
        </div>

        <div class="addresses-wrap">
          <table>
            <thead>
              <tr>
                <th class="select-cell">Select</th>
                <th>Address Line 1</th>
                <th>Address Line 2</th>
                <th>Address Line 3</th>
                <th>County</th>
                <th>Postcode</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="addressesBody"></tbody>
          </table>
        </div>
      </section>

      <p id="status" class="status" aria-live="polite"></p>

      <div class="actions">
        <button type="button" id="cancelBtn">Cancel</button>
        <button type="button" id="saveBtn" class="primary">Save Changes</button>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const customerId = params.get("customerId") || "";
    const tokenFromUrl = params.get("token") || "";
    const saved = typeof storageGet === "function" ? storageGet() : null;
    const token = tokenFromUrl || saved?.token || "";
    const statusEl = document.getElementById("status");
    const tbody = document.getElementById("addressesBody");
    let currentCustomer = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message || "";
      statusEl.classList.toggle("error", !!isError);
    }

    function headers(extra = {}) {
      return {
        ...extra,
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
      };
    }

    function firstValue(obj, keys) {
      for (const key of keys) {
        const value = obj?.[key];
        if (value !== undefined && value !== null && value !== "") {
          if (typeof value === "object") return value.id || value.value || value.refName || value.name || "";
          return value;
        }
      }
      return "";
    }

    function normalizeCustomerNameLine(value) {
      return String(value || "")
        .replace(/^\d+\s+/, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function customerNameVariants(customer = {}) {
      return [
        [
          firstValue(customer, ["firstName", "firstname", "first_name"]),
          firstValue(customer, ["lastName", "lastname", "last_name"]),
        ]
          .filter(Boolean)
          .join(" "),
        firstValue(customer, ["entityId", "entityid"]),
        firstValue(customer, ["altName", "altname"]),
        firstValue(customer, ["companyName", "companyname"]),
        firstValue(customer, ["refName", "name"]),
      ]
        .map(normalizeCustomerNameLine)
        .filter(Boolean);
    }

    function isCustomerNameLine(line, customer = {}) {
      const normalizedLine = normalizeCustomerNameLine(line);
      if (!normalizedLine) return false;
      return customerNameVariants(customer).includes(normalizedLine);
    }

    function splitFormattedAddress(value) {
      const postcodeRegex = /\b[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}\b/i;
      const lines = String(value || "")
        .split(/\r?\n|<br\s*\/?>/i)
        .map((line) => line.replace(/<[^>]+>/g, "").trim())
        .filter(Boolean);

      if (lines.length > 1 && currentCustomer && isCustomerNameLine(lines[0], currentCustomer)) {
        lines.shift();
      }

      let postcode = "";
      const cleaned = [];
      lines.forEach((line) => {
        const match = line.match(postcodeRegex);
        if (match) {
          postcode = match[0].toUpperCase();
          const withoutPostcode = line.replace(postcodeRegex, "").trim();
          if (withoutPostcode) cleaned.push(withoutPostcode);
          return;
        }
        cleaned.push(line);
      });

      const address1 = cleaned[0] || "";
      let address2 = "";
      let address3 = "";
      let county = "";

      if (cleaned.length === 2) {
        address3 = cleaned[1] || "";
      } else {
        address2 = cleaned[1] || "";
        address3 = cleaned[2] || "";
        county = cleaned[3] || "";
      }

      return {
        address1,
        address2,
        address3,
        county,
        postcode,
      };
    }

    function addressItems(customer = {}) {
      const items =
        customer.addressBook?.items ||
        customer.addressBook ||
        customer.addressbook?.items ||
        customer.addressbook ||
        [];

      if (Array.isArray(items)) return items;
      if (Array.isArray(items.items)) return items.items;
      return [];
    }

    function cleanAddressParts(address = {}) {
      const postcodeRegex = /\b[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}\b/i;
      const out = { ...address };
      const address1 = String(out.address1 || "").replace(/\s+/g, " ").trim().toLowerCase();
      const address2 = String(out.address2 || "").trim();
      const address3 = String(out.address3 || "").trim();
      const county = String(out.county || "").trim();

      if (isCustomerNameLine(address1, currentCustomer)) {
        out.address1 = out.address2 || "";
        out.address2 = "";
      }

      if (postcodeRegex.test(address2)) {
        const match = address2.match(postcodeRegex);
        if (!out.postcode && match) out.postcode = match[0].toUpperCase();
        const withoutPostcode = address2.replace(postcodeRegex, "").trim();
        if (!out.address3 && withoutPostcode) {
          out.address3 = county && withoutPostcode.toLowerCase().endsWith(county.toLowerCase())
            ? withoutPostcode.slice(0, -county.length).trim()
            : withoutPostcode;
        }
        out.address2 = "";
        return out;
      }

      const compactAddress2 = address2.replace(/\s+/g, " ").toLowerCase();
      const townCounty = [address3, county].filter(Boolean).join(" ").replace(/\s+/g, " ").toLowerCase();
      if (compactAddress2 && townCounty && compactAddress2 === townCounty) {
        out.address2 = "";
      }

      return out;
    }

    function normalizeAddress(address = {}, index = 0) {
      const addr = address.addressbookAddress || address.addressBookAddress || address.address || address;
      const formatted = splitFormattedAddress(
        firstValue(addr, ["addrText", "addrtext", "text"]) ||
          firstValue(address, [
            "addressbookAddress_text",
            "addressBookAddress_text",
            "address",
            "address_text",
            "addrText",
            "addrtext",
          ])
      );
      return cleanAddressParts({
        id: firstValue(address, ["id", "internalId", "internalid"]),
        defaultShipping: address.defaultShipping === true,
        defaultBilling: address.defaultBilling === true,
        address1: firstValue(addr, ["addr1", "address1"]) || formatted.address1,
        address2: firstValue(addr, ["addr2", "address2"]) || formatted.address2,
        address3: firstValue(addr, ["city", "addr3", "address3"]) || formatted.address3,
        county: firstValue(addr, ["state", "county"]) || formatted.county,
        postcode: firstValue(addr, ["zip", "postcode", "postalCode"]) || formatted.postcode,
      });
    }

    function setInput(name, value) {
      const input = document.querySelector(`[name="${name}"]`);
      if (input) input.value = value || "";
    }

    function getInput(name) {
      return document.querySelector(`[name="${name}"]`)?.value?.trim() || "";
    }

    function readAddressRow(row, index = 0) {
      const field = (name) =>
        row.querySelector(`[data-address-field="${name}"]`)?.value?.trim() || "";
      const countyField = row.querySelector('[data-address-field="county"]');
      return {
        id: row.dataset.addressId || "",
        defaultShipping: row.dataset.defaultShipping === "true" || index === 0,
        defaultBilling: row.dataset.defaultBilling === "true" || index === 0,
        address1: field("address1"),
        address2: field("address2"),
        address3: field("address3"),
        county: window.EposCountySelect?.getValue?.(countyField) || field("county"),
        countyName: window.EposCountySelect?.getName?.(countyField) || field("county"),
        postcode: field("postcode"),
        selected: !!row.querySelector('[data-select-address]')?.checked,
      };
    }

    function notifySelectedAddress(row) {
      if (!row) return;
      const rows = [...tbody.querySelectorAll("tr")];
      window.opener?.onCustomerAddressSelected?.(readAddressRow(row, rows.indexOf(row)));
    }

    function appendAddressRow(address = {}) {
      const tr = document.createElement("tr");
      tr.dataset.addressId = address.id || "";
      tr.dataset.defaultShipping = address.defaultShipping ? "true" : "";
      tr.dataset.defaultBilling = address.defaultBilling ? "true" : "";
      tr.innerHTML = `
        <td class="select-cell"><input type="radio" name="selectedAddress" data-select-address></td>
        <td><input data-address-field="address1" type="text"></td>
        <td><input data-address-field="address2" type="text"></td>
        <td><input data-address-field="address3" type="text"></td>
        <td><input data-address-field="county" type="text"></td>
        <td><input data-address-field="postcode" type="text"></td>
        <td><button type="button" data-remove-address>Remove</button></td>
      `;

      ["address1", "address2", "address3", "county", "postcode"].forEach((field) => {
        const input = tr.querySelector(`[data-address-field="${field}"]`);
        if (input) input.value = address[field] || "";
      });

      tr.querySelector("[data-remove-address]")?.addEventListener("click", () => {
        const wasSelected = !!tr.querySelector('[data-select-address]')?.checked;
        tr.remove();
        if (wasSelected) tbody.querySelector('[data-select-address]')?.click();
      });
      tbody.appendChild(tr);
      const select = tr.querySelector("[data-select-address]");
      if (select && (address.selected || address.defaultShipping || (!tbody.querySelector('input[name="selectedAddress"]:checked') && tbody.children.length === 1))) {
        select.checked = true;
      }
      select?.addEventListener("change", () => notifySelectedAddress(tr));
      window.EposCountySelect?.enhance?.(tr).then(() => {
        window.EposCountySelect?.setValue?.(tr.querySelector('[data-address-field="county"]'), address.county || "");
      });
    }

    function renderCustomer(customer) {
      currentCustomer = customer;
      setInput("firstName", firstValue(customer, ["firstName", "firstname", "first_name"]));
      setInput("lastName", firstValue(customer, ["lastName", "lastname", "last_name"]));
      setInput("contactNumber", firstValue(customer, ["phone", "contactNumber", "mobilePhone", "mobilephone"]));
      setInput("altContactNumber", firstValue(customer, ["altPhone", "altphone", "altContactNumber", "homePhone", "homephone"]));
      setInput("email", firstValue(customer, ["email"]));

      tbody.innerHTML = "";
      const addresses = addressItems(customer).map(normalizeAddress);
      (addresses.length ? addresses : [{}]).forEach(appendAddressRow);
    }

    async function loadCustomer() {
      if (!customerId) {
        setStatus("Missing customer ID.", true);
        return;
      }

      setStatus("Loading customer details...");
      const res = await fetch(`/api/netsuite/entity/${encodeURIComponent(customerId)}`, {
        headers: headers(),
        cache: "no-store",
      });
      const data = await res.json();
      if (!res.ok || data.ok === false) throw new Error(data.error || "Failed to load customer details");
      renderCustomer(data.entity);
      setStatus("");
    }

    function collectPayload() {
      const rows = [...tbody.querySelectorAll("tr")];

      const addresses = rows
        .map((row, index) => {
          const address = readAddressRow(row, index);
          delete address.selected;
          delete address.countyName;
          return address;
        })
        .filter((address) =>
          [address.address1, address.address2, address.address3, address.county, address.postcode].some(Boolean)
        );

      const selectedRow = rows.find((row) => row.querySelector('[data-select-address]')?.checked);
      const selectedAddress = selectedRow
        ? readAddressRow(selectedRow, rows.indexOf(selectedRow))
        : addresses[0] || null;

      return {
        firstName: getInput("firstName"),
        lastName: getInput("lastName"),
        contactNumber: getInput("contactNumber"),
        altContactNumber: getInput("altContactNumber"),
        email: getInput("email"),
        addresses,
        selectedAddress,
      };
    }

    async function saveCustomer() {
      const saveBtn = document.getElementById("saveBtn");
      const payload = collectPayload();

      if (!payload.firstName || !payload.lastName || !payload.email) {
        setStatus("First name, last name and email are required.", true);
        return;
      }

      saveBtn.disabled = true;
      setStatus("Saving customer details...");

      try {
        const res = await fetch(`/api/netsuite/entity/${encodeURIComponent(customerId)}`, {
          method: "PATCH",
          headers: headers({ "Content-Type": "application/json" }),
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok || data.ok === false) throw new Error(data.error || "Failed to update customer");

        renderCustomer(data.entity);
        window.opener?.onCustomerDetailsUpdated?.(data.entity, payload);
        setStatus("Customer details updated.");
        setTimeout(() => window.close(), 250);
      } catch (err) {
        setStatus(err.message || "Failed to update customer.", true);
      } finally {
        saveBtn.disabled = false;
      }
    }

    document.getElementById("addAddressBtn").addEventListener("click", () => appendAddressRow({}));
    document.getElementById("saveBtn").addEventListener("click", saveCustomer);
    document.getElementById("cancelBtn").addEventListener("click", () => window.close());
    document.getElementById("closeBtn").addEventListener("click", () => window.close());

    loadCustomer().catch((err) => setStatus(err.message || "Failed to load customer details.", true));
  </script>
</body>
</html>
