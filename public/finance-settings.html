<!doctype html>
<html lang="en">
<head>
  <script src="/js/browserLogFilter.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPOS Finance Calculator Settings</title>
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/finance.css">
  <script src="/js/storage.js"></script>
  <script src="/js/menu.js" defer></script>
  <script src="/js/financeSettings.js" defer></script>
</head>
<body>
  <div id="menu"></div>
  <main class="content finance-settings-page">
    <div class="finance-page-heading">
      <div>
        <p class="finance-eyebrow">Sales tools</p>
        <h1>Finance calculator settings</h1>
        <p>Set the finance options offered for each sale amount band.</p>
      </div>
      <button class="finance-primary" id="saveFinanceSettings" type="button">Save settings</button>
    </div>
    <div id="financeSettingsStatus" class="finance-status" role="status"></div>
    <section class="finance-settings-card">
      <div class="finance-settings-intro">
        <h2>Sale amount bands</h2>
        <button class="finance-secondary" id="addFinanceTier" type="button">+ Add band</button>
      </div>
      <div class="finance-tier-head" aria-hidden="true">
        <span>Sale amount from</span><span>Sale amount to</span><span>Terms (months)</span>
        <span>Minimum deposit</span><span>Interest</span><span>APR</span><span></span>
      </div>
      <div id="financeTierRows"></div>
    </section>
  </main>
</body>
</html>
